<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
            --dirt: #5d3a1a;
            --dirt-dark: #3d2914;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 8px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border-bottom: 3px solid #5d3a1a; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 20px; }
        .logo-text { font-size: 12px; color: #7fff7f; text-shadow: 2px 2px 0 #000; }
        .stats { display: flex; gap: 8px; align-items: center; }
        .stat { text-align: center; }
        .stat-v { font-size: 11px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
        .stat-l { font-size: 6px; color: #8f8; }
        .speed { display: flex; gap: 3px; }
        .speed button { 
            width: 28px; height: 24px; font-size: 8px; 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 2px solid #8b5a2b; border-top-color: #a0522d; border-bottom-color: #3d2914;
            color: #fff; text-shadow: 1px 1px 0 #000;
        }
        .speed button.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; }
        
        /* Minecraft Tabs - Larger & Centered */
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); padding: 8px; gap: 6px; border-bottom: 3px solid #5d3a1a; }
        .tab { 
            padding: 10px 16px; font-size: 9px; 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 3px solid #8b5a2b;
            border-top-color: #a0522d;
            border-left-color: #8b4513;
            border-right-color: #5d3a1a;
            border-bottom-color: #3d2914;
            color: #fff; text-shadow: 1px 1px 0 #000;
            min-width: 60px;
            text-align: center;
        }
        .tab.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; color: #000; text-shadow: none; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 65px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1117 100%); }
        
        /* Grow Room - Top-View Square Pots */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        @media (max-width: 320px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        /* Square Pot - Top View */
        .pot { 
            background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 50%, #5d3a1a 100%);
            border: 3px solid #3d2914;
            border-top-color: #8b5a2b;
            border-left-color: #a0522d;
            border-right-color: #3d2914;
            border-bottom-color: #2d1f0f;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border-radius: 0;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.1);
        }
        .pot:active { transform: translateY(2px); box-shadow: inset 2px 2px 0 rgba(0,0,0,0.3); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 8px var(--gold), inset 0 0 4px rgba(240,136,62,0.3); }
        .pot.ready { border-color: var(--green); animation: pot-ready 1.5s infinite; }
        @keyframes pot-ready { 0%, 100% { box-shadow: 0 0 4px var(--green); } 50% { box-shadow: 0 0 12px var(--green); } }
        
        .pot-soil {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            background: linear-gradient(135deg, #3d2914 0%, #5d3a1a 50%, #4a3520 100%);
            border-radius: 4px;
            border: 2px solid #2d1f0f;
        }
        
        .plant-top { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); image-rendering: pixelated; }
        .plant-top-0 { width: 8px; height: 8px; background: #4a8; border-radius: 2px; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.3); }
        .plant-top-1 { width: 20px; height: 20px; position: relative; }
        .plant-top-1::before, .plant-top-1::after { content: ''; position: absolute; width: 8px; height: 8px; background: linear-gradient(135deg, #5aaa5a 0%, #3a8a3a 100%); border-radius: 2px; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.3); }
        .plant-top-1::before { top: 2px; left: 6px; }
        .plant-top-1::after { top: 10px; left: 6px; }
        .plant-top-2 { width: 28px; height: 28px; position: relative; }
        .plant-top-2::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; background: linear-gradient(0deg, transparent 40%, #5aaa5a 40%, #5aaa5a 60%, transparent 60%), linear-gradient(90deg, transparent 40%, #5aaa5a 40%, #5aaa5a 60%, transparent 60%); box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2); }
        .plant-top-3 { width: 36px; height: 36px; background: radial-gradient(ellipse 16px 16px at center, #6aba6a 0%, #4a9a4a 60%, #3a8a3a 100%); border-radius: 6px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.1); }
        .plant-top-4 { width: 44px; height: 44px; background: radial-gradient(ellipse 20px 20px at center, #6aba6a 0%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 8px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.1); position: relative; }
        .plant-top-4::before { content: ''; position: absolute; top: 8px; left: 8px; width: 6px; height: 6px; background: #f8a; border-radius: 50%; box-shadow: 22px 0 0 #f8a; }
        .plant-top-5 { width: 52px; height: 52px; background: radial-gradient(ellipse 24px 24px at center, #6aba6a 0%, #4a9a4a 40%, #3a8a3a 100%); border-radius: 10px; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.1); position: relative; animation: sway 2s ease-in-out infinite; }
        .plant-top-5::before { content: ''; position: absolute; top: 10px; left: 10px; width: 10px; height: 10px; background: radial-gradient(ellipse 5px 5px at center, #f4a 0%, #d3a 100%); border-radius: 50%; box-shadow: 22px 0 0 #f4a, 0 22px 0 #f4a, 22px 22px 0 #f4a; }
        @keyframes sway { 0%, 100% { transform: translate(-50%, -50%) rotate(-1deg); } 50% { transform: translate(-50%, -50%) rotate(1deg); } }
        .plant-top-6 { width: 60px; height: 60px; background: radial-gradient(ellipse 28px 28px at center, #6aba6a 0%, #4a9a4a 30%, #3a8a3a 100%); border-radius: 12px; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.25), inset 2px 2px 0 rgba(255,255,255,0.08), 0 0 10px rgba(255,255,255,0.3); position: relative; animation: harvest 2.5s ease-in-out infinite; }
        .plant-top-6::before { content: ''; position: absolute; top: 12px; left: 12px; width: 12px; height: 12px; background: radial-gradient(ellipse 6px 6px at center, #f4a 0%, #d3a 70%); border-radius: 50%; box-shadow: 24px 0 0 #f4a, 0 24px 0 #f4a, 24px 24px 0 #f4a; }
        .plant-top-6::after { content: ''; position: absolute; top: 8px; left: 18px; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 12px 4px 0 #fff, 24px 0 0 #fff, 6px 12px 0 #fff, 18px 16px 0 #fff, 28px 8px 0 #fff; animation: crystals 1.5s ease-in-out infinite; }
        @keyframes harvest { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.02); } }
        @keyframes crystals { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        .pot-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.5; }
        .pot-name { position: absolute; bottom: 3px; left: 0; right: 0; text-align: center; font-size: 6px; color: #fff; text-shadow: 1px 1px 0 #000; }
        .pot-progress { position: absolute; bottom: 12px; left: 0; right: 0; text-align: center; font-size: 6px; color: #7fff7f; text-shadow: 1px 1px 0 #000; }
        
        /* Minecraft Buttons */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border-top: 3px solid #5d3a1a; padding: 8px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .act { 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 3px solid #8b5a2b;
            border-top-color: #a0522d;
            border-left-color: #8b4513;
            border-right-color: #5d3a1a;
            border-bottom-color: #3d2914;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }
        .act:active { transform: translateY(2px); }
        .act.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; }
        .act .i { font-size: 18px; }
        .act .t { font-size: 6px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 10px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: linear-gradient(180deg, #2d1f0f 0%, #1a1a2e 100%); border: 3px solid #5d3a1a; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 3px solid #5d3a1a; }
        .mtit { font-size: 12px; color: #7fff7f; }
        .mclose { background: #8b0000; border: 2px solid #5a0000; color: #fff; font-size: 14px; width: 28px; height: 28px; }
        .mbody { padding: 10px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .item { background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 100%); border: 2px solid #8b5a2b; padding: 8px; text-align: center; }
        .item.off { opacity: 0.5; }
        .item .ii { font-size: 22px; }
        .item .in { font-size: 7px; margin: 4px 0 2px; color: var(--text-bright); }
        .item .id { font-size: 6px; color: var(--muted); }
        .item .ip { font-size: 8px; color: var(--gold); margin-top: 4px; }
        
        /* Cards */
        .card { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; margin-bottom: 8px; }
        .card-t { font-size: 10px; color: #7fff7f; margin-bottom: 8px; }
        .card-r { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #5d3a1a; font-size: 7px; }
        
        /* Section Header */
        .section { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; padding: 8px; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; }
        .section-icon { font-size: 18px; }
        .section-title { font-size: 10px; color: #7fff7f; }
        .section-desc { font-size: 6px; color: #8f8; margin-top: 2px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
        .stat-box { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 8px; text-align: center; }
        .stat-box .icon { font-size: 16px; }
        .stat-box .value { font-size: 12px; color: #7fff7f; margin: 4px 0; }
        .stat-box .label { font-size: 6px; color: #8f8; }
        
        /* Progress */
        .prog { height: 6px; background: #000; border-radius: 3px; overflow: hidden; border: 1px solid #333; }
        .prog-f { height: 100%; background: linear-gradient(90deg, #238636, #f0883e); }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, #2d5a2d 0%, #1a3d1a 100%); border: 2px solid #3a5a3a; padding: 12px; text-align: center; z-index: 2000; display: none; }
        .toast.show { display: block; }
        .toast-t { font-size: 12px; color: #7fff7f; }
        .toast-x { font-size: 8px; margin-top: 4px; color: #8f8; }
        
        /* Tutorial */
        .tut { position: fixed; inset: 0; background: linear-gradient(180deg, #1a3d1a 0%, #0d1117 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; z-index: 3000; }
        .tut.h { display: none; }
        .tut h1 { font-size: 14px; color: #7fff7f; margin-bottom: 12px; }
        .tut-g { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 300px; }
        .tut-b { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 12px; }
        .tut-b h2 { font-size: 9px; color: #7fff7f; margin-bottom: 4px; }
        .tut-b p { font-size: 7px; color: #8f8; }
        .tut-s { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border: 2px solid #2d5a2d; color: #000; font-size: 11px; padding: 12px 32px; margin-top: 16px; }
        
        /* Genes */
        .genes { display: flex; gap: 2px; margin-top: 4px; }
        .gene { width: 10px; height: 10px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 6px; }
        .gene-t { background: #f85149; }
        .gene-c { background: #238636; }
        .gene-y { background: #f0883e; }
        .gene-s { background: #58a6ff; }
        .gene-r { background: #a371f7; }
        
        /* Equipment */
        .equip-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .equip-item { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; }
        .equip-item.owned { border-color: #238636; }
        .equip-item .ei { font-size: 20px; margin-bottom: 4px; }
        .equip-item .en { font-size: 8px; color: #7fff7f; }
        .equip-item .ed { font-size: 6px; color: #8f8; margin: 4px 0; }
        .equip-item .ec { font-size: 7px; color: var(--gold); }
    </style>
</head>
<body>
    <div class="tut" id="tut">
        <h1>🌿 Grow Craft</h1>
        <div class="tut-g">
            <div class="tut-b"><h2>🌱</h2><p>Тапай на слоты</p></div>
            <div class="tut-b"><h2>🏪</h2><p>Магазин</p></div>
            <div class="tut-b"><h2>🔧</h2><p>Оборудование</p></div>
            <div class="tut-b"><h2>🔬</h2><p>Исследования</p></div>
        </div>
        <button class="tut-s" id="start">▶ ИГРАТЬ</button>
    </div>

    <div class="app">
        <div class="head">
            <div class="logo"><span class="logo-icon">🌿</span><span class="logo-text">Grow Craft</span></div>
            <div class="stats">
                <div class="stat"><div class="stat-v" id="lvl">1</div><div class="stat-l">LVL</div></div>
                <div class="stat"><div class="stat-v" id="day">1</div><div class="stat-l">DAY</div></div>
                <div class="stat"><div class="stat-v" id="mny">500</div><div class="stat-l">💰</div></div>
                <div class="stat"><div class="stat-v" id="xp">0</div><div class="stat-l">XP</div></div>
                <div class="speed">
                    <button class="on" data-s="1">1x</button>
                    <button data-s="2">2x</button>
                    <button data-s="5">5x</button>
                    <button data-s="10">10x</button>
                </div>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab on" data-t="grow">🌱</button>
            <button class="tab" data-t="shop">🏪</button>
            <button class="tab" data-t="equip">🔧</button>
            <button class="tab" data-t="lab">🧪</button>
            <button class="tab" data-t="research">🔬</button>
            <button class="tab" data-t="stats">📊</button>
        </div>

        <div class="content" id="content"></div>

        <div class="actions">
            <button class="act" data-a="plant"><span class="i">🌱</span><span class="t">Посадить</span></button>
            <button class="act" data-a="water"><span class="i">💧</span><span class="t">Полить</span></button>
            <button class="act" data-a="nutrient"><span class="i">🧪</span><span class="t">Удобрения</span></button>
            <button class="act" data-a="harvest"><span class="i">✂️</span><span class="t">Собрать</span></button>
            <button class="act" data-a="save"><span class="i">💾</span><span class="t">Сейв</span></button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="seedModal"><div class="box"><div class="mhead"><div class="mtit">🌱 Семена</div><button class="mclose" data-c="seedModal">✕</button></div><div class="mbody"><div class="grid" id="seedGrid"></div></div></div></div>
    <div class="modal" id="nutrModal"><div class="box"><div class="mhead"><div class="mtit">🧪 Удобрения</div><button class="mclose" data-c="nutrModal">✕</button></div><div class="mbody"><div class="grid" id="nutrGrid"></div></div></div></div>
    <div class="modal" id="equipModal"><div class="box"><div class="mhead"><div class="mtit" id="equipTit">🔧</div><button class="mclose" data-c="equipModal">✕</button></div><div class="mbody" id="equipBody"></div></div></div>
    <div class="modal" id="infoModal"><div class="box"><div class="mhead"><div class="mtit" id="infoTit">Инфо</div><button class="mclose" data-c="infoModal">✕</button></div><div class="mbody" id="infoBody"></div></div></div>
    <div class="toast" id="toast"><div class="toast-t" id="tt"></div><div class="toast-x" id="tx"></div></div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        
        // Data
        const strains = [
            { id: 'nl', name: 'Northern Lights', type: 'Indica', icon: '🌿', thc: 18, yld: 400, price: 50, speed: 1.0 },
            { id: 'ww', name: 'White Widow', type: 'Hybrid', icon: '🍃', thc: 20, yld: 450, price: 60, speed: 1.1 },
            { id: 'bd', name: 'Blue Dream', type: 'Sativa', icon: '💠', thc: 21, yld: 500, price: 70, speed: 1.2 },
            { id: 'og', name: 'OG Kush', type: 'Hybrid', icon: '🌲', thc: 23, yld: 480, price: 120, speed: 1.0 },
            { id: 'gl', name: 'Gelato', type: 'Hybrid', icon: '🍦', thc: 27, yld: 400, price: 150, speed: 0.9 },
            { id: 'gg', name: 'Gorilla Glue', type: 'Hybrid', icon: '🦍', thc: 30, yld: 550, price: 180, speed: 0.85 },
            { id: 'sk', name: 'Skunk #1', type: 'Hybrid', icon: '🦨', thc: 19, yld: 420, price: 40, speed: 1.3 },
            { id: 'cm', name: 'Critical Mass', type: 'Indica', icon: '⚖️', thc: 20, yld: 600, price: 45, speed: 1.1 },
            { id: 'ak', name: 'AK-47', type: 'Hybrid', icon: '🔫', thc: 22, yld: 450, price: 55, speed: 1.2 },
            { id: 'am', name: 'Amnesia Haze', type: 'Sativa', icon: '🌀', thc: 25, yld: 480, price: 90, speed: 0.8 },
            { id: 'pk', name: 'Purple Kush', type: 'Indica', icon: '💜', thc: 24, yld: 380, price: 100, speed: 0.9 },
            { id: 'sd', name: 'Sour Diesel', type: 'Sativa', icon: '⛽', thc: 26, yld: 520, price: 85, speed: 1.0 }
        ];
        
        const nutrients = [
            { id: 'grow', name: 'Grow Mix', icon: '🟢', desc: '+10% здоровье', price: 25, inv: 0 },
            { id: 'bloom', name: 'Bloom Mix', icon: '🟣', desc: '+20% урожай', price: 30, inv: 0 },
            { id: 'calmag', name: 'Cal-Mag', icon: '💊', desc: '+15% здоровье', price: 35, inv: 0 },
            { id: 'pk', name: 'PK Boost', icon: '⚡', desc: '+25% урожай', price: 40, inv: 0 },
            { id: 'root', name: 'Root Boost', icon: '🌿', desc: '+рост корней', price: 20, inv: 0 },
            { id: 'enz', name: 'Enzymes', icon: '🔬', desc: '+переработка', price: 50, inv: 0 }
        ];
        
        const equipment = [

        function load() { const s = localStorage.getItem('gc7'); if (s) S = {...S, ...JSON.parse(s)}; }

        function toast(t, x) {
            document.getElementById('tt').textContent = t;
            document.getElementById('tx').textContent = x;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 1500);
        }
        
        function tick() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }
            
            const equipBonus = S.equipment.reduce((sum, id) => { const e = equipment.find(x => x.id === id); return sum + (e?.bonus || 1); }, 0) || 1;
            const hasLab = S.lab.length > 0 ? 1.1 : 1;
            
            S.plants.forEach(p => {
                p.progress += (1.2 * S.speed * 0.05) * equipBonus * hasLab * p.strain.speed;
                p.water -= 0.2 * S.speed;
                if (p.water < 30) p.health -= 0.1 * S.speed;
                if (p.water > 80) p.health -= 0.05 * S.speed;
                p.health = Math.max(0, Math.min(100, p.health));
                p.stage = p.progress < 5 ? 0 : p.progress < 10 ? 1 : p.progress < 20 ? 2 : p.progress < 40 ? 3 : p.progress < 60 ? 4 : p.progress < 90 ? 5 : 6;
            });
            
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }
            update();
        }
        
        function update() {
            document.getElementById('lvl').textContent = S.level;

            document.getElementById('mny').textContent = S.money;

        }

                c.innerHTML += equipment.filter(e => ['fan', 'filter', 'hygro', 'timer', 'ph'].includes(e.id)).map(e =>

                        <div class="ei">${e.icon}</div>

                        <div class="ed">${e.desc} ${e.bonus > 1 ? '| +' + Math.round((e.bonus - 1) * 100) + '%' : ''}</div>

                c.innerHTML += `<div class="card">

            else if (tab === 'research') {

                const equipBonus = S.equipment.reduce((sum, id) => { const e = equipment.find(x => x.id === id); return sum + (e?.bonus || 1); }, 1);

        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); return; }
            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает'); return; }
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: { t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'), c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'), y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'), s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'), r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r') },
                progress: 0, stage: 0, health: 100, water: 70
            });
            S.stats.planted++;
            S.xp += 5;
            document.getElementById('seedModal').classList.remove('open');
            render('grow');
            toast('🌱', strain.name);
            save();
        }
        
        function buyNutrient(id) {
            const n = nutrients.find(x => x.id === id);
            if (S.money < n.price) { toast('❌', 'Не хватает'); return; }
            S.money -= n.price;
            S.inv[id] = (S.inv[id] || 0) + 1;
            toast('🧪', n.name + ' куплено');
            save();
        }
        
        function buyEquipment(id) {
            if (S.equipment.includes(id)) { toast('❌', 'Уже есть'); return; }
            const e = equipment.find(x => x.id === id);
            if (S.money < e.price) { toast('❌', 'Не хватает'); return; }
            
            // Special: pots and tents add slots
            if (id === 'pot5') { S.slots += 1; S.money -= e.price; S.equipment.push(id); toast('🪴', '+1 слот'); }
            else if (id === 'pot10') { S.slots += 2; S.money -= e.price; S.equipment.push(id); toast('🪴', '+2 слота'); }
            else if (id === 'tent') { S.slots += 4; S.money -= e.price; S.equipment.push(id); toast('🏠', '+4 слота'); }
            else if (id === 'tent2') { S.slots += 8; S.money -= e.price; S.equipment.push(id); toast('🏠', '+8 слотов'); }
            else { S.money -= e.price; S.equipment.push(id); toast('🔧', e.name); }
            
            save();
            render('equip');
        }
        
        function buyLab(id) {
            if (S.lab.includes(id)) { toast('❌', 'Уже есть'); return; }
            const l = labItems.find(x => x.id === id);
            if (S.money < l.price) { toast('❌', 'Не хватает'); return; }
            S.money -= l.price;
            S.lab.push(id);
            toast('🔬', l.name);
            save();
            render('lab');
        }
        
        function harvest(p) {
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100));
            S.money += yld * 2;
            S.xp += yld;
            S.stats.harvests++;
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            S.selected = null;
            document.getElementById('infoModal').classList.remove('open');
            toast('✂️', `${yld}г • +$${yld * 2}`);
            render('grow');
            save();
        }
        
        function showInfo(p) {
            document.getElementById('infoTit').textContent = p.strain.name;
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100));
            const daysLeft = Math.max(0, Math.ceil((100 - p.progress) / (10 * S.speed)));
            
            let html = `<div class="stats-grid">
                <div class="stat-box"><div class="icon">📊</div><div class="value">${Math.floor(p.progress)}%</div><div class="label">Прогресс</div></div>
                <div class="stat-box"><div class="icon">⚖️</div><div class="value">${yld}г</div><div class="label">Урожай</div></div>
                <div class="stat-box"><div class="icon">⏱️</div><div class="value">${daysLeft}д</div><div class="label">Осталось</div></div>
                <div class="stat-box"><div class="icon">💰</div><div class="value">$${yld * 2}</div><div class="label">Прибыль</div></div>
            </div>
            <div class="card" style="margin-top:8px">
                <div class="card-r"><span>❤️ Здоровье</span><span>${Math.floor(p.health)}%</span></div>
                <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${p.health}%"></div></div>
                <div class="card-r" style="margin-top:6px"><span>💧 Вода</span><span>${Math.floor(p.water)}%</span></div>
                <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${p.water}%"></div></div>
            </div>`;
            
            if (S.research[0].done) {
                html += `<div class="card" style="margin-top:8px"><div style="font-size:9px;color:#7fff7f;margin-bottom:6px">🧬 Гены</div>
                <div class="genes">${['t', 'c', 'y', 's', 'r'].map(g => `<div class="gene gene-${g}">${p.genes[g].includes(g.toUpperCase()) ? '★' : '○'}</div>`).join('')}</div></div>`;
            }
            
            if (p.stage >= 6) {
                html += `<button class="tut-s" style="width:100%;margin-top:8px" id="harvestBtn">✂️ Собрать урожай</button>`;
            } else {
                html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
                    <button class="tut-s" id="waterBtn">💧 Полить</button>
                    <button class="tut-s" id="nutrBtn">🧪 Удобрения</button>
                </div>`;
            }
            
            document.getElementById('infoBody').innerHTML = html;
            document.getElementById('infoModal').classList.add('open');
            
            if (p.stage >= 6) {
                document.getElementById('harvestBtn').addEventListener('click', () => harvest(p));
            } else {
                document.getElementById('waterBtn').addEventListener('click', () => { p.water = Math.min(100, p.water + 30); showInfo(p); toast('💧', 'Полито!'); save(); });
                document.getElementById('nutrBtn').addEventListener('click', () => { document.getElementById('infoModal').classList.remove('open'); document.getElementById('nutrModal').classList.add('open'); });
            }
        }
        
        // Events
        document.addEventListener('DOMContentLoaded', () => {
            load();
            document.getElementById('start').addEventListener('click', () => { document.getElementById('tut').classList.add('h'); loop = setInterval(tick, 1000); });
            document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(x => x.classList.remove('on')); t.classList.add('on'); render(t.dataset.t); }));
            document.querySelectorAll('[data-s]').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('[data-s]').forEach(x => x.classList.remove('on')); b.classList.add('on'); S.speed = parseInt(b.dataset.s); }));
            document.querySelectorAll('[data-a]').forEach(b => b.addEventListener('click', () => {
                const a = b.dataset.a;
                if (a === 'plant') { if (S.selected === null) toast('❌', 'Выбери слот'); else if (S.plants.find(p => p.slot === S.selected)) toast('❌', 'Слот занят'); else document.getElementById('seedModal').classList.add('open'); }
                else if (a === 'water') { if (S.plants.length === 0) toast('💧', 'Нет растений'); else { S.plants.forEach(p => p.water = Math.min(100, p.water + 30)); toast('💧', 'Полито!'); } }
                else if (a === 'nutrient') { if (S.selected === null) toast('❌', 'Выбери растение'); else document.getElementById('nutrModal').classList.add('open'); }
                else if (a === 'harvest') { if (S.selected === null) toast('❌', 'Выбери растение'); else { const p = S.plants.find(x => x.slot === S.selected); if (!p) toast('❌', 'Пусто'); else if (p.stage < 6) toast('❌', 'Не готово'); else harvest(p); } }
                else if (a === 'save') { save(); toast('💾', 'Сохранено!'); }
            }));
            
            document.getElementById('content').addEventListener('click', e => {
                const pot = e.target.closest('.pot');
                if (pot) {
                    const i = parseInt(pot.dataset.slot);
                    S.selected = i;
                    const p = S.plants.find(x => x.slot === i);
                    if (!p) document.getElementById('seedModal').classList.add('open');
                    else showInfo(p);
                    render('grow');
                }
                
                const seed = e.target.closest('[data-seed]');
                if (seed) plantSeed(seed.dataset.seed);
                
                const nut = e.target.closest('[data-nut]');
                if (nut) buyNutrient(nut.dataset.nut);
                
                const equip = e.target.closest('[data-equip]');
                if (equip) buyEquipment(equip.dataset.equip);
                
                const lab = e.target.closest('[data-lab]');
                if (lab) buyLab(lab.dataset.lab);
                
                const res = e.target.closest('[data-res]');
                if (res) {
                    const r = S.research[parseInt(res.dataset.res)];
                    if (S.xp < r.cost) { toast('❌', 'Не хватает XP'); return; }
                    S.xp -= r.cost;
                    r.done = true;
                    toast('🔬', r.name);
                    render('research');
                    save();
                }
            });
            
            document.querySelectorAll('[data-c]').forEach(b => b.addEventListener('click', () => document.getElementById(b.dataset.c).classList.remove('open')));
            document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));
            
            render('grow');
            update();
        });
    </script>
</body>
</html>
