<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 8px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: var(--dark); padding: 6px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; }
        .logo { display: flex; align-items: center; gap: 6px; }
        .logo-icon { font-size: 18px; }
        .logo-text { font-size: 10px; color: var(--green); }
        .stats { display: flex; gap: 6px; }
        .stat { text-align: center; }
        .stat-v { font-size: 10px; color: var(--gold); }
        .stat-l { font-size: 5px; color: var(--muted); }
        .speed { display: flex; gap: 2px; }
        .speed button { width: 22px; height: 18px; font-size: 7px; background: var(--stone); border: 2px solid #000; color: var(--text); }
        .speed button.on { background: var(--green); color: #000; border-color: var(--green); }
        
        /* Tabs */
        .tabs { display: flex; overflow-x: auto; background: var(--dark); padding: 4px; gap: 2px; border-bottom: 2px solid #000; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 5px 8px; font-size: 7px; background: var(--stone); border: 2px solid #000; color: var(--text); white-space: nowrap; }
        .tab.on { background: var(--green); color: #000; border-color: var(--green); }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 60px; }
        
        /* Grow Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (max-width: 320px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        .slot { 
            background: var(--stone); 
            border: 3px solid #000; 
            border-radius: 8px; 
            min-height: 100px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .slot:active { transform: scale(0.95); }
        .slot.sel { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .slot.ready { border-color: var(--green); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 15px var(--green); } }
        
        .slot-icon { font-size: 36px; }
        .slot-name { font-size: 7px; color: var(--text-bright); text-align: center; max-width: 80px; }
        .slot-progress { font-size: 6px; color: var(--muted); }
        
        /* Minecraft Buttons */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #4a3520 0%, #3d2914 100%); border-top: 3px solid #5d3a1a; padding: 6px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .act { 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 3px solid #8b5a2b;
            border-top-color: #a0522d;
            border-bottom-color: #3d2914;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }
        .act:active { transform: translateY(2px); }
        .act.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; }
        .act .i { font-size: 18px; }
        .act .t { font-size: 6px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 10px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: var(--dark); border: 3px solid #000; border-radius: 8px; width: 100%; max-width: 350px; max-height: 85vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #000; }
        .mtit { font-size: 11px; color: var(--gold); }
        .mclose { background: #8b0000; border: 2px solid #5a0000; color: #fff; font-size: 14px; width: 28px; height: 28px; }
        .mbody { padding: 10px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .item { background: var(--stone); border: 2px solid #000; border-radius: 6px; padding: 8px; text-align: center; }
        .item.off { opacity: 0.5; }
        .item .ii { font-size: 22px; }
        .item .in { font-size: 7px; margin: 4px 0 2px; color: var(--text-bright); }
        .item .id { font-size: 6px; color: var(--muted); }
        .item .ip { font-size: 8px; color: var(--gold); margin-top: 4px; }
        
        /* Cards */
        .card { background: var(--stone); border: 2px solid #000; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
        .card-t { font-size: 10px; color: var(--gold); margin-bottom: 6px; }
        .card-r { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; font-size: 7px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
        .stat-box { background: var(--stone); border: 2px solid #000; border-radius: 6px; padding: 8px; text-align: center; }
        .stat-box .icon { font-size: 16px; }
        .stat-box .value { font-size: 12px; color: var(--text-bright); margin: 4px 0; }
        .stat-box .label { font-size: 6px; color: var(--muted); }
        
        /* Progress */
        .prog { height: 6px; background: #000; border-radius: 3px; overflow: hidden; }
        .prog-f { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--dark); border: 2px solid var(--gold); border-radius: 8px; padding: 12px; text-align: center; z-index: 2000; display: none; }
        .toast.show { display: block; }
        .toast-t { font-size: 12px; color: var(--gold); }
        .toast-x { font-size: 8px; margin-top: 4px; }
        
        /* Tutorial */
        .tut { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; z-index: 3000; }
        .tut.h { display: none; }
        .tut h1 { font-size: 14px; color: var(--green); margin-bottom: 12px; }
        .tut-g { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 300px; }
        .tut-b { background: var(--stone); border-radius: 8px; padding: 12px; }
        .tut-b h2 { font-size: 9px; color: var(--gold); margin-bottom: 4px; }
        .tut-b p { font-size: 7px; color: var(--muted); }
        .tut-s { background: var(--green); border: 2px solid #000; color: #000; font-size: 11px; padding: 12px 32px; border-radius: 6px; margin-top: 16px; }
        
        /* Genes */
        .genes { display: flex; gap: 2px; margin-top: 4px; }
        .gene { width: 10px; height: 10px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 6px; }
        .gene-t { background: #f85149; }
        .gene-c { background: #238636; }
        .gene-y { background: #f0883e; }
        .gene-s { background: #58a6ff; }
        .gene-r { background: #a371f7; }
        
        /* Lesson */
        .lesson-card { background: var(--stone); border: 2px solid #000; border-radius: 6px; padding: 10px; margin-bottom: 6px; }
        .lesson-card h3 { font-size: 9px; color: var(--text-bright); margin-bottom: 6px; }
        .lesson-card p { font-size: 7px; color: var(--muted); line-height: 1.5; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="tut" id="tut">
        <h1>🌿 Grow Craft</h1>
        <div class="tut-g">
            <div class="tut-b"><h2>🌱</h2><p>Тапай на слоты</p></div>
            <div class="tut-b"><h2>🧬</h2><p>Генетика и скрещивание</p></div>
            <div class="tut-b"><h2>📚</h2><p>Обучение гровингу</p></div>
            <div class="tut-b"><h2>🔬</h2><p>Исследования</p></div>
        </div>
        <button class="tut-s" id="start">▶ ИГРАТЬ</button>
    </div>

    <div class="app">
        <div class="head">
            <div class="logo"><span class="logo-icon">🌿</span><span class="logo-text">Grow Craft</span></div>
            <div class="stats">
                <div class="stat"><div class="stat-v" id="lvl">1</div><div class="stat-l">LVL</div></div>
                <div class="stat"><div class="stat-v" id="day">1</div><div class="stat-l">DAY</div></div>
                <div class="stat"><div class="stat-v" id="mny">500</div><div class="stat-l">💰</div></div>
                <div class="stat"><div class="stat-v" id="xp">0</div><div class="stat-l">XP</div></div>
                <div class="speed">
                    <button class="on" data-s="1">1x</button>
                    <button data-s="2">2x</button>
                    <button data-s="5">5x</button>
                    <button data-s="10">10x</button>
                </div>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab on" data-t="grow">🌱</button>
            <button class="tab" data-t="shop">🏪</button>
            <button class="tab" data-t="breed">🧬</button>
            <button class="tab" data-t="research">🔬</button>
            <button class="tab" data-t="learn">📚</button>
            <button class="tab" data-t="stats">📊</button>
        </div>

        <div class="content" id="content"></div>

        <div class="actions">
            <button class="act" data-a="plant"><span class="i">🌱</span><span class="t">Посадить</span></button>
            <button class="act" data-a="water"><span class="i">💧</span><span class="t">Полить</span></button>
            <button class="act" data-a="nutrient"><span class="i">🧪</span><span class="t">Удобрения</span></button>
            <button class="act" data-a="harvest"><span class="i">✂️</span><span class="t">Собрать</span></button>
            <button class="act" data-a="save"><span class="i">💾</span><span class="t">Сейв</span></button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="seedModal"><div class="box"><div class="mhead"><div class="mtit">🌱 Семена</div><button class="mclose" data-c="seedModal">✕</button></div><div class="mbody"><div class="grid" id="seedGrid"></div></div></div></div>
    <div class="modal" id="nutrModal"><div class="box"><div class="mhead"><div class="mtit">🧪 Удобрения</div><button class="mclose" data-c="nutrModal">✕</button></div><div class="mbody"><div class="grid" id="nutrGrid"></div></div></div></div>
    <div class="modal" id="infoModal"><div class="box"><div class="mhead"><div class="mtit" id="infoTit">Инфо</div><button class="mclose" data-c="infoModal">✕</button></div><div class="mbody" id="infoBody"></div></div></div>
    <div class="toast" id="toast"><div class="toast-t" id="tt"></div><div class="toast-x" id="tx"></div></div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        
        // Data
        const strains = [
            { id: 'nl', name: 'Northern Lights', type: 'Indica', icon: '🌿', thc: 18, yld: 400, price: 50 },
            { id: 'ww', name: 'White Widow', type: 'Hybrid', icon: '🍃', thc: 20, yld: 450, price: 60 },
            { id: 'bd', name: 'Blue Dream', type: 'Sativa', icon: '💠', thc: 21, yld: 500, price: 70 },
            { id: 'og', name: 'OG Kush', type: 'Hybrid', icon: '🌲', thc: 23, yld: 480, price: 120 },
            { id: 'gl', name: 'Gelato', type: 'Hybrid', icon: '🍦', thc: 27, yld: 400, price: 150 },
            { id: 'gg', name: 'Gorilla Glue', type: 'Hybrid', icon: '🦍', thc: 30, yld: 550, price: 180 },
            { id: 'sk', name: 'Skunk #1', type: 'Hybrid', icon: '🦨', thc: 19, yld: 420, price: 40 },
            { id: 'cm', name: 'Critical Mass', type: 'Indica', icon: '⚖️', thc: 20, yld: 600, price: 45 }
        ];
        
        const stageIcons = ['🌱', '🌿', '🪴', '🌳', '🌸', '🌺', '🌻'];
        const stageNames = ['Семя', 'Росток', 'Сеянец', 'Вегетация', 'Преф.', 'Цветение', 'Harvest'];
        
        // State
        let S = {
            day: 1, time: 6, speed: 1, money: 500, xp: 0, level: 1,
            plants: [], slots: 6, selected: null,
            inv: { grow: 5, bloom: 3, calmag: 2, pk: 1 },
            research: [
                { id: 'gen', name: 'Генетика', desc: 'Показывает гены', cost: 150, done: false },
                { id: 'breed', name: 'Скрещивание', desc: 'Разблокирует', cost: 200, done: false },
                { id: 'yield', name: 'Урожайность', desc: '+30%', cost: 450, done: false }
            ],
            stats: { harvests: 0, planted: 0, bred: 0 },
            breed: [null, null]
        };
        
        let loop = null;
        
        function load() { const s = localStorage.getItem('gc5'); if (s) S = {...S, ...JSON.parse(s)}; }
        function save() { localStorage.setItem('gc5', JSON.stringify(S)); }
        
        function toast(t, x) {
            document.getElementById('tt').textContent = t;
            document.getElementById('tx').textContent = x;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 1500);
        }
        
        function tick() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }
            
            S.plants.forEach(p => {
                const lightMod = 1.2;
                p.progress += lightMod * S.speed * 0.05;
                p.water -= 0.2 * S.speed;
                if (p.water < 30) p.health -= 0.1 * S.speed;
                if (p.water > 80) p.health -= 0.05 * S.speed;
                p.health = Math.max(0, Math.min(100, p.health));
                p.stage = p.progress < 5 ? 0 : p.progress < 10 ? 1 : p.progress < 20 ? 2 : p.progress < 40 ? 3 : p.progress < 60 ? 4 : p.progress < 90 ? 5 : 6;
            });
            
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }
            update();
        }
        
        function update() {
            document.getElementById('lvl').textContent = S.level;
            document.getElementById('day').textContent = S.day;
            document.getElementById('mny').textContent = S.money;
            document.getElementById('xp').textContent = S.xp;
        }
        
        function render(tab) {
            const c = document.getElementById('content');
            
            if (tab === 'grow') {
                let html = '<div class="room">';
                for (let i = 0; i < S.slots; i++) {
                    const p = S.plants.find(x => x.slot === i);
                    const sel = S.selected === i ? 'sel' : '';
                    const ready = p && p.stage >= 6 ? 'ready' : '';
                    const icon = p ? stageIcons[p.stage] : '🌱';
                    const name = p ? p.strain.name.slice(0, 8) : 'ПУСТО';
                    const prog = p ? Math.floor(p.progress) + '%' : '';
                    
                    html += `<div class="slot ${sel} ${ready}" data-slot="${i}">
                        <div class="slot-icon">${icon}</div>
                        <div class="slot-name">${name}</div>
                        <div class="slot-progress">${prog}</div>
                    </div>`;
                }
                html += '</div>';
                c.innerHTML = html;
            }
            else if (tab === 'shop') {
                c.innerHTML = `<div class="card"><div class="card-t">🌱 Семена</div><div class="grid" id="seedGrid"></div></div>
                <div class="card"><div class="card-t">🧪 Удобрения</div><div class="grid" id="nutrGrid"></div></div>`;
                
                document.getElementById('seedGrid').innerHTML = strains.map(s => 
                    `<div class="item ${S.money < s.price ? 'off' : ''}" data-seed="${s.id}"><div class="ii">${s.icon}</div><div class="in">${s.name.slice(0, 8)}</div><div class="id">${s.type}</div><div class="ip">💰${s.price}</div></div>`
                ).join('');
                
                document.getElementById('nutrGrid').innerHTML = [
                    { id: 'grow', name: 'Grow Mix', icon: '🟢', desc: '+10% здоровье', inv: S.inv.grow },
                    { id: 'bloom', name: 'Bloom Mix', icon: '🟣', desc: '+урожай', inv: S.inv.bloom },
                    { id: 'calmag', name: 'Cal-Mag', icon: '💊', desc: '+15% здоровье', inv: S.inv.calmag },
                    { id: 'pk', name: 'PK Boost', icon: '⚡', desc: '+урожай', inv: S.inv.pk }
                ].map(n => `<div class="item ${!n.inv ? 'off' : ''}" data-nut="${n.id}"><div class="ii">${n.icon}</div><div class="in">${n.name}</div><div class="id">${n.desc}</div><div class="ip">x${n.inv}</div></div>`).join('');
            }
            else if (tab === 'breed') {
                c.innerHTML = `<div class="card"><div class="card-t">🧬 Скрещивание</div><p style="font-size:7px;color:var(--muted);margin-bottom:8px">Выбери 2 harvest растения</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                    <div class="item" id="b0"><div class="ii">🌱</div><div class="in">Родитель 1</div></div>
                    <div class="item" id="b1"><div class="ii">🌱</div><div class="in">Родитель 2</div></div>
                </div>
                <button class="tut-s" style="width:100%;margin-top:8px" id="breedBtn">🧬 Скрестить</button></div>`;
                [0, 1].forEach(i => {
                    const el = document.getElementById('b' + i);
                    const p = S.breed[i];
                    if (p) el.innerHTML = `<div class="ii">${p.strain.icon}</div><div class="in">${p.strain.name.slice(0, 6)}</div>`;
                });
            }
            else if (tab === 'research') {
                c.innerHTML = '<div class="card"><div class="card-t">🔬 Исследования</div></div>';
                S.research.forEach((r, i) => {
                    c.innerHTML += `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
                        <div><div style="font-size:8px">${r.name}</div><div style="font-size:6px;color:var(--muted)">${r.desc}</div></div>
                        ${r.done ? '<span style="color:var(--green)">✅</span>' : `<button class="tut-s" data-res="${i}" style="${S.xp >= r.cost ? '' : 'opacity:0.5'};font-size:7px;padding:6px 12px">🔓${r.cost}</button>`}
                    </div>`;
                });
            }
            else if (tab === 'learn') {
                const lessons = [
                    { id: 'basics', title: '🌱 Основы', unlocked: true },
                    { id: 'germ', title: '🌰 Проращивание', unlocked: S.stats.planted >= 1 },
                    { id: 'light', title: '💡 Свет', unlocked: S.stats.planted >= 2 },
                    { id: 'water', title: '💧 Полив', unlocked: S.stats.planted >= 3 },
                    { id: 'npk', title: '🧪 NPK', unlocked: S.stats.planted >= 4 },
                    { id: 'train', title: '🌿 Тренировка', unlocked: S.stats.harvests >= 1 },
                    { id: 'flower', title: '🌸 Цветение', unlocked: S.stats.harvests >= 2 },
                    { id: 'harvest', title: '✂️ Сбор', unlocked: S.stats.harvests >= 5 }
                ];
                c.innerHTML = '<div class="card"><div class="card-t">📚 Академия</div></div>';
                lessons.forEach(l => {
                    c.innerHTML += `<div class="card" style="display:flex;justify-content:space-between;align-items:center;cursor:${l.unlocked ? 'pointer' : 'not-allowed'};opacity:${l.unlocked ? 1 : 0.5}" data-lesson="${l.id}">
                        <span style="font-size:8px">${l.title}</span>
                        <span style="font-size:10px">${l.unlocked ? '▶' : '🔒'}</span>
                    </div>`;
                });
                c.innerHTML += '<div class="card" id="lessonContent" style="display:none;margin-top:8px"></div>';
            }
            else if (tab === 'stats') {
                const need = S.level * 100;
                c.innerHTML = `<div class="card"><div class="card-t">📊 Прогресс</div><div style="margin-bottom:8px;font-size:7px">Уровень ${S.level} • ${S.xp}/${need} XP</div><div class="prog"><div class="prog-f" style="width:${(S.xp/need)*100}%"></div></div></div>
                <div class="card"><div class="card-t">📈 Статистика</div>
                    <div class="card-r"><span>🌱 Посажено</span><span>${S.stats.planted}</span></div>
                    <div class="card-r"><span>✂️ Урожаев</span><span>${S.stats.harvests}</span></div>
                    <div class="card-r"><span>💰 Баланс</span><span>${S.money}</span></div>
                </div>`;
            }
        }
        
        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); return; }
            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает'); return; }
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: { t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'), c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'), y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'), s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'), r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r') },
                progress: 0, stage: 0, health: 100, water: 70
            });
            S.stats.planted++;
            S.xp += 5;
            document.getElementById('seedModal').classList.remove('open');
            render('grow');
            toast('🌱', strain.name);
            save();
        }
        
        function harvest(p) {
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100));
            S.money += yld * 2;
            S.xp += yld;
            S.stats.harvests++;
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            S.selected = null;
            document.getElementById('infoModal').classList.remove('open');
            toast('✂️', `${yld}г • +${yld * 2}💰`);
            render('grow');
            save();
        }
        
        function showInfo(p) {
            document.getElementById('infoTit').textContent = p.strain.name;
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100));
            const daysLeft = Math.max(0, Math.ceil((100 - p.progress) / (10 * S.speed)));
            
            let html = `<div class="stats-grid">
                <div class="stat-box"><div class="icon">📊</div><div class="value">${Math.floor(p.progress)}%</div><div class="label">Прогресс</div></div>
                <div class="stat-box"><div class="icon">⚖️</div><div class="value">${yld}г</div><div class="label">Урожай</div></div>
                <div class="stat-box"><div class="icon">⏱️</div><div class="value">${daysLeft}д</div><div class="label">Осталось</div></div>
                <div class="stat-box"><div class="icon">💰</div><div class="value">$${yld * 2}</div><div class="label">Прибыль</div></div>
            </div>
            <div class="card" style="margin-top:8px">
                <div class="card-r"><span>❤️ Здоровье</span><span>${Math.floor(p.health)}%</span></div>
                <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${p.health}%"></div></div>
                <div class="card-r" style="margin-top:6px"><span>💧 Вода</span><span>${Math.floor(p.water)}%</span></div>
                <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${p.water}%"></div></div>
            </div>`;
            
            if (S.research[0].done) {
                html += `<div class="card" style="margin-top:8px"><div style="font-size:8px;color:var(--gold);margin-bottom:6px">🧬 Гены</div>
                <div class="genes">${['t', 'c', 'y', 's', 'r'].map(g => `<div class="gene gene-${g}">${p.genes[g].includes(g.toUpperCase()) ? '★' : '○'}</div>`).join('')}</div></div>`;
            }
            
            if (p.stage >= 6) {
                html += `<button class="tut-s" style="width:100%;margin-top:8px" id="harvestBtn">✂️ Собрать урожай</button>`;
            } else {
                html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
                    <button class="tut-s" id="waterBtn">💧 Полить</button>
                    <button class="tut-s" id="nutrBtn">🧪 Удобрения</button>
                </div>`;
            }
            
            document.getElementById('infoBody').innerHTML = html;
            document.getElementById('infoModal').classList.add('open');
            
            if (p.stage >= 6) {
                document.getElementById('harvestBtn').addEventListener('click', () => harvest(p));
            } else {
                document.getElementById('waterBtn').addEventListener('click', () => { p.water = Math.min(100, p.water + 30); showInfo(p); toast('💧', 'Полито!'); save(); });
                document.getElementById('nutrBtn').addEventListener('click', () => { document.getElementById('infoModal').classList.remove('open'); document.getElementById('nutrModal').classList.add('open'); });
            }
        }
        
        // Events
        document.addEventListener('DOMContentLoaded', () => {
            load();
            document.getElementById('start').addEventListener('click', () => { document.getElementById('tut').classList.add('h'); loop = setInterval(tick, 1000); });
            document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(x => x.classList.remove('on')); t.classList.add('on'); render(t.dataset.t); }));
            document.querySelectorAll('[data-s]').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('[data-s]').forEach(x => x.classList.remove('on')); b.classList.add('on'); S.speed = parseInt(b.dataset.s); }));
            document.querySelectorAll('[data-a]').forEach(b => b.addEventListener('click', () => {
                const a = b.dataset.a;
                if (a === 'plant') { if (S.selected === null) toast('❌', 'Выбери слот'); else if (S.plants.find(p => p.slot === S.selected)) toast('❌', 'Слот занят'); else document.getElementById('seedModal').classList.add('open'); }
                else if (a === 'water') { if (S.plants.length === 0) toast('💧', 'Нет растений'); else { S.plants.forEach(p => p.water = Math.min(100, p.water + 30)); toast('💧', 'Полито!'); } }
                else if (a === 'nutrient') { if (S.selected === null) toast('❌', 'Выбери растение'); else document.getElementById('nutrModal').classList.add('open'); }
                else if (a === 'harvest') { if (S.selected === null) toast('❌', 'Выбери растение'); else { const p = S.plants.find(x => x.slot === S.selected); if (!p) toast('❌', 'Пусто'); else if (p.stage < 6) toast('❌', 'Не готово'); else harvest(p); } }
                else if (a === 'save') { save(); toast('💾', 'Сохранено!'); }
            }));
            
            document.getElementById('content').addEventListener('click', e => {
                const slot = e.target.closest('.slot');
                if (slot) {
                    const i = parseInt(slot.dataset.slot);
                    S.selected = i;
                    const p = S.plants.find(x => x.slot === i);
                    if (!p) document.getElementById('seedModal').classList.add('open');
                    else showInfo(p);
                    render('grow');
                }
                
                const seed = e.target.closest('[data-seed]');
                if (seed) plantSeed(seed.dataset.seed);
                
                const nut = e.target.closest('[data-nut]');
                if (nut) {
                    const id = nut.dataset.nut;
                    const n = { grow: 5, bloom: 3, calmag: 2, pk: 1 }[id];
                    if (!S.inv[id]) { toast('❌', 'Купи в магазине'); return; }
                    if (S.selected !== null) {
                        const p = S.plants.find(x => x.slot === S.selected);
                        if (p) { S.inv[id]--; p.health = Math.min(100, p.health + 15); toast('🧪', 'Применено'); save(); }
                    }
                    document.getElementById('nutrModal').classList.remove('open');
                }
                
                const res = e.target.closest('[data-res]');
                if (res) {
                    const r = S.research[parseInt(res.dataset.res)];
                    if (S.xp < r.cost) { toast('❌', 'Не хватает XP'); return; }
                    S.xp -= r.cost;
                    r.done = true;
                    toast('🔬', r.name);
                    render('research');
                    save();
                }
                
                const lesson = e.target.closest('[data-lesson]');
                if (lesson && !lesson.style.opacity) {
                    const lessons = {
                        basics: { title: '🌱 Основы гровинга', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Каннабис (Cannabis) — растение с фотопериодизмом. Зацветает при 12ч света.</p><p style="font-size:6px;line-height:1.5">• <b>Вегетация:</b> 18-24ч света<br>• <b>Цветение:</b> 12/12 света<br>• <b>THC</b> — психоактивное вещество<br>• <b>CBD</b> — медицинское</p>' },
                        germ: { title: '🌰 Проращивание', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Оптимальные условия для семян:</p><p style="font-size:6px;line-height:1.5">• Температура: <b>20-26°C</b><br>• Влажность: <b>70-90%</b><br>• pH воды: <b>6.0-6.5</b><br>• Всхожесть: 60-90%</p><p style="font-size:6px;color:#7fff7f;margin-top:8px">💡 Показался корешок? Сажай вниз!</p>' },
                        light: { title: '💡 Свет', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Спектр света важен для разных стадий:</p><p style="font-size:6px;line-height:1.5">• <b style="color:#58a6ff">Синий (400-500nm)</b> — вегетация<br>• <b style="color:#f0883e">Красный (600-700nm)</b> — цветение<br>• <b>PPFD:</b> 600-1000 µmol/m²/s</p>' },
                        water: { title: '💧 Полив', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">pH и полив — основа здоровья:</p><p style="font-size:6px;line-height:1.5">• <b>pH грунт:</b> 6.0-6.5<br>• <b>pH гидро:</b> 5.5-6.0<br>• <b>Lift test:</b> лёгкий горшок = пора поливать</p>' },
                        npk: { title: '🧪 NPK', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Макроэлементы для роста:</p><p style="font-size:6px;line-height:1.5">• <b style="color:#7fff7f">N (Азот)</b> — листья, вегетация<br>• <b style="color:#f0883e">P (Фосфор)</b> — корни, цветы<br>• <b style="color:#a371f7">K (Калий)</b> — иммунитет</p>' },
                        train: { title: '🌿 Тренировка', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">LST и topping увеличивают урожай:</p><p style="font-size:6px;line-height:1.5">• <b>LST</b> — низкий стресс, bend & tie<br>• <b>Topping</b> — срез верхушки над 5-6 узлом<br>• <b>Scrog</b> — сетка для ровной кроны</p>' },
                        flower: { title: '🌸 Цветение', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Определение готовности по трихомам:</p><p style="font-size:6px;line-height:1.5">• <b style="color:#fff">Прозрачные</b> — не готово<br>• <b style="color:#ddd">Мутные</b> — пик THC<br>• <b style="color:#c8a">Янтарные</b> — расслабляющий эффект</p>' },
                        harvest: { title: '✂️ Сбор', body: '<p style="font-size:7px;color:#8f8;margin-bottom:8px">Правильная сушка и пролечка:</p><p style="font-size:6px;line-height:1.5">• <b>Сушка:</b> 15-21°C, 45-55% RH, 7-14 дней<br>• <b>Curing:</b> стеклянные банки, 2-8 недель<br>• <b>Stem snap:</b> стебель хрустит = готово</p>' }
                    };
                    const l = lessons[e.target.dataset.lesson];
                    if (l) {
                        document.getElementById('lessonContent').innerHTML = `<div style="font-size:10px;color:var(--gold);margin-bottom:8px">${l.title}</div>${l.body}`;
                        document.getElementById('lessonContent').style.display = 'block';
                        S.xp += 10;
                        toast('📚', '+10 XP');
                        save();
                    }
                }
                
                const b0 = e.target.closest('#b0');
                const b1 = e.target.closest('#b1');
                if (b0 || b1) {
                    const idx = b0 ? 0 : 1;
                    const avail = S.plants.filter(p => p.stage >= 6);
                    if (avail.length === 0) { toast('❌', 'Нет harvest'); return; }
                    S.breed[idx] = avail[idx === 0 ? 0 : Math.min(1, avail.length - 1)];
                    const el = document.getElementById('b' + idx);
                    el.innerHTML = `<div class="ii">${S.breed[idx].strain.icon}</div><div class="in">${S.breed[idx].strain.name.slice(0, 6)}</div>`;
                }
                
                if (e.target.closest('#breedBtn')) {
                    if (!S.breed[0] || !S.breed[1]) { toast('❌', 'Выбери обоих'); return; }
                    if (S.plants.length >= S.slots) { toast('❌', 'Нет места'); return; }
                    const p1 = S.breed[0], p2 = S.breed[1];
                    const inh = (a, b) => a[Math.floor(Math.random() * 2)] + b[Math.floor(Math.random() * 2)];
                    S.plants.push({
                        slot: S.plants.length, strain: { id: 'c' + Date.now(), name: p1.strain.name.split(' ')[0] + '×' + p2.strain.name.split(' ')[0], type: 'Hybrid', icon: '🧬', thc: 20, yld: 450 },
                        genes: { t: inh(p1.genes.t, p2.genes.t), c: inh(p1.genes.c, p2.genes.c), y: inh(p1.genes.y, p2.genes.y), s: inh(p1.genes.s, p2.genes.s), r: inh(p1.genes.r, p2.genes.r) },
                        progress: 0, stage: 0, health: 100, water: 70
                    });
                    S.stats.bred++;
                    S.xp += 50;
                    S.breed = [null, null];
                    toast('🧬', 'Новый сорт!');
                    render('breed');
                    save();
                }
            });
            
            document.querySelectorAll('[data-c]').forEach(b => b.addEventListener('click', () => document.getElementById(b.dataset.c).classList.remove('open')));
            document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));
            
            render('grow');
            update();
        });
    </script>
</body>
</html>
