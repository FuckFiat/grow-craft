<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
            --dirt: #5d3a1a;
            --dirt-dark: #3d2914;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 10px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border-bottom: 3px solid #5d3a1a; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .logo { display: flex; align-items: center; gap: 6px; }
        .logo-icon { font-size: 18px; animation: sway-logo 3s ease-in-out infinite; }
        @keyframes sway-logo { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .logo-text { font-size: 11px; color: #7fff7f; text-shadow: 2px 2px 0 #000; }
        .stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .stat { text-align: center; min-width: 28px; }
        .stat-v { font-size: 11px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
        .stat-l { font-size: 6px; color: #8f8; }
        .speed { display: flex; gap: 3px; }
        .speed button { width: 28px; height: 22px; font-size: 8px; background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%); border: 2px solid #8b5a2b; color: #fff; }
        .speed button.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; }
        
        /* Tabs */
        .tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); padding: 4px 3px; gap: 2px; border-bottom: 3px solid #5d3a1a; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 6px 8px; font-size: 7px; background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%); border: 2px solid #8b5a2b; border-top-color: #a0522d; color: #fff; text-shadow: 1px 1px 0 #000; white-space: nowrap; }
        .tab.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; color: #000; text-shadow: none; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 65px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1117 100%); }
        
        /* Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 4px; }
        @media (max-width: 360px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        /* Pot */
        .pot { background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 50%, #5d3a1a 100%); border: 3px solid #3d2914; border-top-color: #8b5a2b; border-left-color: #a0522d; width: 100%; padding-bottom: 100%; position: relative; cursor: pointer; border-radius: 4px; }
        .pot:active { transform: translateY(2px); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 12px rgba(240,136,62,0.5); }
        .pot.ready { border-color: var(--green); animation: pot-ready 1.5s infinite; }
        @keyframes pot-ready { 0%, 100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 15px var(--green); } }
        .pot.dry { border-color: #8b4513; }
        .pot.sick { border-color: #8b0000; animation: pot-sick 0.5s infinite; }
        @keyframes pot-sick { 0%, 100% { box-shadow: 0 0 5px #8b0000; } 50% { box-shadow: 0 0 10px #8b0000; } }
        
        .pot-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .pot-soil { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 60%; background: linear-gradient(135deg, #3d2914 0%, #5d3a1a 50%, #4a3520 100%); border-radius: 4px; border: 2px solid #2d1f0f; }
        
        /* Mini bars */
        .mini-bars { position: absolute; top: 4px; left: 4px; right: 4px; display: flex; flex-direction: column; gap: 2px; z-index: 5; }
        .mini-bar { height: 4px; background: rgba(0,0,0,0.8); border-radius: 2px; overflow: hidden; }
        .mini-bar-fill { height: 100%; transition: width 0.3s; }
        .mini-bar-fill.water { background: linear-gradient(90deg, #1e90ff, #00bfff); }
        .mini-bar-fill.health { background: linear-gradient(90deg, #238636, #4a8a4a); }
        
        /* Plants - CSS Art */
        .plant-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2; }
        .plant-real { position: relative; }
        
        .plant-0 { width: 12px; height: 12px; background: radial-gradient(ellipse 6px 8px at center, #8b6914 0%, #5d4a0f 100%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3); }
        
        .plant-1 { width: 40px; height: 30px; animation: sway 2s ease-in-out infinite; }
        .plant-1::before, .plant-1::after { content: ''; position: absolute; width: 18px; height: 25px; background: linear-gradient(135deg, #4a8 0%, #3a7a3a 50%, #2d6a2d 100%); clip-path: polygon(50% 0%, 60% 20%, 80% 15%, 70% 35%, 90% 30%, 80% 50%, 100% 50%, 85% 70%, 95% 85%, 75% 80%, 70% 100%, 50% 85%, 30% 100%, 25% 80%, 5% 85%, 15% 70%, 0% 50%, 20% 50%, 10% 30%, 30% 35%, 20% 15%, 40% 20%); }
        .plant-1::before { left: 2px; transform: rotate(-15deg); }
        .plant-1::after { right: 2px; transform: rotate(15deg); }
        
        .plant-2 { width: 50px; height: 45px; background: radial-gradient(ellipse 22px 20px at center, #5a9a5a 0%, #4a8a4a 40%, #3a7a3a 100%); clip-path: polygon(50% 0%, 55% 15%, 70% 10%, 65% 25%, 80% 20%, 75% 35%, 90% 30%, 85% 45%, 100% 45%, 90% 60%, 100% 65%, 85% 75%, 95% 90%, 75% 85%, 70% 100%, 50% 90%, 30% 100%, 25% 85%, 5% 90%, 15% 75%, 0% 65%, 10% 60%, 0% 45%, 15% 45%, 10% 30%, 25% 35%, 20% 20%, 35% 25%, 30% 10%, 45% 15%); animation: sway 2.5s ease-in-out infinite; }
        
        .plant-3 { width: 60px; height: 55px; background: radial-gradient(ellipse 30px 28px at center, #6aba6a 0%, #4a9a4a 40%, #3a8a3a 80%, #2d7a2d 100%); border-radius: 45% 45% 50% 50%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); animation: sway 3s ease-in-out infinite; }
        
        .plant-4 { width: 70px; height: 65px; background: radial-gradient(ellipse 35px 32px at center, #6aba6a 0%, #4a9a4a 35%, #3a8a3a 70%, #2d7a2d 100%); border-radius: 45% 45% 50% 50%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2); position: relative; animation: sway 3s ease-in-out infinite; }
        .plant-4::after { content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 30px; height: 25px; background: radial-gradient(ellipse 15px 12px at center, rgba(255,182,193,0.8) 0%, rgba(255,150,170,0.6) 100%); border-radius: 50%; box-shadow: 0 0 8px rgba(255,150,170,0.4); }
        
        .plant-5 { width: 80px; height: 75px; background: radial-gradient(ellipse 40px 38px at center, #6aba6a 0%, #4a9a4a 25%, #3a8a3a 50%, #2d7a2d 100%); border-radius: 45% 45% 50% 50%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2); position: relative; animation: sway 3s ease-in-out infinite; }
        .plant-5::after { content: ''; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 50px; height: 45px; background: radial-gradient(ellipse 25px 22px at center, rgba(255,120,150,0.9) 0%, rgba(255,80,120,0.7) 60%, rgba(200,60,100,0.5) 100%); border-radius: 45%; box-shadow: 0 0 15px rgba(255,100,130,0.5); }
        
        .plant-6 { width: 90px; height: 85px; background: radial-gradient(ellipse 45px 42px at center, #5aba5a 0%, #4a9a4a 15%, #3a8a3a 30%, #2d7a2d 100%); border-radius: 45% 45% 50% 50%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.25), inset 4px 4px 0 rgba(255,255,255,0.06), 0 0 20px rgba(255,255,255,0.2); position: relative; animation: harvest 4s ease-in-out infinite; }
        .plant-6::after { content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 60px; height: 55px; background: radial-gradient(ellipse 12px 10px at 25% 30%, rgba(255,100,130,0.95) 0%, rgba(220,70,110,0.8) 100%), radial-gradient(ellipse 14px 11px at 75% 30%, rgba(255,100,130,0.95) 0%, rgba(220,70,110,0.8) 100%), radial-gradient(ellipse 15px 12px at 50% 50%, rgba(255,80,120,0.9) 0%, rgba(200,50,90,0.7) 100%); border-radius: 45%; box-shadow: 0 0 25px rgba(255,100,120,0.6); }
        .plant-6 .crystals { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 70px; height: 65px; pointer-events: none; }
        .plant-6 .crystals::before { content: ''; position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,0.9); border-radius: 50%; box-shadow: 10px 5px 0 rgba(255,255,255,0.8), 20px 2px 0 rgba(255,255,255,0.9), 30px 8px 0 rgba(255,255,255,0.7), 40px 3px 0 rgba(255,255,255,0.9), 50px 10px 0 rgba(255,255,255,0.8), 5px 15px 0 rgba(255,255,255,0.7), 15px 20px 0 rgba(255,255,255,0.9), 25px 18px 0 rgba(255,255,255,0.8), 35px 22px 0 rgba(255,255,255,0.9), 45px 17px 0 rgba(255,255,255,0.7), 55px 25px 0 rgba(255,255,255,0.8); animation: crystals 2s ease-in-out infinite; }
        
        @keyframes sway { 0%, 100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
        @keyframes harvest { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes crystals { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        .pot-name { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 6px; color: #fff; text-shadow: 1px 1px 0 #000; }
        .pot-progress { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 8px; color: #7fff7f; text-shadow: 1px 1px 0 #000; }
        
        /* Actions */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border-top: 3px solid #5d3a1a; padding: 4px 3px; display: flex; gap: 3px; z-index: 100; }
        .act { flex: 1; background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%); border: 2px solid #8b5a2b; padding: 6px 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; color: #fff; text-shadow: 1px 1px 0 #000; min-width: 0; }
        .act:active { transform: translateY(1px); }
        .act .i { font-size: 14px; }
        .act .t { font-size: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 10px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: linear-gradient(180deg, #2d1f0f 0%, #1a1a2e 100%); border: 3px solid #5d3a1a; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 3px solid #5d3a1a; }
        .mtit { font-size: 11px; color: #7fff7f; }
        .mclose { background: #8b0000; border: 2px solid #5a0000; color: #fff; font-size: 14px; width: 28px; height: 28px; cursor: pointer; }
        .mbody { padding: 10px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .item { background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 100%); border: 2px solid #8b5a2b; padding: 8px; text-align: center; cursor: pointer; }
        .item.off { opacity: 0.5; }
        .item .ii { font-size: 20px; }
        .item .in { font-size: 8px; margin: 3px 0 2px; color: var(--text-bright); }
        .item .id { font-size: 6px; color: var(--muted); }
        .item .ip { font-size: 8px; color: var(--gold); margin-top: 3px; }
        
        /* Cards */
        .card { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; margin-bottom: 8px; }
        .card-t { font-size: 10px; color: #7fff7f; margin-bottom: 6px; }
        .card-r { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #5d3a1a; font-size: 8px; }
        .card-p { font-size: 8px; color: #8f8; line-height: 1.5; margin-top: 6px; }
        
        /* Section */
        .section { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; padding: 8px; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; }
        .section-icon { font-size: 18px; }
        .section-title { font-size: 10px; color: #7fff7f; }
        .section-desc { font-size: 7px; color: #8f8; margin-top: 2px; }
        
        /* Equip */
        .equip-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .equip-item { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; cursor: pointer; }
        .equip-item.owned { border-color: #238636; }
        .equip-item .ei { font-size: 18px; margin-bottom: 4px; }
        .equip-item .en { font-size: 9px; color: #7fff7f; }
        .equip-item .ed { font-size: 7px; color: #8f8; margin: 4px 0; }
        .equip-item .ec { font-size: 8px; color: var(--gold); }
        
        /* Lesson */
        .lesson { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .lesson h3 { font-size: 9px; color: #7fff7f; margin-bottom: 5px; }
        .lesson p { font-size: 7px; color: #c9d1d9; line-height: 1.5; }
        
        /* Quiz */
        .quiz-opt { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 8px; font-size: 8px; color: #c9d1d9; cursor: pointer; margin-bottom: 6px; }
        .quiz-opt:hover { border-color: #6aba6a; }
        .quiz-opt.correct { border-color: #238636; background: linear-gradient(180deg, #1a4a2a 0%, #0d2a1a 100%); }
        .quiz-opt.wrong { border-color: #8b0000; background: linear-gradient(180deg, #4a2a2a 0%, #2a1a1a 100%); }
        .quiz-exp { font-size: 7px; color: #8f8; margin-top: 8px; padding: 6px; background: rgba(0,0,0,0.3); border-radius: 4px; }
        
        /* Research */
        .research-item { background: linear-gradient(180deg, #1a2d2a 0%, #0d1a17 100%); border: 2px solid #2d5a5a; padding: 10px; margin-bottom: 6px; cursor: pointer; }
        .research-item.done { border-color: #238636; }
        .research-item h4 { font-size: 9px; color: #4a9aaa; margin-bottom: 4px; }
        .research-item p { font-size: 7px; color: #8f8; }
        .research-item .cost { font-size: 8px; color: var(--gold); margin-top: 4px; }
        
        /* Breeding */
        .breed-pair { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .breed-slot { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 10px; text-align: center; min-height: 60px; }
        .breed-arrow { font-size: 18px; color: var(--gold); }
        .breed-btn { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border: 2px solid #5aaa5a; color: #fff; padding: 10px 20px; font-size: 10px; cursor: pointer; }
        .breed-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Genes */
        .genes { display: flex; gap: 3px; margin-top: 5px; }
        .gene { width: 14px; height: 14px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .gene-t { background: #f85149; }
        .gene-c { background: #238636; }
        .gene-y { background: #f0883e; }
        .gene-s { background: #58a6ff; }
        .gene-r { background: #a371f7; }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, #2d5a2d 0%, #1a3d1a 100%); border: 2px solid #3a5a3a; padding: 12px; text-align: center; z-index: 2000; display: none; }
        .toast.show { display: block; }
        .toast-t { font-size: 12px; color: #7fff7f; }
        .toast-x { font-size: 9px; margin-top: 4px; color: #8f8; }
        
        /* Tutorial */
        .tut { position: fixed; inset: 0; background: linear-gradient(180deg, #1a3d1a 0%, #0d1117 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; z-index: 3000; }
        .tut.h { display: none; }
        .tut h1 { font-size: 14px; color: #7fff7f; margin-bottom: 12px; }
        .tut-g { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 280px; }
        .tut-b { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border: 2px solid #5d3a1a; padding: 12px; text-align: center; }
        .tut-b h2 { font-size: 18px; margin-bottom: 4px; }
        .tut-b p { font-size: 7px; color: #8f8; }
        .tut-s { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border: 2px solid #2d5a2d; color: #000; font-size: 11px; padding: 12px 28px; margin-top: 14px; cursor: pointer; }
        
        /* Monster & Mega hybrids */
        .monster-card { background: linear-gradient(180deg, #4a1a4a 0%, #2d0d2d 100%); border: 2px solid #8a2a8a; padding: 10px; margin-bottom: 8px; }
        .monster-card .name { font-size: 10px; color: #ff88ff; margin-bottom: 5px; }
        .monster-card .stats { font-size: 7px; color: #dda0dd; }
        .monster-card .genes { margin-top: 8px; }
        
        .mega-card { background: linear-gradient(180deg, #1a4a4a 0%, #0d2d2d 100%); border: 2px solid #2a8a8a; padding: 10px; margin-bottom: 8px; }
        .mega-card .name { font-size: 10px; color: #88ffff; margin-bottom: 5px; }
        .mega-card .stats { font-size: 7px; color: #a0dddd; }
    </style>
</head>
<body>
    <div class="tut" id="tut">
        <h1>🌿 Grow Craft</h1>
        <div class="tut-g">
            <div class="tut-b"><h2>🌱</h2><p>Выращивай</p></div>
            <div class="tut-b"><h2>🧬</h2><p>Скрещивай</p></div>
            <div class="tut-b"><h2>🔬</h2><p>Исследуй</p></div>
            <div class="tut-b"><h2>👾</h2><p>Монстры</p></div>
        </div>
        <button class="tut-s" id="startBtn">▶ НАЧАТЬ</button>
    </div>

    <div class="app">
        <div class="head">
            <div class="logo"><span class="logo-icon">🌿</span><span class="logo-text">Grow Craft</span></div>
            <div class="stats">
                <div class="stat"><div class="stat-v" id="lvl">1</div><div class="stat-l">LVL</div></div>
                <div class="stat"><div class="stat-v" id="day">1</div><div class="stat-l">DAY</div></div>
                <div class="stat"><div class="stat-v" id="mny">500</div><div class="stat-l">💰</div></div>
                <div class="stat"><div class="stat-v" id="xp">0</div><div class="stat-l">XP</div></div>
                <div class="stat"><div class="stat-v" id="sci">0</div><div class="stat-l">🔬</div></div>
                <div class="speed">
                    <button class="on" data-s="1">1x</button>
                    <button data-s="2">2x</button>
                    <button data-s="5">5x</button>
                    <button data-s="10">10x</button>
                </div>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab on" data-t="grow">🌱</button>
            <button class="tab" data-t="shop">🏪</button>
            <button class="tab" data-t="equip">🔧</button>
            <button class="tab" data-t="lab">🧪</button>
            <button class="tab" data-t="breed">🧬</button>
            <button class="tab" data-t="monster">👾</button>
            <button class="tab" data-t="learn">📚</button>
            <button class="tab" data-t="stats">📊</button>
        </div>

        <div class="content" id="content"></div>

        <div class="actions">
            <button class="act" data-a="plant"><span class="i">🌱</span><span class="t">Посадить</span></button>

        function tick() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }
            
            const equipBonus = S.equipment.reduce((sum, id) => { const e = equipment.find(x => x.id === id); return sum + (e?.bonus?.speed || 1) - 1; }, 1);
            const hasLab = S.lab.length > 0 ? 1.1 : 1;
            const yieldBonus = S.research.find(r => r.id === 'yield')?.done ? 1.3 : 1;
            
            S.plants.forEach(p => {
                if (p.stage < 6) {
                    p.progress += (1.2 * S.speed * 0.05) * equipBonus * hasLab * p.strain.speed;
                    p.water -= 0.2 * S.speed;
                    if (p.water < 30) p.health -= 0.1 * S.speed;
                    if (p.water > 80) p.health -= 0.05 * S.speed;
                    p.health = Math.max(0, Math.min(100, p.health));
                    p.stage = p.progress < 5 ? 0 : p.progress < 12 ? 1 : p.progress < 25 ? 2 : p.progress < 45 ? 3 : p.progress < 70 ? 4 : p.progress < 95 ? 5 : 6;
                }
            });
            
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }
            update();
            save();
        }

                            (l.id === 'harvest' && S.stats.harvests >= 5) ||
                            (l.id === 'genetics' && S.research.find(r => r.id === 'gen')?.done) ||
                            (l.id === 'pests' && S.stats.planted >= 10);
            if (!unlocked) { toast('🔒', 'Разблокируется позже'); return; }
            
            let html = `<h3 style="font-size:11px;color:#7fff7f;margin-bottom:10px">${l.title}</h3>`;
            l.content.forEach(c => {
                html += `<div style="margin-bottom:10px"><div style="font-size:9px;color:#f0883e;margin-bottom:4px">${c.title}</div><div style="font-size:8px;color:#c9d1d9;line-height:1.5">${c.text}</div></div>`;
            });
            
            if (!S.completedQuizzes.includes(id) && l.quiz) {
                html += `<button class="breed-btn" style="width:100%;margin-top:10px" onclick="showQuiz('${id}')">❓ Пройти квиз (+30 XP)</button>`;

                html += `<div style="margin-top:10px;font-size:8px;color:#7fff7f">✅ Квиз пройден</div>`;

        function showQuiz(id) {
            const l = lessons.find(x => x.id === id);
            if (!l || !l.quiz) return;
            
            let html = `<div style="font-size:10px;color:#7fff7f;margin-bottom:8px">${l.quiz.question}</div>`;
            l.quiz.options.forEach((opt, i) => {
                html += `<div class="quiz-opt" onclick="checkQuiz('${id}', ${i})">${String.fromCharCode(65 + i)}. ${opt}</div>`;
            });
            
            document.getElementById('quizTit').textContent = '❓ ' + l.title;
            document.getElementById('quizBody').innerHTML = html;
            document.getElementById('quizModal').classList.add('open');

        window.checkQuiz = function(id, selected) {
            const l = lessons.find(x => x.id === id);
            if (!l || !l.quiz) return;
            
            const correct = l.quiz.correct;
            const isCorrect = selected === correct;
            
            document.querySelectorAll('.quiz-opt').forEach((opt, i) => {
                if (i === correct) opt.classList.add('correct');
                else if (i === selected && !isCorrect) opt.classList.add('wrong');
            });
            
            if (isCorrect && !S.completedQuizzes.includes(id)) {
                S.completedQuizzes.push(id);
                S.xp += 30;
                S.sciencePoints += 10;
                toast(isCorrect ? '✅' : '❌', isCorrect ? '+30 XP, +10 🔬' : 'Попробуй ещё раз');
                save();
                update();
            }
        };
        
        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); return; }
            const strain = strains.find(s => s.id === id);
            if (!strain) return;
            
            // Check if monster/mega unlocked
            if (strain.monster && !S.research.find(r => r.id === 'monster')?.done) { toast('🔒', 'Исследуй монстр-растения'); return; }
            if (strain.mega && !S.research.find(r => r.id === 'mega')?.done) { toast('🔒', 'Исследуй мега-гибриды'); return; }
            if (S.money < strain.price) { toast('❌', 'Не хватает'); return; }
            
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: { t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'), c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'), y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'), s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'), r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r') },
                progress: 0, stage: 0, health: 100, water: 70, waterHistory: [], healthHistory: []
            });
            S.stats.planted++;
            S.xp += 5;
            document.getElementById('seedModal').classList.remove('open');
            render('grow');
            toast('🌱', strain.name);
            save();
        }
        
        function buyNutrient(id) {
            const n = nutrients.find(x => x.id === id);
            if (S.money < n.price) { toast('❌', 'Не хватает'); return; }
            S.money -= n.price;
            S.inv[id] = (S.inv[id] || 0) + 1;
            toast('🧪', n.name + ' куплено');
            save();
            update();
        }
        
        function buyEquipment(id) {
            if (S.equipment.includes(id)) { toast('❌', 'Уже есть'); return; }
            const e = equipment.find(x => x.id === id);
            if (S.money < e.price) { toast('❌', 'Не хватает'); return; }
            
            if (e.bonus?.slots) { S.slots += e.bonus.slots; }
            S.money -= e.price;
            S.equipment.push(id);
            toast('🔧', e.name);
            save();
            update();
            render('equip');
        }
        
        function buyLab(id) {
            if (S.lab.includes(id)) { toast('❌', 'Уже есть'); return; }
            const l = labItems.find(x => x.id === id);
            if (S.money < l.price) { toast('❌', 'Не хватает'); return; }
            S.money -= l.price;
            S.lab.push(id);
            toast('🔬', l.name);
            save();
            render('lab');
        }
        
        function buyResearch(id) {
            const r = S.research.find(x => x.id === id);
            if (!r || r.done) { toast('❌', 'Уже исследовано'); return; }
            if (S.sciencePoints < r.cost) { toast('❌', 'Нужно больше 🔬'); return; }
            
            S.sciencePoints -= r.cost;
            r.done = true;
            toast('🧬', r.name + ' разблокировано');
            save();
            update();
            render('lab');
        }
        
        function harvest(p) {
            const yieldBonus = S.research.find(r => r.id === 'yield')?.done ? 1.3 : 1;
            const qualityBonus = S.research.find(r => r.id === 'quality')?.done ? 1.15 : 1;
            const labBonus = S.lab.includes('dryer') ? 1.2 : 1;
            
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100) * yieldBonus);
            const thc = Math.floor(p.strain.thc * (p.genes.t.includes('T') ? 1.2 : 0.9) * qualityBonus * labBonus);
            
            S.money += yld * 3;
            S.xp += yld;
            S.sciencePoints += Math.floor(thc / 5);
            S.stats.harvests++;
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            S.selected = null;
            
            document.getElementById('infoModal').classList.remove('open');
            toast('✂️', `${yld}г • THC ${thc}% • +$${yld * 3}`);
            render('grow');
            save();
        }
        
        function showInfo(p) {
            const yieldBonus = S.research.find(r => r.id === 'yield')?.done ? 1.3 : 1;
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100) * yieldBonus);
            const daysLeft = Math.max(0, Math.ceil((100 - p.progress) / (10 * S.speed)));
            
            let html = `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px">

                <div class="stat-box"><div class="icon">⏱️</div><div class="value">${daysLeft}д</div><div class="label">Осталось</div></div>
                <div class="stat-box"><div class="icon">💰</div><div class="value">$${yld * 3}</div><div class="label">Прибыль</div></div>
            </div>
            <div class="card">
                <div class="card-r"><span>❤️ Здоровье</span><span>${Math.floor(p.health)}%</span></div>

                <div class="card-r" style="margin-top:8px"><span>💧 Вода</span><span>${Math.floor(p.water)}%</span></div>
                <div style="height:6px;background:#000;border-radius:3px;overflow:hidden;margin-top:4px"><div style="height:100%;width:${p.water}%;background:linear-gradient(90deg,#1e90ff,#00bfff)"></div></div>
            </div>`;
            
            if (S.research.find(r => r.id === 'gen')?.done) {
                html += `<div class="card" style="margin-top:10px"><div style="font-size:9px;color:#7fff7f;margin-bottom:8px">🧬 Гены</div>
                <div class="genes">${['t', 'c', 'y', 's', 'r'].map(g => `<div class="gene gene-${g}">${p.genes[g].includes(g.toUpperCase()) ? '★' : '○'}</div>`).join('')}</div>
                <div style="font-size:7px;color:#8f8;margin-top:5px">T=THC C=CBD Y=Урожай S=Скорость R=Иммунитет</div></div>`;
            }
            
            if (p.stage >= 6) {
                html += `<button class="tut-s" style="width:100%;margin-top:10px" onclick="harvest(S.plants.find(x => x.slot === ${p.slot}))">✂️ Собрать урожай</button>`;
            } else {
                html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
                    <button class="tut-s" onclick="waterPlant()">💧 Полить</button>
                    <button class="tut-s" onclick="document.getElementById('infoModal').classList.remove('open');document.getElementById('nutrModal').classList.add('open');">🧪 Удобрения</button>
                </div>`;
            }
            
            document.getElementById('infoTit').textContent = p.strain.name;
            document.getElementById('infoBody').innerHTML = html;
            document.getElementById('infoModal').classList.add('open');
            
            window.waterPlant = function() {
                p.water = Math.min(100, p.water + 30);
                p.health = Math.min(100, p.health + 2);
                showInfo(p);
                toast('💧', 'Полито!');
                save();
            };
        }
        
        function selectBreed(slot) {
            const readyPlants = S.plants.filter(p => p.stage >= 6);
            if (readyPlants.length === 0) { toast('❌', 'Нет готовых растений'); return; }
            
            let html = `<div style="font-size:10px;color:#7fff7f;margin-bottom:10px">Выбери растение для слота ${slot + 1}</div>`;
            html += '<div class="grid">' + readyPlants.map(p => 
                `<div class="item" onclick="setBreed(${slot}, ${S.plants.indexOf(p)})"><div class="ii">${p.strain.icon}</div><div class="in">${p.strain.name.slice(0, 8)}</div><div class="id">THC ${p.strain.thc}%</div></div>`
            ).join('') + '</div>';
            
            document.getElementById('infoTit').textContent = '🧬 Выбор родителя';
            document.getElementById('infoBody').innerHTML = html;
            document.getElementById('infoModal').classList.add('open');
        }
        
        window.setBreed = function(slot, plantIdx) {
            S.breed[slot] = S.plants[plantIdx];
            document.getElementById('breedSlot' + slot).textContent = S.breed[slot].strain.name.slice(0, 8);
            document.getElementById('infoModal').classList.remove('open');
            render('breed');
            save();
        };
        
        window.doBreed = function() {
            if (!S.breed[0] || !S.breed[1]) { toast('❌', 'Выбери 2 растения'); return; }
            if (S.money < 100) { toast('❌', 'Нужно 100💰'); return; }
            
            S.money -= 100;
            
            // Mendelian inheritance
            const childGenes = {};
            ['t', 'c', 'y', 's', 'r'].forEach(g => {
                const p1 = S.breed[0].genes[g];
                const p2 = S.breed[1].genes[g];
                const allele1 = p1[Math.floor(Math.random() * 2)];
                const allele2 = p2[Math.floor(Math.random() * 2)];
                childGenes[g] = allele1 + allele2;
            });
            
            // Average stats
            const parent1 = S.breed[0].strain;
            const parent2 = S.breed[1].strain;
            const childStrain = {
                id: 'bred_' + Date.now(),
                name: parent1.name.slice(0, 4) + ' x ' + parent2.name.slice(0, 4),
                type: parent1.type === parent2.type ? parent1.type : 'Hybrid',
                icon: Math.random() > 0.5 ? parent1.icon : parent2.icon,
                thc: Math.floor((parent1.thc + parent2.thc) / 2 + Math.random() * 5),
                yld: Math.floor((parent1.yld + parent2.yld) / 2 + Math.random() * 50),
                price: Math.floor((parent1.price + parent2.price) / 2),
                speed: (parent1.speed + parent2.speed) / 2
            };
            
            // Find empty slot
            const emptySlot = [...Array(S.slots).keys()].find(i => !S.plants.find(p => p.slot === i));
            if (emptySlot === undefined) { toast('❌', 'Нет слотов'); return; }
            
            S.plants.push({
                slot: emptySlot,
                strain: childStrain,
                genes: childGenes,
                progress: 0, stage: 0, health: 100, water: 70
            });
            
            S.stats.bred++;
            S.xp += 20;
            S.sciencePoints += 5;
            toast('🧬', childStrain.name + ' создан!');
            S.breed = [null, null];
            save();
            render('breed');
        };
        
        window.addToBreed = function(idx) {
            if (!S.breed[0]) S.breed[0] = S.plants[idx];
            else if (!S.breed[1]) S.breed[1] = S.plants[idx];
            else { S.breed[0] = S.plants[idx]; S.breed[1] = null; }
            render('breed');
        };
        
        function showActions(p) {
            const stageNames = ['Семя', 'Росток', 'Сеянец', 'Вегетация', 'Пре-флавер', 'Цветение', 'Harvest'];
            
            let html = `<div style="font-size:10px;color:#7fff7f;margin-bottom:8px">${p.strain.name} — ${stageNames[p.stage]}</div>`;
            html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:8px">
                <div style="background:#1a3d1a;padding:6px;border-radius:4px"><div style="color:#8f8">💧 Вода</div><div style="color:#fff;margin-top:3px">${Math.floor(p.water)}%</div></div>
                <div style="background:#1a3d1a;padding:6px;border-radius:4px"><div style="color:#8f8">❤️ Здоровье</div><div style="color:#fff;margin-top:3px">${Math.floor(p.health)}%</div></div>
            </div>`;
            
            // 8 actions
            const actions = [
                { id: 'trim', icon: '✂️', name: 'Тримминг', desc: 'Удалить лишние листья', stage: [3,4,5], cost: 0, effect: '+5% урожай' },
                { id: 'lst', icon: '🌿', name: 'LST', desc: 'Низкий стресс (гибка)', stage: [2,3], cost: 50, effect: '+15% урожай' },
                { id: 'topping', icon: '✂️', name: 'Топпинг', desc: 'Срезать верхушку', stage: [2,3], cost: 0, effect: '+2 колы' },
                { id: 'flush', icon: '💧', name: 'Промывка', desc: 'Очистить от удобрений', stage: [5,6], cost: 0, effect: '+20% качество' },
                { id: 'pesticide', icon: '🐛', name: 'Обработка', desc: 'Защита от вредителей', stage: [1,2,3,4,5], cost: 30, effect: '+10% здоровье' },
                { id: 'fungicide', icon: '🦠', name: 'Фунгицид', desc: 'Защита от плесени', stage: [4,5,6], cost: 40, effect: '+15% здоровье' },
                { id: 'check', icon: '🔬', name: 'Осмотр', desc: 'Проверить трихомы', stage: [5,6], cost: 0, effect: 'Информация' },
                { id: 'clone', icon: '🌱', name: 'Клон', desc: 'Создать копию', stage: [3,4], cost: 200, effect: 'Новое растение' }
            ];
            
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
            actions.forEach(act => {
                const canUse = act.stage.includes(p.stage);
                const canAfford = S.money >= act.cost;
                const disabled = !canUse || !canAfford ? 'opacity:0.4;cursor:not-allowed' : '';
                
                html += `<div style="background:linear-gradient(180deg,#3d2914 0%,#2d1f0f 100%);border:2px solid #5d3a1a;padding:8px;border-radius:4px;${disabled}" 
                    onclick="${canUse && canAfford ? `doAction('${act.id}', ${S.plants.indexOf(p)})` : ''}">
                    <div style="font-size:16px;text-align:center">${act.icon}</div>
                    <div style="font-size:8px;color:#7fff7f;text-align:center;margin-top:4px">${act.name}</div>
                    <div style="font-size:6px;color:#8f8;text-align:center;margin-top:2px">${act.desc}</div>
                    <div style="font-size:7px;color:${canUse ? (canAfford ? '#f0883e' : '#8b0000') : '#8b0000'};text-align:center;margin-top:3px">${act.cost > 0 ? '💰' + act.cost : 'Бесплатно'}</div>
                    <div style="font-size:6px;color:#7fff7f;text-align:center;margin-top:2px">${act.effect}</div>
                </div>`;
            });
            html += '</div>';
            
            html += `<div style="margin-top:10px;font-size:7px;color:#8f8;text-align:center">Стадия: ${stageNames[p.stage]} | Действия зависят от стадии</div>`;
            
            document.getElementById('actionsTit').textContent = '✋ Действия';
            document.getElementById('actionsBody').innerHTML = html;
            document.getElementById('actionsModal').classList.add('open');
        }
        
        window.doAction = function(action, plantIdx) {
            const p = S.plants[plantIdx];
            if (!p) return;
            
            switch (action) {
                case 'trim':
                    p.yieldBonus = (p.yieldBonus || 1) * 1.05;
                    toast('✂️', 'Тримминг +5% урожай');
                    break;
                case 'lst':
                    if (S.money < 50) { toast('❌', 'Нужно $50'); return; }
                    S.money -= 50;
                    p.yieldBonus = (p.yieldBonus || 1) * 1.15;
                    toast('🌿', 'LST +15% урожай');
                    break;
                case 'topping':
                    p.topped = true;
                    p.yieldBonus = (p.yieldBonus || 1) * 1.1;
                    toast('✂️', 'Топпинг! +2 колы');
                    break;
                case 'flush':
                    p.flushed = true;
                    p.qualityBonus = (p.qualityBonus || 1) * 1.2;
                    p.water = 100;
                    toast('💧', 'Промывка +20% качество');
                    break;
                case 'pesticide':
                    if (S.money < 30) { toast('❌', 'Нужно $30'); return; }
                    S.money -= 30;
                    p.health = Math.min(100, p.health + 10);
                    p.pestProtected = true;
                    toast('🐛', 'Защита от вредителей');
                    break;
                case 'fungicide':
                    if (S.money < 40) { toast('❌', 'Нужно $40'); return; }
                    S.money -= 40;
                    p.health = Math.min(100, p.health + 15);
                    p.fungusProtected = true;
                    toast('🦠', 'Защита от плесени');
                    break;
                case 'check':
                    const trichomeStatus = p.stage === 6 ? 'Мутые (готов)' : p.stage === 5 ? 'Прозрачные (не готов)' : 'Нет трихом';
                    toast('🔬', `Трихомы: ${trichomeStatus}`);
                    document.getElementById('actionsModal').classList.remove('open');
                    return;
                case 'clone':
                    if (S.money < 200) { toast('❌', 'Нужно $200'); return; }
                    if (!S.research.find(r => r.id === 'clone')?.done) { toast('🔒', 'Исследуй клонирование'); return; }
                    const emptySlot = [...Array(S.slots).keys()].find(i => !S.plants.find(pl => pl.slot === i));
                    if (emptySlot === undefined) { toast('❌', 'Нет слотов'); return; }
                    S.money -= 200;
                    S.plants.push({
                        slot: emptySlot,
                        strain: p.strain,
                        genes: JSON.parse(JSON.stringify(p.genes)),
                        progress: 0,
                        stage: 0,
                        health: 100,
                        water: 70,
                        cloned: true
                    });
                    S.stats.clones++;
                    toast('🌱', 'Клон создан!');
                    break;
            }
            
            S.xp += 5;
            save();
            update();
            document.getElementById('actionsModal').classList.remove('open');
            render('grow');
        };
        
        // Event listeners
        document.getElementById('startBtn').onclick = () => { S.tutorial = false; document.getElementById('tut').classList.add('h'); save(); };
        
        document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
            t.classList.add('on');
            render(t.dataset.t);
        });
        
        document.querySelectorAll('.speed button').forEach(b => b.onclick = () => {
            document.querySelectorAll('.speed button').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            S.speed = parseInt(b.dataset.s);
        });
        
        document.querySelectorAll('.actions .act').forEach(b => b.onclick = () => {
            const a = b.dataset.a;
            if (a === 'plant') {
                if (S.selected === null) toast('❌', 'Выбери слот');
                else if (S.plants.find(p => p.slot === S.selected)) toast('❌', 'Слот занят');
                else document.getElementById('seedModal').classList.add('open');
            }
            else if (a === 'water') {
                if (S.plants.length === 0) toast('💧', 'Нет растений');
                else { S.plants.forEach(p => p.water = Math.min(100, p.water + 30)); toast('💧', 'Полито!'); save(); }
            }
            else if (a === 'nutrient') {
                if (S.selected === null) toast('❌', 'Выбери растение');
                else document.getElementById('nutrModal').classList.add('open');
            }
            else if (a === 'actions') {
                if (S.selected === null) { toast('❌', 'Выбери растение'); return; }
                const p = S.plants.find(x => x.slot === S.selected);
                if (!p) { toast('❌', 'Пустой слот'); return; }
                showActions(p);
            }
            else if (a === 'harvest') {
                if (S.selected === null) toast('❌', 'Выбери растение');
                else {
                    const p = S.plants.find(x => x.slot === S.selected);
                    if (!p) toast('❌', 'Пусто');
                    else if (p.stage < 6) toast('❌', 'Не готово');
                    else harvest(p);
                }
            }
            else if (a === 'quiz') {
                const incompleteQuizzes = lessons.filter(l => !S.completedQuizzes.includes(l.id) && l.quiz && (l.unlocked || (l.id === 'training' && S.stats.harvests >= 1) || (l.id === 'flower' && S.stats.harvests >= 2) || (l.id === 'harvest' && S.stats.harvests >= 5) || (l.id === 'genetics' && S.research.find(r => r.id === 'gen')?.done) || (l.id === 'pests' && S.stats.planted >= 10)));
                if (incompleteQuizzes.length > 0) {
                    const q = incompleteQuizzes[Math.floor(Math.random() * incompleteQuizzes.length)];
                    showQuiz(q.id);
                } else {
                    toast('📚', 'Все квизы пройдены!');
                }
            }
            else if (a === 'save') { save(); toast('💾', 'Сохранено'); }
        });
        
        document.getElementById('content').onclick = (e) => {
            const pot = e.target.closest('.pot');
            if (pot) {
                const slot = parseInt(pot.dataset.slot);
                S.selected = slot;
                const p = S.plants.find(x => x.slot === slot);
                if (!p) document.getElementById('seedModal').classList.add('open');
                else showInfo(p);
                render('grow');
            }
            
            const seed = e.target.closest('[data-seed]');
            if (seed) plantSeed(seed.dataset.seed);
            
            const nut = e.target.closest('[data-nut]');
            if (nut) buyNutrient(nut.dataset.nut);
            
            const equip = e.target.closest('[data-equip]');
            if (equip) buyEquipment(equip.dataset.equip);
            
            const lab = e.target.closest('[data-lab]');
            if (lab) buyLab(lab.dataset.lab);
            
            const researchItem = e.target.closest('[data-research]');
            if (researchItem) buyResearch(researchItem.dataset.research);
            
            const lesson = e.target.closest('[data-lesson]');
            if (lesson) showLesson(lesson.dataset.lesson);
        };
        
        document.querySelectorAll('.mclose').forEach(b => b.onclick = () => document.getElementById(b.dataset.c).classList.remove('open'));
        
        // Init
        load();
        if (!S.tutorial) document.getElementById('tut').classList.add('h');
        update();
        render('grow');
        setInterval(tick, 1000);
    </script>
</body>
</html>
