<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        
        :root {
            --bg: #1a1a2e;
            --text: #ffffff;
            --hint: #888888;
            --green: #4CAF50;
            --gold: #FFD700;
            --stone: #3a3a4a;
            --dark: #0f0f1f;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }
        
        /* Header */
        .header {
            background: var(--dark);
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #000;
            flex-shrink: 0;
        }
        
        .title {
            font-size: 14px;
            font-weight: bold;
            color: var(--green);
        }
        
        .stats {
            display: flex;
            gap: 10px;
            font-size: 12px;
        }
        
        .stat { text-align: center; }
        .stat-label { font-size: 9px; color: var(--hint); }
        .stat-value { color: var(--gold); font-weight: bold; }
        
        .speed-btns { display: flex; gap: 3px; }
        .speed-btn {
            padding: 4px 8px;
            background: var(--stone);
            border: none;
            color: white;
            font-size: 11px;
            border-radius: 4px;
        }
        .speed-btn.active { background: var(--gold); color: black; }
        
        /* Tabs */
        .tabs {
            display: flex;
            overflow-x: auto;
            background: var(--dark);
            padding: 4px;
            gap: 4px;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 8px 12px;
            background: var(--stone);
            border: none;
            color: white;
            font-size: 11px;
            white-space: nowrap;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .tab.active { background: var(--green); color: black; }
        
        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            padding-bottom: 60px;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Grow Room */
        .pots {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        @media (min-width: 400px) { .pots { grid-template-columns: repeat(3, 1fr); } }
        
        .pot {
            background: var(--stone);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .pot.selected { box-shadow: 0 0 0 2px var(--gold); }
        .pot.ready { animation: glow 1s infinite; }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 15px var(--gold); }
        }
        
        .pot-icon { font-size: 32px; margin-bottom: 4px; }
        .pot-name { font-size: 10px; margin-bottom: 2px; }
        .pot-progress { font-size: 9px; color: var(--hint); }
        .pot-genes { display: flex; gap: 2px; margin-top: 4px; }
        .gene { width: 12px; height: 12px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .gene.thc { background: #E31D1D; }
        .gene.cbd { background: #17DD62; }
        .gene.yld { background: #F5C71A; }
        .gene.spd { background: #4AEDD9; }
        .gene.rst { background: #7D4BBD; }
        
        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--dark);
            border-top: 2px solid #000;
            padding: 6px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        
        .action {
            background: var(--stone);
            border: none;
            border-radius: 6px;
            padding: 8px 4px;
            color: white;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .action.primary { background: var(--green); }
        .action.warning { background: #FF9800; }
        .action .icon { font-size: 18px; }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 1000;
        }
        
        .modal.open { display: flex; }
        
        .modal-box {
            background: var(--bg);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 16px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .modal-title { font-size: 16px; color: var(--gold); font-weight: bold; }
        .modal-close {
            background: #E31D1D;
            border: none;
            color: white;
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        @media (min-width: 360px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .item {
            background: var(--stone);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
        }
        
        .item.disabled { opacity: 0.5; }
        .item-icon { font-size: 24px; }
        .item-name { font-size: 10px; margin: 4px 0 2px; }
        .item-desc { font-size: 9px; color: var(--hint); }
        .item-price { font-size: 11px; color: var(--gold); margin-top: 4px; }
        
        /* Info Card */
        .card {
            background: var(--stone);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .card-title { font-size: 12px; color: var(--gold); margin-bottom: 8px; }
        .card-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; }
        
        /* Progress */
        .progress { height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }
        
        /* Notification */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--dark);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            z-index: 2000;
            display: none;
        }
        
        .toast.show { display: block; }
        .toast-title { font-size: 14px; color: var(--gold); margin-bottom: 4px; }
        .toast-text { font-size: 12px; }
        
        /* Tutorial */
        .tutorial {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 3000;
        }
        
        .tutorial.hidden { display: none; }
        .tutorial h1 { color: var(--green); font-size: 20px; margin-bottom: 16px; text-align: center; }
        .tutorial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 300px; }
        .tutorial-box { background: var(--stone); border-radius: 8px; padding: 12px; }
        .tutorial-box h2 { font-size: 12px; color: var(--gold); margin-bottom: 4px; }
        .tutorial-box p { font-size: 10px; color: var(--hint); }
        .start-btn { background: var(--green); border: none; color: white; font-size: 14px; padding: 12px 32px; border-radius: 8px; margin-top: 16px; }
    </style>
</head>
<body>
    <!-- Tutorial -->
    <div class="tutorial" id="tutorial">
        <h1>🌿 Grow Craft</h1>
        <div class="tutorial-grid">
            <div class="tutorial-box"><h2>🌱</h2><p>Тапай на слоты, сажай, поливай</p></div>
            <div class="tutorial-box"><h2>🧬</h2><p>Генетика и скрещивание</p></div>
            <div class="tutorial-box"><h2>🔬</h2><p>Исследования за XP</p></div>
            <div class="tutorial-box"><h2>🏆</h2><p>Достижения и уровни</p></div>
        </div>
        <button class="start-btn" id="startBtn">▶ ИГРАТЬ</button>
    </div>

    <!-- App -->
    <div class="app" id="app">
        <!-- Header -->
        <div class="header">
            <div class="title">🌿 Grow Craft</div>
            <div class="stats">
                <div class="stat"><div class="stat-label">LVL</div><div class="stat-value" id="lvl">1</div></div>
                <div class="stat"><div class="stat-label">DAY</div><div class="stat-value" id="day">1</div></div>
                <div class="stat"><div class="stat-label">💰</div><div class="stat-value" id="money">500</div></div>
                <div class="stat"><div class="stat-label">XP</div><div class="stat-value" id="xp">0</div></div>
                <div class="speed-btns">
                    <button class="speed-btn active" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="2">2x</button>
                    <button class="speed-btn" data-speed="5">5x</button>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="grow">🌱 Рост</button>
            <button class="tab" data-tab="shop">🏪 Магазин</button>
            <button class="tab" data-tab="breed">🧬 Скрещивание</button>
            <button class="tab" data-tab="research">🔬 Исследования</button>
            <button class="tab" data-tab="env">🌡️ Среда</button>
            <button class="tab" data-tab="stats">📊 Статистика</button>
            <button class="tab" data-tab="achievements">🏆 Достижения</button>
        </div>

        <!-- Content -->
        <div class="content" id="content"></div>

        <!-- Bottom Actions -->
        <div class="bottom-bar">
            <button class="action primary" data-action="plant">🌱</button>
            <button class="action" data-action="water">💧</button>
            <button class="action" data-action="nutrient">🧪</button>
            <button class="action warning" data-action="harvest">✂️</button>
            <button class="action" data-action="save">💾</button>
        </div>
    </div>

    <!-- Plant Modal -->
    <div class="modal" id="plantModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">🌱 Выбери сорт</div>
                <button class="modal-close" data-close="plantModal">✕</button>
            </div>
            <div class="grid" id="plantGrid"></div>
        </div>
    </div>

    <!-- Nutrient Modal -->
    <div class="modal" id="nutrientModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">🧪 Удобрения</div>
                <button class="modal-close" data-close="nutrientModal">✕</button>
            </div>
            <div class="grid" id="nutrientGrid"></div>
        </div>
    </div>

    <!-- Info Modal -->
    <div class="modal" id="infoModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="infoTitle">Информация</div>
                <button class="modal-close" data-close="infoModal">✕</button>
            </div>
            <div id="infoContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-title" id="toastTitle"></div>
        <div class="toast-text" id="toastText"></div>
    </div>

    <script>
        // Data
        const strains = [
            { id: 'nl', name: 'Northern Lights', type: 'Indica', icon: '🌿', thc: 18, yld: 400, price: 50 },
            { id: 'ww', name: 'White Widow', type: 'Hybrid', icon: '🍃', thc: 20, yld: 450, price: 60 },
            { id: 'bd', name: 'Blue Dream', type: 'Sativa', icon: '💠', thc: 21, yld: 500, price: 70 },
            { id: 'og', name: 'OG Kush', type: 'Hybrid', icon: '🌲', thc: 23, yld: 480, price: 120 },
            { id: 'gl', name: 'Gelato', type: 'Hybrid', icon: '🍦', thc: 27, yld: 400, price: 150 },
            { id: 'gg', name: 'Gorilla Glue', type: 'Hybrid', icon: '🦍', thc: 30, yld: 550, price: 180 },
            { id: 'sk', name: 'Skunk #1', type: 'Hybrid', icon: '🦨', thc: 19, yld: 420, price: 40 },
            { id: 'cm', name: 'Critical Mass', type: 'Indica', icon: '⚖️', thc: 20, yld: 600, price: 45 }
        ];

        const research = [
            { id: 'hydro', name: 'Гидропоника', desc: '+1 слот', cost: 100 },
            { id: 'genetics', name: 'Генетика', desc: 'Показывает гены', cost: 200 },
            { id: 'breeding', name: 'Скрещивание', desc: 'Разблокирует breed', cost: 300 },
            { id: 'cloning', name: 'Клонирование', desc: 'Копирование', cost: 500 },
            { id: 'mutation', name: 'Мутации', desc: 'Случайные', cost: 800 },
            { id: 'crispr', name: 'CRISPR', desc: 'Редактор', cost: 1500 }
        ];

        // State
        let S = {
            day: 1, time: 6, speed: 1, money: 500, xp: 0, level: 1,
            plants: [], slots: 6, selected: null,
            inv: { grow: 5, bloom: 3, calmag: 2, pk: 1 },
            upgrades: {},
            env: { light: true, co2: 400, temp: 24, hum: 60 },
            research: research.map(r => ({...r, done: false})),
            achievements: [
                { id: 'first', name: 'Первый росток', icon: '🌱', done: false },
                { id: 'harvest', name: 'Первый урожай', icon: '✂️', done: false },
                { id: 'ten', name: 'Садовод', icon: '🌿', done: false },
                { id: 'hundred', name: 'Фермер', icon: '🌾', done: false },
                { id: 'breed', name: 'Бридер', icon: '🧬', done: false },
                { id: 'rich', name: 'Богач', icon: '💰', done: false },
                { id: 'master', name: 'Мастер', icon: '👑', done: false }
            ],
            stats: { harvests: 0, planted: 0, bred: 0 },
            breed: [null, null]
        };

        // Load
        function load() {
            const saved = localStorage.getItem('growcraft');
            if (saved) S = { ...S, ...JSON.parse(saved) };
        }

        function save() {
            localStorage.setItem('growcraft', JSON.stringify(S));
        }

        // Toast
        function toast(title, text) {
            const t = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        // Modal
        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        // Game Logic
        function gameLoop() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }
            
            S.plants.forEach(p => {
                const bonus = (S.env.light ? 1.2 : 0.5) * (S.env.co2 > 600 ? 1.3 : 1);
                p.progress += bonus * S.speed * 0.05;
                p.water -= 0.2 * S.speed;
                if (p.water < 30) p.health -= 0.1 * S.speed;
                if (p.water > 80) p.health -= 0.05 * S.speed;
                p.health = Math.max(0, Math.min(100, p.health));
                p.stage = p.progress < 5 ? 0 : p.progress < 10 ? 1 : p.progress < 20 ? 2 : p.progress < 40 ? 3 : p.progress < 60 ? 4 : p.progress < 90 ? 5 : 6;
            });

            // Level up
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉 Уровень!', S.level); }

            update();
        }

        function update() {
            document.getElementById('lvl').textContent = S.level;
            document.getElementById('day').textContent = S.day;
            document.getElementById('money').textContent = S.money;
            document.getElementById('xp').textContent = S.xp;
        }

        function render(tab) {
            const c = document.getElementById('content');
            
            if (tab === 'grow') {
                let html = '<div class="pots">';
                for (let i = 0; i < S.slots; i++) {
                    const p = S.plants.find(x => x.slot === i);
                    const sel = S.selected === i ? 'selected' : '';
                    const ready = p && p.stage >= 6 ? 'ready' : '';
                    const icon = p ? getIcon(p.stage) : '🌱';
                    const name = p ? p.strain.name.slice(0, 10) : 'ПУСТО';
                    const prog = p ? Math.floor(p.progress) : 0;
                    
                    html += `<div class="pot ${sel} ${ready}" data-slot="${i}">
                        <div class="pot-icon">${icon}</div>
                        <div class="pot-name">${name}</div>
                        <div class="pot-progress">${p ? prog + '%' : '---'}</div>
                        ${p ? `<div class="pot-genes">${renderGenes(p.genes)}</div>` : ''}
                    </div>`;
                }
                html += '</div>';
                c.innerHTML = html;
            }
            
            else if (tab === 'shop') {
                c.innerHTML = `
                    <div class="card">
                        <div class="card-title">🌱 Семена</div>
                        <div class="grid" id="seedGrid"></div>
                    </div>
                    <div class="card">
                        <div class="card-title">⚙️ Оборудование</div>
                        <div class="grid" id="equipGrid"></div>
                    </div>
                `;
                
                // Seeds
                document.getElementById('seedGrid').innerHTML = strains.map(s => `
                    <div class="item ${S.money < s.price ? 'disabled' : ''}" data-seed="${s.id}">
                        <div class="item-icon">${s.icon}</div>
                        <div class="item-name">${s.name}</div>
                        <div class="item-desc">${s.type} • ${s.thc}%</div>
                        <div class="item-price">💰${s.price}</div>
                    </div>
                `).join('');
                
                // Equipment
                const equip = [
                    { id: 'slot', name: '+1 Слот', icon: '🌱', desc: 'Макс 10', price: 200 },
                    { id: 'led', name: 'LED 600W', icon: '💡', desc: '+20% рост', price: 300 },
                    { id: 'co2', name: 'CO₂', icon: '💨', desc: '+30% рост', price: 400 }
                ];
                document.getElementById('equipGrid').innerHTML = equip.map(e => `
                    <div class="item ${S.money < e.price ? 'disabled' : ''} ${S.upgrades[e.id] ? 'disabled' : ''}" data-equip="${e.id}">
                        <div class="item-icon">${e.icon}</div>
                        <div class="item-name">${e.name}</div>
                        <div class="item-desc">${e.desc}</div>
                        <div class="item-price">${S.upgrades[e.id] ? '✅' : '💰' + e.price}</div>
                    </div>
                `).join('');
            }
            
            else if (tab === 'breed') {
                c.innerHTML = `
                    <div class="card">
                        <div class="card-title">🧬 Скрещивание</div>
                        <p style="font-size:11px;color:var(--hint);margin-bottom:12px">Выбери 2 harvest растения</p>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                            <div class="item" id="breed0"><div class="item-icon">🌱</div><div class="item-name">Родитель 1</div></div>
                            <div class="item" id="breed1"><div class="item-icon">🌱</div><div class="item-name">Родитель 2</div></div>
                        </div>
                        <button class="start-btn" style="width:100%;margin-top:12px" id="breedBtn">🧬 Скрестить</button>
                    </div>
                `;
                renderBreed();
            }
            
            else if (tab === 'research') {
                c.innerHTML = `<div class="card"><div class="card-title">🔬 Исследования</div></div>`;
                S.research.forEach((r, i) => {
                    const done = r.done;
                    const canBuy = S.xp >= r.cost;
                    c.innerHTML += `
                        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
                            <div>
                                <div style="font-size:12px">${r.name}</div>
                                <div style="font-size:10px;color:var(--hint)">${r.desc}</div>
                            </div>
                            ${done ? '<span style="color:var(--green)">✅</span>' : 
                              `<button class="speed-btn ${canBuy ? '' : 'disabled'}" data-research="${i}">🔓${r.cost}</button>`}
                        </div>
                    `;
                });
            }
            
            else if (tab === 'env') {
                c.innerHTML = `
                    <div class="card">
                        <div class="card-title">🌡️ Среда</div>
                        <div class="card-row"><span>💡 Свет</span><button class="speed-btn ${S.env.light ? 'active' : ''}" data-env="light">${S.env.light ? 'ON' : 'OFF'}</button></div>
                        <div class="card-row"><span>💨 CO₂</span><span>${S.env.co2} ppm</span></div>
                        <div class="card-row"><span>🌡️ Температура</span><span>${S.env.temp}°C</span></div>
                        <div class="card-row"><span>💦 Влажность</span><span>${S.env.hum}%</span></div>
                    </div>
                `;
            }
            
            else if (tab === 'stats') {
                const need = S.level * 100;
                c.innerHTML = `
                    <div class="card">
                        <div class="card-title">📊 Статистика</div>
                        <div style="margin-bottom:8px">Уровень ${S.level} • ${S.xp}/${need} XP</div>
                        <div class="progress"><div class="progress-fill" style="width:${(S.xp/need)*100}%"></div></div>
                    </div>
                    <div class="card">
                        <div class="card-row"><span>🌱 Посажено</span><span>${S.stats.planted}</span></div>
                        <div class="card-row"><span>✂️ Урожаев</span><span>${S.stats.harvests}</span></div>
                        <div class="card-row"><span>🧬 Скрещиваний</span><span>${S.stats.bred}</span></div>
                        <div class="card-row"><span>💰 Баланс</span><span>${S.money}</span></div>
                    </div>
                `;
            }
            
            else if (tab === 'achievements') {
                c.innerHTML = '<div class="card"><div class="card-title">🏆 Достижения</div></div>';
                S.achievements.forEach(a => {
                    c.innerHTML += `<div class="card" style="opacity:${a.done ? 1 : 0.5}"><span>${a.icon} ${a.name}</span>${a.done ? '✅' : ''}</div>`;
                });
            }
        }

        function getIcon(stage) {
            return ['🌱', '🌿', '🪴', '🌳', '🌸', '🌺', '🌻'][stage] || '🌱';
        }

        function renderGenes(g) {
            return ['thc', 'cbd', 'yld', 'spd', 'rst'].map(x => 
                `<div class="gene ${x}">${g[x].includes(x[0].toUpperCase()) ? '★' : '○'}</div>`
            ).join('');
        }

        function renderBreed() {
            [0, 1].forEach(i => {
                const el = document.getElementById('breed' + i);
                if (!el) return;
                const p = S.breed[i];
                el.innerHTML = p ? 
                    `<div class="item-icon">${p.strain.icon}</div><div class="item-name">${p.strain.name.slice(0,8)}</div>` :
                    `<div class="item-icon">🌱</div><div class="item-name">Родитель ${i+1}</div>`;
            });
        }

        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); closeModal('plantModal'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); closeModal('plantModal'); return; }
            
            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает'); return; }
            
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: {
                    thc: (Math.random() > 0.5 ? 'H' : 'h') + (Math.random() > 0.5 ? 'H' : 'h'),
                    cbd: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'),
                    yld: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'),
                    spd: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'),
                    rst: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r')
                },
                progress: 0, stage: 0, health: 100, water: 70
            });
            
            S.stats.planted++;
            S.xp += 5;
            
            if (!S.achievements[0].done) { S.achievements[0].done = true; toast('🏆', 'Первый росток!'); }
            if (S.stats.planted >= 10 && !S.achievements[2].done) { S.achievements[2].done = true; toast('🏆', 'Садовод!'); }
            
            closeModal('plantModal');
            render('grow');
            toast('🌱', strain.name);
            save();
        }

        function harvest(plant) {
            const yld = Math.floor(plant.strain.yld * (plant.genes.yld.includes('Y') ? 1.3 : 0.85) * (plant.health / 100));
            S.money += yld * 2;
            S.xp += yld;
            S.stats.harvests++;
            S.plants = S.plants.filter(p => p.slot !== plant.slot);
            S.selected = null;
            
            if (!S.achievements[1].done) { S.achievements[1].done = true; toast('🏆', 'Первый урожай!'); }
            if (S.stats.harvests >= 100 && !S.achievements[3].done) { S.achievements[3].done = true; toast('🏆', 'Фермер!'); }
            
            toast('✂️', `${yld}г • +${yld*2}💰`);
            render('grow');
            save();
        }

        function doBreed() {
            if (!S.breed[0] || !S.breed[1]) { toast('❌', 'Выбери обоих'); return; }
            if (S.plants.length >= S.slots) { toast('❌', 'Нет места'); return; }
            
            const p1 = S.breed[0], p2 = S.breed[1];
            const inherit = (a, b) => a[Math.floor(Math.random()*2)] + b[Math.floor(Math.random()*2)];
            
            S.plants.push({
                slot: S.plants.length,
                strain: { id: 'c'+Date.now(), name: p1.strain.name.split(' ')[0] + '×' + p2.strain.name.split(' ')[0], type: 'Hybrid', icon: '🧬', thc: 20, yld: 450, price: 0 },
                genes: {
                    thc: inherit(p1.genes.thc, p2.genes.thc),
                    cbd: inherit(p1.genes.cbd, p2.genes.cbd),
                    yld: inherit(p1.genes.yld, p2.genes.yld),
                    spd: inherit(p1.genes.spd, p2.genes.spd),
                    rst: inherit(p1.genes.rst, p2.genes.rst)
                },
                progress: 0, stage: 0, health: 100, water: 70
            });
            
            S.stats.bred++;
            S.xp += 50;
            S.breed = [null, null];
            
            if (!S.achievements[4].done) { S.achievements[4].done = true; toast('🏆', 'Бридер!'); }
            
            toast('🧬', 'Новый сорт!');
            render('breed');
            save();
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            load();
            
            // Start button
            document.getElementById('startBtn').addEventListener('click', () => {
                document.getElementById('tutorial').classList.add('hidden');
                setInterval(gameLoop, 1000);
            });
            
            // Tabs
            document.getElementById('tabs').addEventListener('click', e => {
                if (e.target.classList.contains('tab')) {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    render(e.target.dataset.tab);
                }
            });
            
            // Speed
            document.querySelectorAll('.speed-btn[data-speed]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.speed-btn[data-speed]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    S.speed = parseInt(btn.dataset.speed);
                });
            });
            
            // Actions
            document.querySelector('.bottom-bar').addEventListener('click', e => {
                const action = e.target.closest('[data-action]')?.dataset.action;
                if (!action) return;
                
                if (action === 'plant') {
                    if (S.selected === null) toast('❌', 'Выбери слот');
                    else if (S.plants.find(p => p.slot === S.selected)) toast('❌', 'Слот занят');
                    else openModal('plantModal');
                }
                else if (action === 'water') {
                    if (S.plants.length === 0) toast('💧', 'Нет растений');
                    else { S.plants.forEach(p => p.water = Math.min(100, p.water + 30)); toast('💧', 'Полито!'); }
                }
                else if (action === 'nutrient') { openModal('nutrientModal'); }
                else if (action === 'harvest') {
                    if (S.selected === null) toast('❌', 'Выбери растение');
                    else {
                        const p = S.plants.find(x => x.slot === S.selected);
                        if (!p) toast('❌', 'Пусто');
                        else if (p.stage < 6) toast('❌', 'Не готово');
                        else harvest(p);
                    }
                }
                else if (action === 'save') { save(); toast('💾', 'Сохранено!'); }
            });
            
            // Pot clicks
            document.getElementById('content').addEventListener('click', e => {
                const pot = e.target.closest('.pot');
                if (pot) {
                    const slot = parseInt(pot.dataset.slot);
                    S.selected = slot;
                    const p = S.plants.find(x => x.slot === slot);
                    if (!p) openModal('plantModal');
                    else if (p.stage >= 6) harvest(p);
                    else {
                        document.getElementById('infoTitle').textContent = p.strain.name;
                        document.getElementById('infoContent').innerHTML = `
                            <div class="card">
                                <div class="card-row"><span>Стадия</span><span>${['Семя','Росток','Сеянец','Вегетация','Прецвет','Цветение','Harvest'][p.stage]}</span></div>
                                <div class="card-row"><span>Прогресс</span><span>${Math.floor(p.progress)}%</span></div>
                                <div class="card-row"><span>Здоровье</span><span>${Math.floor(p.health)}%</span></div>
                                <div class="card-row"><span>Вода</span><span>${Math.floor(p.water)}%</span></div>
                            </div>
                        `;
                        openModal('infoModal');
                    }
                    render('grow');
                }
            });
            
            // Shop clicks
            document.getElementById('content').addEventListener('click', e => {
                const seed = e.target.closest('[data-seed]');
                if (seed) { plantSeed(seed.dataset.seed); return; }
                
                const equip = e.target.closest('[data-equip]');
                if (equip) {
                    const items = { slot: { price: 200, action: () => { S.slots = Math.min(10, S.slots + 1); } },
                                   led: { price: 300, action: () => { S.upgrades.led = true; } },
                                   co2: { price: 400, action: () => { S.upgrades.co2 = true; S.env.co2 = 1200; } } };
                    const item = items[equip.dataset.equip];
                    if (S.money < item.price) { toast('❌', 'Не хватает'); return; }
                    if (S.upgrades[equip.dataset.equip]) { toast('❌', 'Уже есть'); return; }
                    S.money -= item.price;
                    item.action();
                    toast('✅', 'Куплено!');
                    render('shop');
                    save();
                }
            });
            
            // Research
            document.getElementById('content').addEventListener('click', e => {
                const btn = e.target.closest('[data-research]');
                if (btn) {
                    const i = parseInt(btn.dataset.research);
                    const r = S.research[i];
                    if (S.xp < r.cost) { toast('❌', 'Не хватает XP'); return; }
                    S.xp -= r.cost;
                    r.done = true;
                    if (r.id === 'hydro') S.slots++;
                    toast('🔬', r.name);
                    render('research');
                    save();
                }
            });
            
            // Environment
            document.getElementById('content').addEventListener('click', e => {
                const btn = e.target.closest('[data-env]');
                if (btn) {
                    if (btn.dataset.env === 'light') { S.env.light = !S.env.light; render('env'); }
                }
            });
            
            // Breed
            document.getElementById('content').addEventListener('click', e => {
                const b0 = e.target.closest('#breed0');
                const b1 = e.target.closest('#breed1');
                const breedBtn = e.target.closest('#breedBtn');
                
                if (b0 || b1) {
                    const idx = b0 ? 0 : 1;
                    const avail = S.plants.filter(p => p.stage >= 6);
                    if (avail.length === 0) { toast('❌', 'Нет harvest'); return; }
                    S.breed[idx] = avail[idx === 0 ? 0 : Math.min(1, avail.length - 1)];
                    renderBreed();
                }
                
                if (breedBtn) doBreed();
            });
            
            // Modals
            document.querySelectorAll('[data-close]').forEach(btn => {
                btn.addEventListener('click', () => closeModal(btn.dataset.close));
            });
            
            document.querySelectorAll('.modal').forEach(m => {
                m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
            });
            
            // Init
            render('grow');
            update();
        });
    </script>
</body>
</html>
