<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
            --red: #f85149;
            --purple: #a371f7;
            --blue: #58a6ff;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 8px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: var(--dark); padding: 6px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 6px; }
        .logo-icon { font-size: 20px; }
        .logo-text { font-size: 10px; color: var(--green); }
        .stats { display: flex; gap: 8px; }
        .stat { text-align: center; }
        .stat-v { font-size: 10px; color: var(--gold); }
        .stat-l { font-size: 6px; color: var(--muted); }
        .speed { display: flex; gap: 2px; }
        .speed button { width: 24px; height: 20px; font-size: 7px; background: var(--stone); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
        .speed button.on { background: var(--green); color: #000; }
        
        /* Tabs */
        .tabs { display: flex; overflow-x: auto; background: var(--dark); padding: 4px; gap: 3px; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 10px; font-size: 7px; background: var(--stone); border: 1px solid var(--border); color: var(--text); white-space: nowrap; border-radius: 6px; }
        .tab.on { background: var(--green); color: #000; border-color: var(--green); }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 60px; -webkit-overflow-scrolling: touch; }
        
        /* Grow Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (max-width: 340px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        .pot { background: var(--stone); border: 2px solid var(--border); border-radius: 12px; padding: 8px; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; position: relative; }
        .pot:active { transform: scale(0.98); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 12px rgba(240, 136, 62, 0.4); }
        .pot.ready { border-color: var(--green); animation: ready-pulse 1.5s infinite; }
        @keyframes ready-pulse { 0%, 100% { box-shadow: 0 0 8px var(--green); } 50% { box-shadow: 0 0 20px var(--green); } }
        
        .pot-top { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
        
        /* Plant Sprite */
        .plant-sprite { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .plant-sprite.stage-0 { font-size: 20px; }
        .plant-sprite.stage-1 { font-size: 24px; }
        .plant-sprite.stage-2 { font-size: 28px; }
        .plant-sprite.stage-3 { font-size: 32px; }
        .plant-sprite.stage-4 { font-size: 36px; }
        .plant-sprite.stage-5 { font-size: 40px; }
        .plant-sprite.stage-6 { font-size: 44px; animation: sway 2s ease-in-out infinite; }
        @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        
        /* Pot Visual */
        .pot-visual { width: 40px; height: 20px; position: relative; }
        .pot-visual::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 44px; height: 6px; background: linear-gradient(90deg, #5d3a1a, #a0522d, #8b4513, #5d3a1a); border-radius: 2px; }
        .pot-visual::after { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 36px; height: 14px; background: linear-gradient(90deg, #3d2914, #5d3a1a 30%, #8b4513 50%, #5d3a1a 70%, #3d2914); border-radius: 0 0 4px 4px; }
        
        .pot-info { width: 100%; text-align: center; }
        .pot-name { font-size: 7px; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pot-progress { font-size: 6px; color: var(--muted); margin-top: 2px; }
        
        /* Health Bar */
        .health-bar { width: 100%; height: 4px; background: #000; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .health-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        /* Water Bar */
        .water-bar { width: 100%; height: 3px; background: #000; border-radius: 2px; margin-top: 2px; overflow: hidden; }
        .water-fill { height: 100%; background: var(--blue); transition: width 0.3s; }
        
        /* Genes */
        .genes { display: flex; gap: 1px; margin-top: 3px; }
        .gene { width: 10px; height: 10px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 6px; }
        .gene-t { background: #f85149; }
        .gene-c { background: #238636; }
        .gene-y { background: #f0883e; }
        .gene-s { background: #58a6ff; }
        .gene-r { background: #a371f7; }
        
        /* Bottom Actions */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); border-top: 1px solid var(--border); padding: 6px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .act { background: var(--stone); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text); }
        .act:active { background: var(--border); }
        .act.on { background: var(--green); color: #000; }
        .act .i { font-size: 18px; }
        .act .t { font-size: 6px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 8px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 360px; max-height: 90vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .mtit { font-size: 12px; color: var(--gold); }
        .mclose { background: var(--red); border: none; color: #fff; font-size: 16px; width: 28px; height: 28px; border-radius: 6px; }
        .mbody { padding: 12px; }
        
        /* Grid Items */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .item { background: var(--stone); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .item.off { opacity: 0.5; }
        .item.owned { border-color: var(--green); }
        .item .ii { font-size: 28px; }
        .item .in { font-size: 7px; margin: 4px 0 2px; color: var(--text-bright); }
        .item .id { font-size: 6px; color: var(--muted); }
        .item .ip { font-size: 8px; color: var(--gold); margin-top: 4px; }
        
        /* Cards */
        .card { background: var(--stone); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .card-t { font-size: 10px; color: var(--gold); margin-bottom: 8px; }
        .card-r { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .card-r:last-child { border-bottom: none; }
        
        /* Progress */
        .prog { height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .prog-f { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); }
        
        /* Buttons */
        .btn { background: var(--green); border: none; color: #000; font-size: 8px; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn:active { background: #2ea043; }
        .btn.full { width: 100%; }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--dark); border: 1px solid var(--gold); border-radius: 8px; padding: 12px; text-align: center; z-index: 2000; display: none; }
        .toast.show { display: block; }
        .toast-t { font-size: 12px; color: var(--gold); }
        .toast-x { font-size: 8px; margin-top: 4px; }
        
        /* Tutorial */
        .tut { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; z-index: 3000; }
        .tut.h { display: none; }
        .tut h1 { font-size: 16px; color: var(--green); margin-bottom: 12px; text-align: center; }
        .tut-g { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 300px; }
        .tut-b { background: var(--stone); border-radius: 8px; padding: 12px; }
        .tut-b h2 { font-size: 9px; color: var(--gold); margin-bottom: 4px; }
        .tut-b p { font-size: 7px; color: var(--muted); }
        .tut-s { background: var(--green); border: none; color: #000; font-size: 12px; padding: 12px 32px; border-radius: 8px; margin-top: 16px; }
        
        /* Environment Panel */
        .env-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .env-item { background: var(--stone); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .env-item .ei { font-size: 24px; }
        .env-item .ev { font-size: 14px; color: var(--text-bright); margin: 4px 0; }
        .env-item .el { font-size: 7px; color: var(--muted); }
        .env-item .eb { background: var(--stone); border: 1px solid var(--border); color: var(--text); font-size: 7px; padding: 4px 8px; border-radius: 4px; margin-top: 6px; }
        .env-item .eb.on { background: var(--green); color: #000; border-color: var(--green); }
        
        /* Selected Pot Info */
        .selected-info { background: var(--dark); border: 1px solid var(--gold); border-radius: 8px; padding: 8px; margin-bottom: 8px; }
        .selected-info .si { display: flex; align-items: center; justify-content: space-between; }
        .selected-info .sn { font-size: 10px; color: var(--text-bright); }
        .selected-info .ss { font-size: 7px; color: var(--green); }
        
        /* Growbox Status */
        .growbox { background: var(--stone); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .growbox-t { font-size: 9px; color: var(--gold); margin-bottom: 6px; }
        .growbox-stats { display: flex; justify-content: space-around; }
        .growbox-stat { text-align: center; }
        .growbox-stat .gv { font-size: 12px; }
        .growbox-stat .gl { font-size: 6px; color: var(--muted); }
    </style>
</head>
<body>
    <!-- Tutorial -->
    <div class="tut" id="tut">
        <h1>🌿 Grow Craft MEGA</h1>
        <div class="tut-g">
            <div class="tut-b"><h2>🌱</h2><p>Тапай на горшки, сажай, поливай</p></div>
            <div class="tut-b"><h2>🧬</h2><p>Генетика + скрещивание</p></div>
            <div class="tut-b"><h2>⚙️</h2><p>Гроубоксы, вентиляция</p></div>
            <div class="tut-b"><h2>🔬</h2><p>15+ исследований</p></div>
        </div>
        <button class="tut-s" id="start">▶ ИГРАТЬ</button>
    </div>

    <!-- App -->
    <div class="app">
        <div class="head">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">Grow Craft</span>
            </div>
            <div class="stats">
                <div class="stat"><div class="stat-v" id="lvl">1</div><div class="stat-l">LVL</div></div>
                <div class="stat"><div class="stat-v" id="day">1</div><div class="stat-l">DAY</div></div>
                <div class="stat"><div class="stat-v" id="mny">500</div><div class="stat-l">💰</div></div>
                <div class="stat"><div class="stat-v" id="xp">0</div><div class="stat-l">XP</div></div>
                <div class="speed">
                    <button class="on" data-s="1">1x</button>
                    <button data-s="2">2x</button>
                    <button data-s="5">5x</button>
                    <button data-s="10">10x</button>

        </div>

        <div class="tabs" id="tabs">

        <div class="content" id="content"></div>

        <div class="actions">

            <button class="act" data-a="water"><span class="i">💧</span><span class="t">Полить</span></button>
            <button class="act" data-a="nutrient"><span class="i">🧪</span><span class="t">Удобрения</span></button>
            <button class="act" data-a="harvest"><span class="i">✂️</span><span class="t">Собрать</span></button>
            <button class="act" data-a="save"><span class="i">💾</span><span class="t">Сейв</span></button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="pm"><div class="box"><div class="mhead"><div class="mtit">🌱 Выбери сорт</div><button class="mclose" data-c="pm">✕</button></div><div class="mbody"><div class="grid" id="pg"></div></div></div></div>
    <div class="modal" id="nm"><div class="box"><div class="mhead"><div class="mtit">🧪 Удобрения</div><button class="mclose" data-c="nm">✕</button></div><div class="mbody"><div class="grid" id="ng"></div></div></div></div>
    <div class="modal" id="im"><div class="box"><div class="mhead"><div class="mtit" id="imt">Инфо</div><button class="mclose" data-c="im">✕</button></div><div class="mbody" id="imc"></div></div></div>

        // State
        let S = {
            day: 1, time: 6, speed: 1, money: 500, xp: 0, level: 1,

        };

        let loop = null;

        // Utils
        function load() { const s = localStorage.getItem('gcmega2'); if (s) S = {...S, ...JSON.parse(s)}; }
        function save() { localStorage.setItem('gcmega2', JSON.stringify(S)); }

        function toast(t, x) {
            document.getElementById('tt').textContent = t;
            document.getElementById('tx').textContent = x;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 1500);
        }

        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function getStageIcon(stage) {
            return ['🌱', '🌿', '🪴', '🌳', '🌸', '🌺', '🌻'][stage] || '🌱';
        }

        // Game Loop
        function tick() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }

            const box = growboxes.find(b => b.id === S.growbox);
            const boxBonus = box ? box.bonus : 1;

            S.plants.forEach(p => {
                const lightMod = S.env.light ? 1.2 : 0.5;
                const co2Mod = S.env.co2 > 600 ? 1.3 : 1;
                const skillMod = S.skills.find(s => s.id === 'thumb')?.done ? 1.05 : 1;
                const speedSkill = S.skills.find(s => s.id === 'fast')?.done ? 1.1 : 1;
                const researchMod = S.research.find(r => r.id === 'speed')?.done ? 0.8 : 1;
                const ventMod = S.equipment.vent ? 1.1 : 1;
                const acMod = S.equipment.ac ? 1.2 : 1;

                p.progress += lightMod * co2Mod * skillMod * speedSkill * boxBonus * ventMod * acMod / researchMod * S.speed * 0.05;
                p.water -= 0.2 * S.speed * (S.skills.find(s => s.id === 'green')?.done ? 0.7 : 1);

                if (p.water < 30) p.health -= 0.1 * S.speed;
                if (p.water > 80) p.health -= 0.05 * S.speed;
                p.health = Math.max(0, Math.min(100, p.health));

                p.stage = p.progress < 5 ? 0 : p.progress < 10 ? 1 : p.progress < 20 ? 2 : p.progress < 40 ? 3 : p.progress < 60 ? 4 : p.progress < 90 ? 5 : 6;
            });

            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }
            if (S.money >= 10000 && !S.achievements[5].done) { S.achievements[5].done = true; toast('🏆', 'Богач!'); }
            if (S.level >= 20 && !S.achievements[6].done) { S.achievements[6].done = true; toast('🏆', 'Мастер!'); }
            if (S.level >= 50 && !S.achievements[7].done) { S.achievements[7].done = true; toast('🏆', 'Легенда!'); }

            update();
        }

        function update() {
            document.getElementById('lvl').textContent = S.level;
            document.getElementById('day').textContent = S.day;

            document.getElementById('xp').textContent = S.xp;

                    const ready = p && p.stage >= 6 ? 'ready' : '';
                    const icon = p ? getStageIcon(p.stage) : '🌱';
                    const stageClass = p ? 'stage-' + p.stage : 'stage-0';
                    const genes = S.research.find(r => r.id === 'gen')?.done && p ? `<div class="genes">${renderGenes(p.genes)}</div>` : '';
                    
                    html += `
                        <div class="pot ${sel} ${ready}" data-slot="${i}">

            else if (tab === 'shop') {
                c.innerHTML = `

                    `<button class="tab ${cat === 'basic' ? 'on' : ''}" data-cat="${cat}">${catNames[cat]}</button>`

                `;
                growboxes.forEach(b => {
                    const owned = S.growbox === b.id;
                    const canBuy = S.money >= b.price && !owned;
                    c.innerHTML += `
                        <div class="card" style="display:flex;justify-content:space-between;align-items:center">

                                <div style="font-size:10px">${b.icon} ${b.name}</div>
                                <div style="font-size:7px;color:var(--muted)">${b.desc}</div>

                              `<button class="btn" data-box="${b.id}" style="${canBuy ? '' : 'opacity:0.5'}">💰${b.price}</button>`}
                        </div>
                    `;
                });
            }

            else if (tab === 'stats') {
                const need = S.level * 100;
                const box = growboxes.find(b => b.id === S.growbox);
                c.innerHTML = `
                    <div class="card">
                        <div class="card-t">📊 Прогресс</div>
                        <div style="margin-bottom:8px">Уровень ${S.level} • ${S.xp}/${need} XP</div>
                        <div class="prog"><div class="prog-f" style="width:${(S.xp/need)*100}%"></div></div>
                    </div>
                    <div class="card">
                        <div class="card-t">📈 Статистика</div>

                        <div class="card-r"><span>✂️ Урожаев</span><span>${S.stats.harvests}</span></div>
                        <div class="card-r"><span>🧬 Скрещиваний</span><span>${S.stats.bred}</span></div>
                        <div class="card-r"><span>💰 Баланс</span><span>${S.money}</span></div>
                        <div class="card-r"><span>📦 Гроубокс</span><span>${box.name}</span></div>
                        <div class="card-r"><span>🌱 Слотов</span><span>${S.slots}</span></div>
                    </div>
                `;

            else if (tab === 'achievements') {
                c.innerHTML = '<div class="card"><div class="card-t">🏆 Достижения</div></div>';
                S.achievements.forEach(a => {
                    c.innerHTML += `<div class="card" style="opacity:${a.done ? 1 : 0.5};flex-direction:row;justify-content:space-between;align-items:center">
                        <div><span style="font-size:14px">${a.icon}</span> <span style="font-size:8px">${a.name}</span></div>
                        ${a.done ? '<span style="color:var(--green)">✅</span>' : '<span style="font-size:6px;color:var(--muted)">' + a.desc + '</span>'}
                    </div>`;
                });
            }
        }

        function renderGenes(g) {
            return ['t', 'c', 'y', 's', 'r'].map(x => 
                `<div class="gene gene-${x}">${g[x].includes(x.toUpperCase()) ? '★' : '○'}</div>`
            ).join('');
        }

        function renderBreed() {
            [0, 1].forEach(i => {
                const el = document.getElementById('b' + i);
                if (!el) return;
                const p = S.breed[i];
                el.innerHTML = p ? 
                    `<div class="ii">${p.strain.icon}</div><div class="in">${p.strain.name.slice(0, 8)}</div>` :
                    `<div class="ii">🌱</div><div class="in">Родитель ${i+1}</div>`;
            });
        }

        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери горшок'); closeModal('pm'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); closeModal('pm'); return; }

            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает'); return; }

            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: {
                    t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'),
                    c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'),
                    y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'),
                    s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'),
                    r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r')
                },
                progress: 0, stage: 0, health: 100, water: 70
            });

            S.stats.planted++;
            S.xp += 5;

            if (!S.achievements[0].done) { S.achievements[0].done = true; toast('🏆', 'Первый росток!'); }
            if (S.stats.planted >= 10 && !S.achievements[2].done) { S.achievements[2].done = true; toast('🏆', 'Садовод!'); }

            closeModal('pm');
            render('grow');
            toast('🌱', strain.name);
            save();
        }

        function harvest(p) {
            const skillMod = S.skills.find(s => s.id === 'rich')?.done ? 1.2 : 1;
            const researchMod = S.research.find(r => r.id === 'yield')?.done ? 1.3 : 1;
            const geneMod = p.genes.y.includes('Y') ? 1.3 : 0.85;
            const healthMod = p.health / 100;
            const qualityMod = S.research.find(r => r.id === 'terp')?.done ? 1.15 : 1;

            const yld = Math.floor(p.strain.yld * geneMod * healthMod * skillMod * researchMod * qualityMod);
            S.money += yld * 2;
            S.xp += yld;
            S.stats.harvests++;
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            S.selected = null;

            if (!S.achievements[1].done) { S.achievements[1].done = true; toast('🏆', 'Первый урожай!'); }
            if (S.stats.harvests >= 100 && !S.achievements[3].done) { S.achievements[3].done = true; toast('🏆', 'Фермер!'); }

            toast('✂️', `${yld}г • +${yld * 2}💰`);
            render('grow');
            save();
        }

        function doBreed() {
            if (!S.breed[0] || !S.breed[1]) { toast('❌', 'Выбери обоих'); return; }
            if (S.plants.length >= S.slots) { toast('❌', 'Нет места'); return; }

            const p1 = S.breed[0], p2 = S.breed[1];
            const inh = (a, b) => a[Math.floor(Math.random() * 2)] + b[Math.floor(Math.random() * 2)];

            S.plants.push({
                slot: S.plants.length,
                strain: { id: 'c' + Date.now(), name: p1.strain.name.split(' ')[0] + '×' + p2.strain.name.split(' ')[0], type: 'Hybrid', icon: '🧬', thc: 20, yld: 450, time: 8 },
                genes: {
                    t: inh(p1.genes.t, p2.genes.t),
                    c: inh(p1.genes.c, p2.genes.c),
                    y: inh(p1.genes.y, p2.genes.y),
                    s: inh(p1.genes.s, p2.genes.s),
                    r: inh(p1.genes.r, p2.genes.r)
                },
                progress: 0, stage: 0, health: 100, water: 70
            });

            S.stats.bred++;
            S.xp += 50;
            S.breed = [null, null];

            if (!S.achievements[4].done) { S.achievements[4].done = true; toast('🏆', 'Бридер!'); }
            if (S.stats.bred >= 50 && !S.achievements[11].done) { S.achievements[11].done = true; toast('🏆', 'Генетик!'); }

            toast('🧬', 'Новый сорт!');
            render('breed');
            save();
        }

        // Events
        document.addEventListener('DOMContentLoaded', () => {
            load();

            document.getElementById('start').addEventListener('click', () => {
                document.getElementById('tut').classList.add('h');
                loop = setInterval(tick, 1000);
            });

            // Tabs
            document.querySelectorAll('.tab[data-t]').forEach(t => {
                t.addEventListener('click', () => {
                    document.querySelectorAll('.tab[data-t]').forEach(x => x.classList.remove('on'));
                    t.classList.add('on');
                    render(t.dataset.t);
                });
            });

            // Speed
            document.querySelectorAll('[data-s]').forEach(b => {
                b.addEventListener('click', () => {
                    document.querySelectorAll('[data-s]').forEach(x => x.classList.remove('on'));
                    b.classList.add('on');
                    S.speed = parseInt(b.dataset.s);
                });
            });

            // Actions
            document.querySelectorAll('[data-a]').forEach(b => {
                b.addEventListener('click', () => {
                    const a = b.dataset.a;
                    if (a === 'plant') {
                        if (S.selected === null) toast('❌', 'Выбери горшок');
                        else if (S.plants.find(p => p.slot === S.selected)) toast('❌', 'Слот занят');
                        else { render('grow'); openModal('pm'); }
                    } else if (a === 'water') {
                        if (S.plants.length === 0) toast('💧', 'Нет растений');
                        else { S.plants.forEach(p => p.water = Math.min(100, p.water + 30)); toast('💧', 'Полито!'); render('grow'); }
                    } else if (a === 'nutrient') {
                        if (S.selected === null) toast('❌', 'Выбери растение');
                        else openModal('nm');
                    } else if (a === 'harvest') {
                        if (S.selected === null) toast('❌', 'Выбери растение');
                        else {
                            const p = S.plants.find(x => x.slot === S.selected);
                            if (!p) toast('❌', 'Пусто');
                            else if (p.stage < 6) toast('❌', 'Не готово');
                            else harvest(p);
                        }
                    } else if (a === 'save') { save(); toast('💾', 'Сохранено!'); }
                });
            });

            // Pot clicks
            document.getElementById('content').addEventListener('click', e => {
                const pot = e.target.closest('.pot');
                if (pot) {
                    const slot = parseInt(pot.dataset.slot);
                    S.selected = slot;
                    const p = S.plants.find(x => x.slot === slot);
                    if (!p) openModal('pm');
                    else if (p.stage >= 6) harvest(p);
                    else {
                        document.getElementById('imt').textContent = p.strain.name;
                        document.getElementById('imc').innerHTML = `
                            <div class="card">
                                <div class="card-r"><span>📍 Стадия</span><span>${['Семя','Росток','Сеянец','Вегетация','Преф.','Цветение','Harvest'][p.stage]}</span></div>
                                <div class="card-r"><span>📊 Прогресс</span><span>${Math.floor(p.progress)}%</span></div>
                                <div class="card-r"><span>❤️ Здоровье</span><span>${Math.floor(p.health)}%</span></div>
                                <div class="card-r"><span>💧 Вода</span><span>${Math.floor(p.water)}%</span></div>
                                <div class="card-r"><span>🧬 THC</span><span>${p.strain.thc}%</span></div>
                                <div class="card-r"><span>⚖️ Урожай</span><span>${p.strain.yld}г</span></div>
                            </div>
                            ${S.research.find(r => r.id === 'gen')?.done ? `
                            <div class="card" style="margin-top:8px">
                                <div class="card-t">🧬 Гены</div>
                                <div class="card-r"><span>T (THC)</span><span>${p.genes.t}</span></div>
                                <div class="card-r"><span>C (CBD)</span><span>${p.genes.c}</span></div>
                                <div class="card-r"><span>Y (Yield)</span><span>${p.genes.y}</span></div>
                                <div class="card-r"><span>S (Speed)</span><span>${p.genes.s}</span></div>
                                <div class="card-r"><span>R (Resist)</span><span>${p.genes.r}</span></div>
                            </div>` : ''}
                        `;
                        openModal('im');
                    }
                    render('grow');
                }

                // Seeds
                const seed = e.target.closest('[data-seed]');
                if (seed) plantSeed(seed.dataset.seed);

                // Equipment
                const eq = e.target.closest('[data-eq]');
                if (eq) {
                    const item = equipment.find(x => x.id === eq.dataset.eq);
                    if (S.money < item.price) { toast('❌', 'Не хватает'); return; }
                    if (S.equipment[item.id]) { toast('❌', 'Уже есть'); return; }
                    S.money -= S.skills.find(s => s.id === 'engineer')?.done ? Math.floor(item.price * 0.9) : item.price;
                    S.equipment[item.id] = true;
                    if (item.id === 'slot') S.slots = Math.min(15, S.slots + 1);
                    if (item.id === 'slot3') S.slots = Math.min(15, S.slots + 3);
                    if (item.id === 'co2') S.env.co2 = 1200;
                    if (item.id === 'vent') S.env.vent = true;
                    if (item.id === 'ac') S.env.ac = true;
                    toast('✅', item.name);
                    render('shop');
                    save();
                }

                // Nutrients
                const nut = e.target.closest('[data-nut]');
                if (nut) {
                    const n = nutrients.find(x => x.id === nut.dataset.nut);
                    if (!S.inv[n.id]) { toast('❌', 'Купи в магазине'); return; }
                    if (S.selected === null) { toast('❌', 'Выбери растение'); return; }
                    const p = S.plants.find(x => x.slot === S.selected);
                    if (!p) { toast('❌', 'Нет растения'); return; }
                    S.inv[n.id]--;
                    if (n.effect === 'health') p.health = Math.min(100, p.health + n.val);
                    toast('🧪', 'Применено');
                    render('shop');
                    save();
                }

                // Research
                const res = e.target.closest('[data-res]');
                if (res) {
                    const i = parseInt(res.dataset.res);
                    const r = S.research[i];
                    if (S.xp < r.cost) { toast('❌', 'Не хватает XP'); return; }
                    S.xp -= r.cost;
                    r.done = true;
                    if (r.id === 'hydro') S.slots++;
                    toast('🔬', r.name);
                    render('research');
                    save();
                }

                // Skills
                const sk = e.target.closest('[data-skill]');
                if (sk) {
                    const i = parseInt(sk.dataset.skill);
                    const s = S.skills[i];
                    if (S.xp < s.cost) { toast('❌', 'Не хватает XP'); return; }
                    S.xp -= s.cost;
                    s.done = true;
                    if (s.id === 'farmer') S.slots += 2;
                    toast('⚡', s.name);
                    render('skills');
                    save();
                }

                // Environment
                const env = e.target.closest('[data-env]');
                if (env) {
                    if (env.dataset.env === 'light') S.env.light = !S.env.light;
                    if (env.dataset.env === 'co2') {
                        if (!S.equipment.co2) { toast('❌', 'Купи CO₂'); return; }
                        S.env.co2 = S.env.co2 > 600 ? 400 : 1200;
                    }
                    render('env');
                }

                // Growbox
                const box = e.target.closest('[data-box]');
                if (box) {
                    const b = growboxes.find(x => x.id === box.dataset.box);
                    if (S.money < b.price) { toast('❌', 'Не хватает'); return; }
                    if (S.growbox === b.id) { toast('❌', 'Уже есть'); return; }
                    S.money -= b.price;
                    S.growbox = b.id;
                    S.slots = b.slots;
                    if (b.id === 'box5' && !S.achievements[13].done) { S.achievements[13].done = true; toast('🏆', 'Мастер боксов!'); }
                    toast('📦', b.name);
                    render('box');
                    save();
                }

                // Breed parents
                const b0 = e.target.closest('#b0');
                const b1 = e.target.closest('#b1');
                if (b0 || b1) {
                    const idx = b0 ? 0 : 1;
                    const avail = S.plants.filter(p => p.stage >= 6);
                    if (avail.length === 0) { toast('❌', 'Нет harvest'); return; }
                    S.breed[idx] = avail[idx === 0 ? 0 : Math.min(1, avail.length - 1)];
                    renderBreed();
                }

                // Breed button
                if (e.target.closest('#breedBtn')) doBreed();
            });

            // Modal closes
            document.querySelectorAll('[data-c]').forEach(b => {
                b.addEventListener('click', () => closeModal(b.dataset.c));
            });

            document.querySelectorAll('.modal').forEach(m => {
                m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
            });

            render('grow');
            update();
        });
    </script>
</body>
</html>
