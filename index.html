<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --muted: #8b949e;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 10px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: linear-gradient(180deg, #1a472a 0%, #0d2818 100%); border-bottom: 3px solid #2d5a3d; padding: 6px 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
        .logo { display: flex; align-items: center; gap: 4px; }
        .logo-icon { font-size: 18px; animation: sway-logo 3s ease-in-out infinite; }
        @keyframes sway-logo { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .logo-text { font-size: 10px; color: #7fff7f; text-shadow: 2px 2px 0 #000; }
        .stats { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .stat { text-align: center; min-width: 32px; }
        .stat-v { font-size: 10px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
        .stat-l { font-size: 5px; color: #8f8; }
        .speed { display: flex; gap: 2px; }
        .speed button { width: 24px; height: 20px; font-size: 7px; background: linear-gradient(180deg, #3d5a3d 0%, #2d4a2d 100%); border: 2px solid #4a7a4a; color: #fff; }
        .speed button.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border-color: #6aba6a; }
        
        /* Tabs */
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); padding: 6px; gap: 4px; border-bottom: 3px solid #2d5a2d; }
        .tab { padding: 8px 12px; font-size: 8px; background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; color: #8f8; text-shadow: 1px 1px 0 #000; min-width: 40px; text-align: center; }
        .tab.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border-color: #6aba6a; color: #fff; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 65px; background: linear-gradient(180deg, #0d2810 0%, #0d1117 100%); }
        
        /* Environment panel (compact) */
        .env-compact { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
        .env-stat { background: rgba(0,0,0,0.4); border: 1px solid #2d5a2d; padding: 4px; text-align: center; border-radius: 4px; }
        .env-stat-icon { font-size: 12px; }
        .env-stat-value { font-size: 8px; color: #7fff7f; }
        .env-stat-label { font-size: 5px; color: #8f8; }
        .env-stat.good { border-color: #238636; }
        .env-stat.warn { border-color: #f0883e; }
        .env-stat.bad { border-color: #8b0000; }
        
        /* Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        @media (max-width: 320px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        /* Pot */
        .pot { background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 30%, #6b4423 70%, #4a3520 100%); border: 2px solid #3d2914; border-top-color: #8b5a2b; border-left-color: #a0522d; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .pot:active { transform: translateY(2px); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 12px rgba(240,136,62,0.5); }
        .pot.ready { border-color: var(--green); animation: pot-ready 1.5s infinite; }
        @keyframes pot-ready { 0%, 100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 15px var(--green); } }
        .pot.dry { border-color: #8b4513; }
        .pot.sick { border-color: #8b0000; animation: pot-sick 0.5s infinite; }
        .pot.overwatered { border-color: #1e90ff; }
        .pot.needtrim { border-color: #a371f7; }
        @keyframes pot-sick { 0%, 100% { box-shadow: 0 0 5px #8b0000; } 50% { box-shadow: 0 0 10px #8b0000; } }
        
        /* Mini bars */
        .mini-bars { position: absolute; top: 2px; left: 2px; right: 2px; display: flex; flex-direction: column; gap: 1px; }
        .mini-bar { height: 3px; background: rgba(0,0,0,0.7); border-radius: 1px; overflow: hidden; }
        .mini-bar-fill { height: 100%; transition: width 0.3s; }
        .mini-bar-fill.water { background: linear-gradient(90deg, #1e90ff, #00bfff); }
        .mini-bar-fill.health { background: linear-gradient(90deg, #238636, #4a8a4a); }
        .mini-bar-fill.nutri { background: linear-gradient(90deg, #a371f7, #c084fc); }
        
        /* Soil */
        .pot-soil { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75%; height: 75%; background: radial-gradient(ellipse at center, #3d2914 0%, #2d1f0f 70%, #1a120a 100%); border-radius: 50% 50% 45% 45%; border: 2px solid #1a120a; }
        
        /* Plants */
        .plant-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .plant { position: relative; transform-origin: center bottom; }
        
        .plant-0 { width: 14px; height: 10px; background: radial-gradient(ellipse 7px 5px at center, #c4a35a 0%, #8b6914 60%, #5d4a0f 100%); border-radius: 50%; animation: seed-pulse 2s ease-in-out infinite; }
        @keyframes seed-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .plant-1 { width: 30px; height: 25px; animation: sway 2s ease-in-out infinite; }
        .plant-1::before, .plant-1::after { content: ''; position: absolute; width: 14px; height: 22px; background: linear-gradient(135deg, #6aba6a 0%, #4a9a4a 50%, #3a8a3a 100%); clip-path: polygon(50% 0%, 65% 15%, 85% 8%, 75% 30%, 95% 25%, 85% 45%, 100% 50%, 80% 60%, 90% 80%, 65% 70%, 50% 100%, 35% 70%, 10% 80%, 20% 60%, 0% 50%, 15% 45%, 5% 25%, 25% 30%, 15% 8%, 35% 15%); }
        .plant-1::before { left: 1px; transform: rotate(-20deg); }
        .plant-1::after { right: 1px; transform: rotate(20deg); }
        
        .plant-2 { width: 45px; height: 40px; background: radial-gradient(ellipse 22px 18px at center, #7aca7a 0%, #5a9a5a 40%, #4a8a4a 70%, #3a7a3a 100%); clip-path: polygon(50% 0%, 60% 12%, 75% 6%, 70% 24%, 88% 18%, 80% 38%, 100% 42%, 88% 58%, 100% 72%, 82% 68%, 90% 88%, 72% 82%, 65% 100%, 50% 90%, 35% 100%, 28% 82%, 10% 88%, 18% 68%, 0% 72%, 12% 58%, 0% 42%, 20% 38%, 12% 18%, 30% 24%, 25% 6%, 40% 12%); animation: sway 2.5s ease-in-out infinite; }
        
        .plant-3 { width: 55px; height: 50px; position: relative; animation: sway 3s ease-in-out infinite; }
        .plant-3::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 55px; height: 50px; background: radial-gradient(ellipse 28px 25px at center, #8ada8a 0%, #6aaa6a 35%, #5a9a5a 60%, #4a8a4a 100%); clip-path: polygon(50% 0%, 58% 10%, 72% 5%, 68% 20%, 85% 15%, 80% 32%, 95% 28%, 88% 45%, 100% 48%, 92% 62%, 100% 75%, 85% 72%, 92% 92%, 75% 85%, 68% 100%, 50% 92%, 32% 100%, 25% 85%, 8% 92%, 15% 72%, 0% 75%, 8% 62%, 0% 48%, 12% 45%, 5% 28%, 20% 32%, 15% 15%, 32% 20%, 28% 5%, 42% 10%); }
        .plant-3::after { content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 35px; height: 30px; background: radial-gradient(ellipse 18px 15px at center, #9aea9a 0%, #7aca7a 50%, #6aaa6a 100%); border-radius: 45%; }
        
        .plant-4 { width: 65px; height: 60px; position: relative; animation: sway 3s ease-in-out infinite; }
        .plant-4::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65px; height: 60px; background: radial-gradient(ellipse 32px 28px at center, #8ada8a 0%, #6aaa6a 30%, #5a9a5a 55%, #4a8a4a 80%, #3a7a3a 100%); clip-path: polygon(50% 0%, 58% 8%, 70% 3%, 68% 18%, 82% 12%, 78% 30%, 92% 25%, 88% 42%, 100% 45%, 95% 60%, 100% 75%, 86% 72%, 92% 92%, 78% 88%, 70% 100%, 50% 92%, 30% 100%, 22% 88%, 8% 92%, 14% 72%, 0% 75%, 5% 60%, 0% 45%, 12% 42%, 8% 25%, 22% 30%, 18% 12%, 32% 18%, 30% 3%, 42% 8%); }
        .plant-4 .pistils { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 30px; height: 25px; }
        .plant-4 .pistils::before, .plant-4 .pistils::after { content: ''; position: absolute; width: 3px; height: 12px; background: linear-gradient(to top, transparent, rgba(255,255,255,0.9)); border-radius: 50%; animation: pistil-grow 1s ease-out forwards; }
        .plant-4 .pistils::before { left: 8px; transform: rotate(-25deg); }
        .plant-4 .pistils::after { right: 8px; transform: rotate(25deg); animation-delay: 0.3s; }
        @keyframes pistil-grow { 0% { height: 0; } 100% { height: 12px; } }
        
        .plant-5 { width: 75px; height: 70px; position: relative; animation: sway 3s ease-in-out infinite, breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .plant-5::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 70px; background: radial-gradient(ellipse 38px 34px at center, #7aca7a 0%, #5a9a5a 25%, #4a8a4a 50%, #3a7a3a 75%, #2d6a2d 100%); clip-path: polygon(50% 0%, 57% 7%, 68% 2%, 66% 15%, 78% 10%, 75% 25%, 88% 20%, 85% 38%, 100% 42%, 92% 55%, 100% 65%, 88% 62%, 95% 82%, 80% 78%, 72% 100%, 50% 90%, 28% 100%, 20% 78%, 5% 82%, 12% 62%, 0% 65%, 8% 55%, 0% 42%, 15% 38%, 12% 20%, 25% 25%, 22% 10%, 34% 15%, 32% 2%, 43% 7%); }
        .plant-5 .buds { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 55px; height: 50px; }
        .plant-5 .buds::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 35px; height: 30px; background: radial-gradient(ellipse 15px 12px at 30% 40%, rgba(255,100,130,0.85), rgba(200,60,100,0.6)), radial-gradient(ellipse 14px 11px at 70% 35%, rgba(255,90,120,0.8), rgba(190,50,90,0.5)), radial-gradient(ellipse 16px 13px at 50% 55%, rgba(255,80,110,0.9), rgba(180,40,80,0.6)); border-radius: 45%; box-shadow: 0 0 15px rgba(255,80,110,0.4); animation: bud-pulse 2s ease-in-out infinite; }
        @keyframes bud-pulse { 0%, 100% { box-shadow: 0 0 15px rgba(255,80,110,0.4); } 50% { box-shadow: 0 0 20px rgba(255,80,110,0.6); } }
        
        .plant-6 { width: 85px; height: 80px; position: relative; animation: sway 3s ease-in-out infinite, breathe 4s ease-in-out infinite; }
        .plant-6::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85px; height: 80px; background: radial-gradient(ellipse 42px 38px at center, #6aaa6a 0%, #5a9a5a 20%, #4a8a4a 40%, #3a7a3a 60%, #2d6a2d 100%); clip-path: polygon(50% 0%, 56% 6%, 66% 1%, 64% 14%, 76% 9%, 74% 24%, 86% 19%, 84% 36%, 100% 40%, 94% 52%, 100% 62%, 88% 60%, 95% 80%, 82% 76%, 75% 100%, 50% 92%, 25% 100%, 18% 76%, 5% 80%, 12% 60%, 0% 62%, 6% 52%, 0% 40%, 16% 36%, 14% 19%, 26% 24%, 24% 9%, 36% 14%, 34% 1%, 44% 6%); box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08), 0 0 20px rgba(255,255,255,0.15); }
        .plant-6 .buds { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 65px; height: 60px; }
        .plant-6 .buds::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 55px; height: 50px; background: radial-gradient(ellipse 16px 14px at 25% 30%, rgba(255,90,120,0.95), rgba(220,60,100,0.7)), radial-gradient(ellipse 18px 15px at 75% 28%, rgba(255,85,115,0.95), rgba(215,55,95,0.7)), radial-gradient(ellipse 20px 17px at 50% 50%, rgba(255,75,105,0.98), rgba(200,45,85,0.75)), radial-gradient(ellipse 14px 12px at 20% 70%, rgba(255,100,125,0.9), rgba(210,65,105,0.65)), radial-gradient(ellipse 15px 13px at 80% 72%, rgba(255,95,120,0.9), rgba(205,60,100,0.65)); border-radius: 42%; box-shadow: 0 0 25px rgba(255,80,100,0.5); }
        .plant-6 .crystals { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 60px; height: 55px; pointer-events: none; }
        .plant-6 .crystals::before, .plant-6 .crystals::after { content: ''; position: absolute; width: 3px; height: 3px; background: rgba(255,255,255,0.95); border-radius: 50%; box-shadow: 8px 4px 0 rgba(255,255,255,0.9), 16px 2px 0 rgba(255,255,255,0.95), 24px 6px 0 rgba(255,255,255,0.85), 32px 3px 0 rgba(255,255,255,0.9), 40px 8px 0 rgba(255,255,255,0.85), 48px 5px 0 rgba(255,255,255,0.9), 4px 12px 0 rgba(255,255,255,0.8), 12px 16px 0 rgba(255,255,255,0.9), 20px 14px 0 rgba(255,255,255,0.85), 28px 18px 0 rgba(255,255,255,0.9), 36px 15px 0 rgba(255,255,255,0.8), 44px 20px 0 rgba(255,255,255,0.9), 52px 12px 0 rgba(255,255,255,0.85), 6px 24px 0 rgba(255,255,255,0.9), 14px 28px 0 rgba(255,255,255,0.85), 22px 26px 0 rgba(255,255,255,0.9), 30px 30px 0 rgba(255,255,255,0.85), 38px 28px 0 rgba(255,255,255,0.9), 46px 32px 0 rgba(255,255,255,0.8), 2px 36px 0 rgba(255,255,255,0.85), 10px 40px 0 rgba(255,255,255,0.9), 18px 38px 0 rgba(255,255,255,0.85), 26px 42px 0 rgba(255,255,255,0.9), 34px 40px 0 rgba(255,255,255,0.8), 42px 44px 0 rgba(255,255,255,0.85), 50px 38px 0 rgba(255,255,255,0.9); animation: crystal-sparkle 1.5s ease-in-out infinite; }
        .plant-6 .crystals::after { animation-delay: 0.75s; }
        @keyframes crystal-sparkle { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        @keyframes sway { 0%, 100% { transform: translate(-50%, -50%) rotate(-1.5deg); } 50% { transform: translate(-50%, -50%) rotate(1.5deg); } }
        
        .pot-info { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 5px; color: #fff; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.6); padding: 1px; }
        .pot-progress { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 7px; color: #7fff7f; text-shadow: 1px 1px 0 #000; }
        
        /* Status icons */
        .pot-status { position: absolute; top: 20px; right: 2px; display: flex; flex-direction: column; gap: 2px; }
        .status-icon { font-size: 10px; }
        
        /* Actions */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border-top: 2px solid #2d5a2d; padding: 4px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
        .act { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 4px 2px; display: flex; flex-direction: column; align-items: center; gap: 1px; color: #fff; text-shadow: 1px 1px 0 #000; font-size: 5px; }
        .act:active { transform: translateY(1px); }
        .act .i { font-size: 14px; }
        
        /* Cards */
        .card { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; padding: 10px; margin-bottom: 8px; }
        .card-t { font-size: 10px; color: #7fff7f; margin-bottom: 6px; }
        .card-r { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2d5a2d; font-size: 8px; }
        .card-p { font-size: 8px; color: #8f8; line-height: 1.5; margin-top: 6px; }
        
        /* Section */
        .section { display: flex; align-items: center; gap: 6px; margin: 10px 0 6px; padding: 8px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; }
        .section-icon { font-size: 18px; }
        .section-title { font-size: 10px; color: #7fff7f; }
        .section-desc { font-size: 6px; color: #8f8; margin-top: 2px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .item { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 8px; text-align: center; cursor: pointer; }
        .item:hover { border-color: #6aba6a; }
        .item.off { opacity: 0.5; }
        .item .ii { font-size: 18px; }
        .item .in { font-size: 7px; margin: 3px 0 2px; color: #f0f6fc; }
        .item .id { font-size: 6px; color: #8b949e; }
        .item .ip { font-size: 7px; color: #f0883e; margin-top: 3px; }
        
        /* Equip grid */
        .equip-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .equip-item { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; padding: 8px; cursor: pointer; }
        .equip-item:hover { border-color: #4a8a4a; }
        .equip-item.owned { border-color: #238636; background: linear-gradient(180deg, #1a4a2a 0%, #0d2a1a 100%); }
        .equip-item .ei { font-size: 18px; margin-bottom: 3px; }
        .equip-item .en { font-size: 8px; color: #7fff7f; }
        .equip-item .ed { font-size: 6px; color: #8f8; margin: 3px 0; }
        .equip-item .ec { font-size: 7px; color: #f0883e; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 8px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 3px solid #2d5a2d; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #2d5a2d; }
        .mtit { font-size: 11px; color: #7fff7f; }
        .mclose { background: #8b0000; border: 2px solid #5a0000; color: #fff; font-size: 12px; width: 24px; height: 24px; cursor: pointer; }
        .mbody { padding: 10px; }
        
        /* Plant interaction modal */
        .interact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .interact-btn { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 10px; text-align: center; cursor: pointer; }
        .interact-btn:hover { border-color: #6aba6a; }
        .interact-btn.disabled { opacity: 0.5; pointer-events: none; }
        .interact-btn .icon { font-size: 20px; margin-bottom: 4px; }
        .interact-btn .name { font-size: 8px; color: #f0f6fc; }
        .interact-btn .desc { font-size: 6px; color: #8f8; margin-top: 2px; }
        .interact-btn .cost { font-size: 7px; color: #f0883e; margin-top: 4px; }
        
        /* Light zone */
        .light-zone { position: relative; height: 60px; border: 2px solid #2d5a2d; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .light-zone::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at top, rgba(255,200,50,var(--light-intensity, 0)) 0%, transparent 70%); pointer-events: none; transition: all 0.5s; border-radius: 4px; }
        .light-zone.on::before { --light-intensity: 0.3; }
        .light-zone.high::before { --light-intensity: 0.6; background: radial-gradient(ellipse at top, rgba(255,220,100,var(--light-intensity)) 0%, transparent 70%); }
        .light-icon { font-size: 20px; z-index: 1; }
        .light-zone.on .light-icon { color: #ffd700; }
        .light-zone.off .light-icon { color: #444; }
        .light-label { font-size: 6px; color: #8f8; z-index: 1; }
        .light-ppfd { font-size: 7px; color: #7fff7f; z-index: 1; }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, #2d5a2d 0%, #1a3d1a 100%); border: 2px solid #4a8a4a; padding: 10px; text-align: center; z-index: 2000; display: none; }
        .toast.show { display: block; animation: toast-in 0.3s ease-out; }
        @keyframes toast-in { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .toast-t { font-size: 11px; color: #7fff7f; }
        .toast-x { font-size: 8px; margin-top: 3px; color: #8f8; }
        
        /* Tutorial */
        .tut { position: fixed; inset: 0; background: linear-gradient(180deg, #0d2810 0%, #0d1117 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; z-index: 3000; }
        .tut.h { display: none; }
        .tut h1 { font-size: 14px; color: #7fff7f; margin-bottom: 12px; }
        .tut-g { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 280px; }
        .tut-b { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; padding: 12px; text-align: center; }
        .tut-b h2 { font-size: 20px; margin-bottom: 4px; }
        .tut-b p { font-size: 7px; color: #8f8; }
        .tut-s { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border: 2px solid #5aaa5a; color: #fff; font-size: 10px; padding: 10px 24px; margin-top: 14px; cursor: pointer; text-shadow: 1px 1px 0 #000; }
        
        /* Breeding */
        .breed-pair { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .breed-slot { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 10px; text-align: center; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .breed-arrow { font-size: 20px; color: #f0883e; }
        .breed-btn { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border: 2px solid #5aaa5a; color: #fff; padding: 10px 20px; font-size: 9px; cursor: pointer; text-shadow: 1px 1px 0 #000; }
        .breed-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Dry */
        .dry-slot { background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%); border: 2px solid #5a4a3a; padding: 8px; margin-bottom: 6px; }
        .dry-progress { height: 4px; background: #1a120a; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .dry-progress-fill { height: 100%; background: linear-gradient(90deg, #f0883e, #ffa500); }
        
        /* Achievement */
        .achievement { display: flex; align-items: center; gap: 8px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; padding: 8px; margin-bottom: 6px; }
        .achievement.locked { opacity: 0.5; }
        .achievement-icon { font-size: 20px; }
        .achievement-info { flex: 1; }
        .achievement-name { font-size: 8px; color: #7fff7f; }
        .achievement-desc { font-size: 6px; color: #8f8; }
        .achievement-progress { font-size: 7px; color: #f0883e; }
        
        /* Page */
        .page { display: none; }
        .page.on { display: block; }
    </style>
</head>

        const equipment = [

            { id: 'lamp300', name: 'LED 300W', icon: '💡', desc: 'Средний', price: 300, bonus: { speed: 1.25, ppfd: 700 }, cat: 'light' },
            { id: 'lamp600', name: 'LED 600W', icon: '💡', desc: 'Мощный', price: 600, bonus: { speed: 1.4, ppfd: 1000 }, cat: 'light' },
            { id: 'lamp1000', name: 'LED 1000W', icon: '💡', desc: 'Профи', price: 1200, bonus: { speed: 1.6, ppfd: 1400 }, cat: 'light' },
            { id: 'fan', name: 'Вентилятор', icon: '🌀', desc: 'Циркуляция', price: 50, bonus: { health: 1.05, humidity: -5 }, cat: 'climate' },
            { id: 'filter', name: 'Угольный фильтр', icon: '🔲', desc: 'Запах', price: 80, bonus: { stealth: true }, cat: 'climate' },

            { id: 'timer', name: 'Таймер', icon: '⏱️', desc: 'Авто-свет', price: 25, bonus: { speed: 1.05 }, cat: 'climate' },

            { id: 'humidifier', name: 'Увлажнитель', icon: '💨', desc: '+Влажность', price: 120, bonus: { humidity: 20, health: 1.05 }, cat: 'climate' },
            { id: 'dehumid', name: 'Осушитель', icon: '🏜️', desc: '-Влажность', price: 150, bonus: { humidity: -20, health: 1.05 }, cat: 'climate' },
            { id: 'ph', name: 'pH-метр', icon: '⚗️', desc: 'Точный pH', price: 40, bonus: { health: 1.1 }, cat: 'tools' },

            { id: 'thermo', name: 'Термометр', icon: '🌡️', desc: 'Температура', price: 35, bonus: { health: 1.05 }, cat: 'tools' },
            { id: 'pot5', name: 'Горшок 5L', icon: '🪴', desc: '+1 слот', price: 50, bonus: { slots: 1 }, cat: 'space' },
            { id: 'pot10', name: 'Горшок 10L', icon: '🪴', desc: '+2 слота', price: 100, bonus: { slots: 2 }, cat: 'space' },
            { id: 'tent', name: 'Гроубокс 1x1', icon: '🏠', desc: '+4 слота', price: 200, bonus: { slots: 4, stealth: true }, cat: 'space' },
            { id: 'tent2', name: 'Гроубокс 2x2', icon: '🏠', desc: '+8 слотов', price: 500, bonus: { slots: 8, speed: 1.1 }, cat: 'space' },
            { id: 'hydro', name: 'Гидропоника', icon: '💧', desc: '+50% скорость', price: 800, bonus: { speed: 1.5, health: 0.95 }, cat: 'system' },
            { id: 'aero', name: 'Аэропоника', icon: '💨', desc: '+80% скорость', price: 1500, bonus: { speed: 1.8, health: 0.9 }, cat: 'system' }
        ];
        
        const labItems = [
            { id: 'microscope', name: 'Микроскоп', icon: '🔬', desc: 'Трихомы 60x', price: 150, unlocks: 'trim_quality' },
            { id: 'cloner', name: 'Клон-машина', icon: '🌱', desc: 'Клоны', price: 200, unlocks: 'cloning' },
            { id: 'dryer', name: 'Сушильный шкаф', icon: '💨', desc: 'Авто-сушка', price: 120, unlocks: 'auto_dry' },
            { id: 'trimmer', name: 'Триммер', icon: '✂️', desc: 'Авто-тримминг', price: 180, unlocks: 'auto_trim' },
            { id: 'extractor', name: 'Экстрактор', icon: '⚗️', desc: 'Масло', price: 300, unlocks: 'extraction' },
            { id: 'centrifuge', name: 'Центрифуга', icon: '🌀', desc: 'Терпены', price: 450, unlocks: 'terpenes' },
            { id: 'chromatograph', name: 'Хроматограф', icon: '📊', desc: 'Анализ THC', price: 600, unlocks: 'analysis' },
            { id: 'breeder', name: 'Бридинг', icon: '🧬', desc: 'Скрещивание', price: 500, unlocks: 'breeding' }
        ];
        
        // Interactions for plants
        const interactions = [
            { id: 'water', name: '💧 Полив', desc: '+30% воды', cost: 0, action: 'water' },
            { id: 'nutri', name: '🧪 Удобрение', desc: 'Открыть меню', cost: 0, action: 'nutri' },
            { id: 'trim', name: '✂️ Дефолиация', desc: 'Удалить листья', cost: 0, requires: 'stage>=3', action: 'trim' },
            { id: 'lst', name: '🌿 LST', desc: 'Низкий стресс', cost: 50, requires: 'stage>=2', effect: { yield: 1.15 }, action: 'lst' },
            { id: 'topping', name: '✂️ Топпинг', desc: 'Две колы', cost: 100, requires: 'stage>=2&&stage<=3', effect: { yield: 1.25 }, action: 'topping' },
            { id: 'flush', name: '💧 Промывка', desc: 'Перед сбором', cost: 0, requires: 'stage>=5', effect: { quality: 1.2 }, action: 'flush' },
            { id: 'check', name: '🔬 Проверка', desc: 'Трихомы', cost: 0, requires: 'lab:chromatograph', action: 'check' },
            { id: 'clone', name: '🌱 Клон', desc: 'Копия', cost: 200, requires: 'lab:cloner&&stage>=3', action: 'clone' }
        ];
        
        // Game State
        let S = {
            day: 1, time: 6, speed: 1, money: 500, xp: 0, level: 1,
            plants: [], slots: 6, selected: null,
            inv: { grow: 5, bloom: 3, calmag: 2, pk: 1, root: 0, enz: 0, co2: 0, silica: 0 },
            equipment: [],
            lab: [],
            drying: [],
            breeding: [null, null],
            light: { on: true, intensity: 1, schedule: '18/6' },
            climate: { temp: 25, humidity: 60, co2: 400 },
            stats: { harvests: 0, planted: 0, bred: 0, maxYield: 0, fastestGrow: 999, perfectGrows: 0 },
            tutorial: true
        };
        
        function load() { const s = localStorage.getItem('gc12'); if (s) S = {...S, ...JSON.parse(s)}; }
        function save() { localStorage.setItem('gc12', JSON.stringify(S)); }
        
        function toast(t, x) {
            document.getElementById('tt').textContent = t;
            document.getElementById('tx').textContent = x;
            const el = document.getElementById('toast');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1500);
        }
        
        function getEquipBonus() {
            let bonus = { speed: 1, health: 1, yield: 1, quality: 1, ppfd: 0 };
            S.equipment.forEach(id => {
                const e = equipment.find(x => x.id === id);
                if (e?.bonus) {
                    if (e.bonus.speed) bonus.speed *= e.bonus.speed;
                    if (e.bonus.health) bonus.health *= e.bonus.health;
                    if (e.bonus.yield) bonus.yield *= e.bonus.yield;
                    if (e.bonus.quality) bonus.quality *= e.bonus.quality;
                    if (e.bonus.ppfd) bonus.ppfd += e.bonus.ppfd;
                }
            });
            return bonus;
        }
        
        function tick() {
            S.time += 0.5 * S.speed;
            if (S.time >= 24) { S.time = 0; S.day++; }
            
            const lightHours = S.light.schedule === '18/6' ? 18 : S.light.schedule === '12/12' ? 12 : 24;
            S.light.on = S.time < lightHours;
            
            const bonus = getEquipBonus();
            const labBonus = S.lab.length > 0 ? 1.1 : 1;
            
            S.plants.forEach(p => {
                if (p.stage < 6) {
                    const lightMult = S.light.on ? S.light.intensity : 0.3;
                    p.progress += (1.5 * S.speed * 0.05) * bonus.speed * labBonus * p.strain.speed * lightMult;
                    p.water -= 0.35 * S.speed * (S.light.on ? 1.2 : 0.8);
                    
                    if (p.water < 30) p.health -= 0.25 * S.speed;
                    if (p.water > 85) p.health -= 0.15 * S.speed;
                    if (!S.light.on && p.stage < 4) p.health -= 0.05 * S.speed;
                    
                    p.health = Math.max(0, Math.min(100, p.health * bonus.health));
                    p.stage = p.progress < 5 ? 0 : p.progress < 12 ? 1 : p.progress < 25 ? 2 : p.progress < 45 ? 3 : p.progress < 70 ? 4 : p.progress < 95 ? 5 : 6;
                }
            });
            
            S.drying.forEach(d => { d.progress += 0.5 * S.speed; });
            S.drying = S.drying.filter(d => d.progress < 100);
            
            S.climate.temp = 25 + Math.sin(S.time / 12 * Math.PI) * 3;
            S.climate.humidity = 60 + Math.cos(S.time / 12 * Math.PI) * 10;
            
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }
            
            update();
            save();
        }
        
        function update() {
            document.getElementById('lvl').textContent = S.level;
            document.getElementById('day').textContent = S.day;
            document.getElementById('mny').textContent = S.money;
            document.getElementById('xp').textContent = S.xp;
        }
        
        function render(tab) {
            const c = document.getElementById('content');
            const bonus = getEquipBonus();
            
            if (tab === 'grow') {
                // Environment panel (compact)
                let html = '<div class="env-compact">';
                html += `<div class="env-stat ${S.light.on ? 'good' : 'bad'}"><div class="env-stat-icon">${S.light.on ? '💡' : '⬛'}</div><div class="env-stat-value">${S.light.on ? 'ON' : 'OFF'}</div><div class="env-stat-label">Свет</div></div>`;
                html += `<div class="env-stat ${S.climate.temp >= 20 && S.climate.temp <= 28 ? 'good' : 'warn'}"><div class="env-stat-icon">🌡️</div><div class="env-stat-value">${S.climate.temp.toFixed(1)}°</div><div class="env-stat-label">Темп</div></div>`;
                html += `<div class="env-stat ${S.climate.humidity >= 40 && S.climate.humidity <= 70 ? 'good' : 'warn'}"><div class="env-stat-icon">💧</div><div class="env-stat-value">${S.climate.humidity.toFixed(0)}%</div><div class="env-stat-label">Влаж</div></div>`;
                html += `<div class="env-stat good"><div class="env-stat-icon">📊</div><div class="env-stat-value">${bonus.ppfd}</div><div class="env-stat-label">PPFD</div></div>`;
                html += '</div>';
                
                // Pots
                html += '<div class="room">';
                for (let i = 0; i < S.slots; i++) {
                    const p = S.plants.find(x => x.slot === i);
                    const sel = S.selected === i ? 'sel' : '';
                    const ready = p && p.stage >= 6 ? 'ready' : '';
                    const dry = p && p.water < 30 ? 'dry' : '';
                    const sick = p && p.health < 50 ? 'sick' : '';
                    const overwatered = p && p.water > 85 ? 'overwatered' : '';
                    const needtrim = p && p.trimmed ? '' : '';
                    
                    if (p) {
                        const stageClass = `plant-${p.stage}`;
                        const budsHTML = p.stage >= 5 ? '<div class="buds"></div>' : '';
                        const pistilsHTML = p.stage === 4 ? '<div class="pistils"></div>' : '';
                        const crystalsHTML = p.stage >= 6 ? '<div class="crystals"></div>' : '';
                        
                        // Status icons
                        let statusIcons = '';
                        if (p.water < 30) statusIcons += '<div class="status-icon">💧</div>';
                        if (p.health < 50) statusIcons += '<div class="status-icon">❤️</div>';
                        if (p.stage >= 5 && p.flushed) statusIcons += '<div class="status-icon">✨</div>';
                        if (p.topping) statusIcons += '<div class="status-icon">✂️</div>';
                        if (p.lst) statusIcons += '<div class="status-icon">🌿</div>';
                        
                        html += `<div class="pot ${sel} ${ready} ${dry} ${sick} ${overwatered}" data-slot="${i}">
                            <div class="mini-bars">
                                <div class="mini-bar"><div class="mini-bar-fill water" style="width:${p.water}%"></div></div>
                                <div class="mini-bar"><div class="mini-bar-fill health" style="width:${p.health}%"></div></div>
                            </div>
                            <div class="pot-soil"></div>
                            <div class="plant-container">
                                <div class="plant ${stageClass}">${budsHTML}${pistilsHTML}${crystalsHTML}</div>
                            </div>
                            ${statusIcons ? `<div class="pot-status">${statusIcons}</div>` : ''}
                            <div class="pot-progress">${Math.floor(p.progress)}%</div>
                            <div class="pot-info">${p.strain.name.slice(0, 8)}</div>
                        </div>`;
                    } else {

        function showInteractModal() {
            const p = S.plants.find(x => x.slot === S.selected);
            if (!p) { toast('❌', 'Выбери растение'); return; }
            
            let html = '<div class="interact-grid">';
            
            interactions.forEach(int => {
                // Check requirements
                let canUse = true;
                if (int.requires) {
                    if (int.requires.includes('stage>=')) {
                        const minStage = parseInt(int.requires.match(/stage>=(\d)/)?.[1] || 0);
                        if (p.stage < minStage) canUse = false;
                    }
                    if (int.requires.includes('stage<=')) {
                        const maxStage = parseInt(int.requires.match(/stage<=(\d)/)?.[1] || 99);
                        if (p.stage > maxStage) canUse = false;
                    }
                    if (int.requires.includes('lab:')) {
                        const labId = int.requires.match(/lab:(\w+)/)?.[1];
                        if (!S.lab.includes(labId)) canUse = false;
                    }
                }
                if (S.money < int.cost && int.cost > 0) canUse = false;
                
                html += `<div class="interact-btn ${canUse ? '' : 'disabled'}" data-interact="${int.id}">
                    <div class="icon">${int.name.split(' ')[0]}</div>
                    <div class="name">${int.name.split(' ').slice(1).join(' ')}</div>
                    <div class="desc">${int.desc}</div>
                    ${int.cost > 0 ? `<div class="cost">💰 ${int.cost}</div>` : ''}
                </div>`;
            });
            
            html += '</div>';
            
            document.getElementById('interactTit').textContent = `✋ ${p.strain.name}`;
            document.getElementById('interactBody').innerHTML = html;
            document.getElementById('interactModal').classList.add('open');
        }
        
        function doInteraction(id) {
            const p = S.plants.find(x => x.slot === S.selected);
            if (!p) { toast('❌', 'Выбери растение'); return; }
            
            const int = interactions.find(x => x.id === id);
            if (!int) return;
            
            if (int.cost > 0 && S.money < int.cost) { toast('❌', 'Не хватает денег'); return; }
            
            switch (int.action) {
                case 'water':
                    p.water = Math.min(100, p.water + 30);
                    p.health = Math.min(100, p.health + 2);
                    toast('💧', 'Полито');
                    break;
                case 'nutri':
                    document.getElementById('interactModal').classList.remove('open');
                    document.getElementById('nutrModal').classList.add('open');
                    return;
                case 'trim':
                    if (p.stage < 3) { toast('❌', 'Нужно стадия 3+'); return; }
                    p.health = Math.min(100, p.health + 10);
                    p.yieldBonus = (p.yieldBonus || 1) * 1.05;
                    toast('✂️', 'Дефолиация +5% урожай');
                    break;
                case 'lst':
                    if (p.stage < 2) { toast('❌', 'Нужно стадия 2+'); return; }
                    if (p.lst) { toast('❌', 'Уже сделано'); return; }
                    S.money -= int.cost;
                    p.lst = true;
                    p.yieldBonus = (p.yieldBonus || 1) * 1.15;
                    toast('🌿', 'LST применён +15% урожай');
                    break;
                case 'topping':
                    if (p.stage < 2 || p.stage > 3) { toast('❌', 'Только стадии 2-3'); return; }
                    if (p.topping) { toast('❌', 'Уже сделано'); return; }
                    S.money -= int.cost;
                    p.topping = true;
                    p.yieldBonus = (p.yieldBonus || 1) * 1.25;
                    toast('✂️', 'Топпинг +25% урожай');
                    break;
                case 'flush':
                    if (p.stage < 5) { toast('❌', 'Нужно стадия 5+'); return; }
                    if (p.flushed) { toast('❌', 'Уже промыто'); return; }
                    p.flushed = true;
                    p.qualityBonus = 1.2;
                    toast('💧', 'Промывка +20% качество');
                    break;
                case 'check':
                    if (p.stage < 5) { toast('❌', 'Нужно стадия 5+'); return; }
                    const trichomes = ['прозрачные', 'мутные', 'янтарные'][Math.floor(Math.random() * 3)];
                    const ready = trichomes === 'мутные';
                    toast('🔬', `Трихомы: ${trichomes}${ready ? ' ✓ Готов!' : ''}`);
                    break;
                case 'clone':
                    if (p.stage < 3) { toast('❌', 'Нужно стадия 3+'); return; }
                    if (S.money < int.cost) { toast('❌', 'Не хватает денег'); return; }
                    S.money -= int.cost;
                    // Add clone as new plant
                    const emptySlot = [...Array(S.slots).keys()].find(i => !S.plants.find(p => p.slot === i));
                    if (emptySlot !== undefined) {
                        S.plants.push({
                            slot: emptySlot, strain: p.strain,
                            genes: p.genes,
                            progress: 0, stage: 0, health: 100, water: 70, startDay: S.day,
                            topping: false, lst: false, flushed: false, yieldBonus: 1
                        });
                        toast('🌱', 'Клон создан!');
                    } else {
                        toast('❌', 'Нет свободных слотов');
                        S.money += int.cost;
                    }
                    break;
            }
            
            S.xp += 5;
            document.getElementById('interactModal').classList.remove('open');
            save();
            render('grow');
        }
        
        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); return; }
            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает денег'); return; }
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: { t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'), c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'), y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'), s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'), r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r') },
                progress: 0, stage: 0, health: 100, water: 70, startDay: S.day,
                topping: false, lst: false, flushed: false, yieldBonus: 1
            });

        function harvest(p) {
            const bonus = getEquipBonus();
            let yld = Math.floor(p.strain.yld * (p.genes?.y?.includes('Y') ? 1.3 : 0.85) * (p.health / 100) * bonus.yield * (p.yieldBonus || 1));
            if (p.genes?.t?.includes('T')) yld = Math.floor(yld * 1.1);
            if (p.flushed) yld = Math.floor(yld * (p.qualityBonus || 1));
            
            S.drying.push({
                strain: p.strain,
                weight: yld,
                progress: 0,
                quality: p.health * bonus.quality * (p.flushed ? 1.2 : 1),
                genes: p.genes
            });
            
            S.stats.harvests++;
            S.xp += 50;
            if (yld > S.stats.maxYield) S.stats.maxYield = yld;
            if (p.health >= 99) S.stats.perfectGrows++;
            
            const growDays = S.day - p.startDay;
            if (growDays < S.stats.fastestGrow) S.stats.fastestGrow = growDays;
            
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            toast('✂️', `+${yld}г на сушку`);
            save();
            render('grow');
        }
        
        function addToBreed(id) {
            const strain = strains.find(s => s.id === id);
            if (!S.breeding[0]) {
                S.breeding[0] = strain;
            } else if (!S.breeding[1] && S.breeding[0].id !== id) {
                S.breeding[1] = strain;
            } else {
                S.breeding[0] = strain;
                S.breeding[1] = null;
            }
            render('breed');
        }
        
        function breed() {
            if (!S.breeding[0] || !S.breeding[1]) { toast('❌', 'Выбери 2 сорта'); return; }
            if (S.money < 500) { toast('❌', 'Нужно $500'); return; }
            
            S.money -= 500;
            S.stats.bred++;
            S.xp += 100;
            
            const newGenes = {};
            ['t', 'c', 'y', 's', 'r'].forEach(g => {
                const p1 = S.breeding[0].genes?.[g] || 'XY';
                const p2 = S.breeding[1].genes?.[g] || 'XY';
                const a1 = p1[Math.floor(Math.random() * 2)];
                const a2 = p2[Math.floor(Math.random() * 2)];
                newGenes[g] = a1 + a2;
            });
            
            const newStrain = {
                id: 'custom_' + Date.now(),
                name: S.breeding[0].name.split(' ')[0] + ' x ' + S.breeding[1].name.split(' ')[0],
                type: Math.random() > 0.5 ? S.breeding[0].type : S.breeding[1].type,
                icon: '🧬',
                thc: Math.floor((S.breeding[0].thc + S.breeding[1].thc) / 2 + Math.random() * 5),
                yld: Math.floor((S.breeding[0].yld + S.breeding[1].yld) / 2 + Math.random() * 100),
                price: 200,
                speed: (S.breeding[0].speed + S.breeding[1].speed) / 2,
                genes: newGenes
            };
            
            strains.push(newStrain);
            toast('🧬', 'Новый сорт: ' + newStrain.name);
            
            S.breeding = [null, null];
            save();
            render('breed');
        }
        
        // Event listeners
        document.getElementById('startBtn').onclick = () => { S.tutorial = false; document.getElementById('tut').classList.add('h'); save(); };
        
        document.querySelectorAll('.speed button').forEach(b => b.onclick = () => {
            document.querySelectorAll('.speed button').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            S.speed = parseInt(b.dataset.s);
        });
        
        document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
            t.classList.add('on');
            render(t.dataset.t);
        });
        
        document.querySelectorAll('.actions .act').forEach(b => b.onclick = () => {
            const a = b.dataset.a;
            if (a === 'plant') document.getElementById('seedModal').classList.add('open');
            else if (a === 'interact') showInteractModal();
            else if (a === 'harvest') {
                const p = S.plants.find(x => x.slot === S.selected);
                if (p && p.stage >= 6) harvest(p);
                else toast('❌', 'Выбери готовое растение');
            }
            else if (a === 'save') { save(); toast('💾', 'Сохранено'); }
        });
        
        document.getElementById('content').onclick = (e) => {
            const pot = e.target.closest('.pot');
            if (pot) {
                const slot = parseInt(pot.dataset.slot);
                S.selected = slot;
                const p = S.plants.find(x => x.slot === slot);
                if (p && p.stage >= 6) harvest(p);
                render('grow');
            }
            const item = e.target.closest('.item');
            if (item) {
                if (item.dataset.seed) plantSeed(item.dataset.seed);
                else if (item.dataset.nut) buyNutrient(item.dataset.nut);
                else if (item.dataset.breed) addToBreed(item.dataset.breed);
            }
            const equip = e.target.closest('.equip-item');
            if (equip) {
                if (equip.dataset.equip) buyEquipment(equip.dataset.equip);
                else if (equip.dataset.lab) buyLab(equip.dataset.lab);
            }
            const interactBtn = e.target.closest('.interact-btn');
            if (interactBtn && !interactBtn.classList.contains('disabled')) {
                doInteraction(interactBtn.dataset.interact);
            }
        };
        
        document.getElementById('breedBtn')?.addEventListener('click', breed);
        
        document.querySelectorAll('.mclose').forEach(b => b.onclick = () => document.getElementById(b.dataset.c).classList.remove('open'));
        
        // Init
        load();
        if (!S.tutorial) document.getElementById('tut').classList.add('h');
        update();
        render('grow');
        setInterval(tick, 1000);
    </script>
</body>
</html>
