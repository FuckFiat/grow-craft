<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 10px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: linear-gradient(180deg, #1a472a 0%, #0d2818 100%); border-bottom: 3px solid #2d5a3d; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 6px; }
        .logo-icon { font-size: 20px; animation: sway-logo 3s ease-in-out infinite; }
        @keyframes sway-logo { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .logo-text { font-size: 12px; color: #7fff7f; text-shadow: 2px 2px 0 #000; }
        .stats { display: flex; gap: 8px; align-items: center; }
        .stat { text-align: center; min-width: 40px; }
        .stat-v { font-size: 11px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
        .stat-l { font-size: 6px; color: #8f8; }
        .speed { display: flex; gap: 3px; }
        .speed button { 
            width: 28px; height: 24px; font-size: 8px; 
            background: linear-gradient(180deg, #3d5a3d 0%, #2d4a2d 100%);
            border: 2px solid #4a7a4a;
            color: #fff; text-shadow: 1px 1px 0 #000;
        }
        .speed button.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border-color: #6aba6a; }
        
        /* Tabs */
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); padding: 8px; gap: 6px; border-bottom: 3px solid #2d5a2d; }
        .tab { 
            padding: 10px 16px; font-size: 9px; 
            background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%);
            border: 2px solid #3d5a3d;
            color: #8f8; text-shadow: 1px 1px 0 #000;
            min-width: 50px;
            text-align: center;
        }
        .tab.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 100%); border-color: #6aba6a; color: #fff; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 70px; background: linear-gradient(180deg, #0d2810 0%, #0d1117 100%); }
        
        /* Grow Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (max-width: 320px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        /* Pot with realistic plant */
        .pot { 
            background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 30%, #6b4423 70%, #4a3520 100%);
            border: 3px solid #3d2914;
            border-top-color: #8b5a2b;
            border-left-color: #a0522d;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.4), inset 2px 2px 0 rgba(255,255,255,0.1);
        }
        .pot:active { transform: translateY(2px); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 12px rgba(240,136,62,0.5); }
        .pot.ready { border-color: var(--green); animation: pot-ready 1.5s infinite; }
        @keyframes pot-ready { 0%, 100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 15px var(--green), 0 0 25px rgba(35,134,54,0.3); } }
        
        /* Soil */
        .pot-soil {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75%; height: 75%;
            background: radial-gradient(ellipse at center, #3d2914 0%, #2d1f0f 70%, #1a120a 100%);
            border-radius: 50% 50% 45% 45%;
            border: 2px solid #1a120a;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.05);
        }
        
        /* Realistic Cannabis Plant CSS Art */
        .plant-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        /* Base plant styles */
        .plant {
            position: relative;
            transform-origin: center bottom;
        }
        
        /* Stage 0: Seed */
        .plant-0 {
            width: 14px;
            height: 10px;
            background: radial-gradient(ellipse 7px 5px at center, #c4a35a 0%, #8b6914 60%, #5d4a0f 100%);
            border-radius: 50% 50% 50% 50%;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.3), inset 1px 1px 2px rgba(255,255,255,0.2);
            animation: seed-pulse 2s ease-in-out infinite;
        }
        @keyframes seed-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Stage 1: Sprout */
        .plant-1 {
            width: 30px;
            height: 25px;
            animation: sprout-appear 0.5s ease-out, sway 2s ease-in-out infinite;
        }
        .plant-1::before, .plant-1::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 22px;
            background: linear-gradient(135deg, #6aba6a 0%, #4a9a4a 50%, #3a8a3a 100%);
            clip-path: polygon(50% 0%, 65% 15%, 85% 8%, 75% 30%, 95% 25%, 85% 45%, 100% 50%, 80% 60%, 90% 80%, 65% 70%, 50% 100%, 35% 70%, 10% 80%, 20% 60%, 0% 50%, 15% 45%, 5% 25%, 25% 30%, 15% 8%, 35% 15%);
            box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2), inset 1px 1px 0 rgba(255,255,255,0.15);
        }
        .plant-1::before { left: 1px; transform: rotate(-20deg); }
        .plant-1::after { right: 1px; transform: rotate(20deg); }
        @keyframes sprout-appear { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* Stage 2: Seedling */
        .plant-2 {
            width: 45px;
            height: 40px;
            background: radial-gradient(ellipse 22px 18px at center, #7aca7a 0%, #5a9a5a 40%, #4a8a4a 70%, #3a7a3a 100%);
            clip-path: polygon(50% 0%, 60% 12%, 75% 6%, 70% 24%, 88% 18%, 80% 38%, 100% 42%, 88% 58%, 100% 72%, 82% 68%, 90% 88%, 72% 82%, 65% 100%, 50% 90%, 35% 100%, 28% 82%, 10% 88%, 18% 68%, 0% 72%, 12% 58%, 0% 42%, 20% 38%, 12% 18%, 30% 24%, 25% 6%, 40% 12%);
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.15), inset 2px 2px 0 rgba(255,255,255,0.1);
            animation: sway 2.5s ease-in-out infinite;
        }
        
        /* Stage 3: Vegetative */
        .plant-3 {
            width: 55px;
            height: 50px;
            position: relative;
            animation: sway 3s ease-in-out infinite;
        }
        .plant-3::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 50px;
            background: radial-gradient(ellipse 28px 25px at center, #8ada8a 0%, #6aaa6a 35%, #5a9a5a 60%, #4a8a4a 100%);
            clip-path: polygon(50% 0%, 58% 10%, 72% 5%, 68% 20%, 85% 15%, 80% 32%, 95% 28%, 88% 45%, 100% 48%, 92% 62%, 100% 75%, 85% 72%, 92% 92%, 75% 85%, 68% 100%, 50% 92%, 32% 100%, 25% 85%, 8% 92%, 15% 72%, 0% 75%, 8% 62%, 0% 48%, 12% 45%, 5% 28%, 20% 32%, 15% 15%, 32% 20%, 28% 5%, 42% 10%);
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.12), inset 2px 2px 0 rgba(255,255,255,0.08);
        }
        .plant-3::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 30px;
            background: radial-gradient(ellipse 18px 15px at center, #9aea9a 0%, #7aca7a 50%, #6aaa6a 100%);
            border-radius: 45%;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1);
        }
        
        /* Stage 4: Pre-flowering */
        .plant-4 {
            width: 65px;
            height: 60px;
            position: relative;
            animation: sway 3s ease-in-out infinite;
        }
        .plant-4::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 60px;
            background: radial-gradient(ellipse 32px 28px at center, #8ada8a 0%, #6aaa6a 30%, #5a9a5a 55%, #4a8a4a 80%, #3a7a3a 100%);
            clip-path: polygon(50% 0%, 58% 8%, 70% 3%, 68% 18%, 82% 12%, 78% 30%, 92% 25%, 88% 42%, 100% 45%, 95% 60%, 100% 75%, 86% 72%, 92% 92%, 78% 88%, 70% 100%, 50% 92%, 30% 100%, 22% 88%, 8% 92%, 14% 72%, 0% 75%, 5% 60%, 0% 45%, 12% 42%, 8% 25%, 22% 30%, 18% 12%, 32% 18%, 30% 3%, 42% 8%);
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.12), inset 2px 2px 0 rgba(255,255,255,0.08);
        }
        /* Pistils - white hairs */
        .plant-4 .pistils {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 25px;
        }
        .plant-4 .pistils::before,
        .plant-4 .pistils::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 12px;
            background: linear-gradient(to top, transparent, rgba(255,255,255,0.9));
            border-radius: 50%;
            animation: pistil-grow 1s ease-out forwards;
        }
        .plant-4 .pistils::before { left: 8px; transform: rotate(-25deg); }
        .plant-4 .pistils::after { right: 8px; transform: rotate(25deg); }
        @keyframes pistil-grow { 0% { height: 0; } 100% { height: 12px; } }
        
        /* Stage 5: Flowering */
        .plant-5 {
            width: 75px;
            height: 70px;
            position: relative;
            animation: sway 3s ease-in-out infinite, breathe 4s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .plant-5::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 70px;
            background: radial-gradient(ellipse 38px 34px at center, #7aca7a 0%, #5a9a5a 25%, #4a8a4a 50%, #3a7a3a 75%, #2d6a2d 100%);
            clip-path: polygon(50% 0%, 57% 7%, 68% 2%, 66% 15%, 78% 10%, 75% 25%, 88% 20%, 85% 38%, 100% 42%, 92% 55%, 100% 65%, 88% 62%, 95% 82%, 80% 78%, 72% 100%, 50% 90%, 28% 100%, 20% 78%, 5% 82%, 12% 62%, 0% 65%, 8% 55%, 0% 42%, 15% 38%, 12% 20%, 25% 25%, 22% 10%, 34% 15%, 32% 2%, 43% 7%);
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.15), inset 3px 3px 0 rgba(255,255,255,0.08);
        }
        
        /* Buds */
        .plant-5 .buds {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 50px;
        }
        .plant-5 .buds::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 30px;
            background: 
                radial-gradient(ellipse 15px 12px at 30% 40%, rgba(255,100,130,0.85) 0%, rgba(200,60,100,0.6) 100%),
                radial-gradient(ellipse 14px 11px at 70% 35%, rgba(255,90,120,0.8) 0%, rgba(190,50,90,0.5) 100%),
                radial-gradient(ellipse 16px 13px at 50% 55%, rgba(255,80,110,0.9) 0%, rgba(180,40,80,0.6) 100%);
            border-radius: 45%;
            box-shadow: 0 0 15px rgba(255,80,110,0.4);
            animation: bud-pulse 2s ease-in-out infinite;
        }
        @keyframes bud-pulse { 0%, 100% { box-shadow: 0 0 15px rgba(255,80,110,0.4); } 50% { box-shadow: 0 0 20px rgba(255,80,110,0.6); } }
        
        /* Stage 6: Harvest */
        .plant-6 {
            width: 85px;
            height: 80px;
            position: relative;
            animation: sway 3s ease-in-out infinite, breathe 4s ease-in-out infinite;
        }
        
        .plant-6::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85px;
            height: 80px;
            background: radial-gradient(ellipse 42px 38px at center, #6aaa6a 0%, #5a9a5a 20%, #4a8a4a 40%, #3a7a3a 60%, #2d6a2d 100%);
            clip-path: polygon(50% 0%, 56% 6%, 66% 1%, 64% 14%, 76% 9%, 74% 24%, 86% 19%, 84% 36%, 100% 40%, 94% 52%, 100% 62%, 88% 60%, 95% 80%, 82% 76%, 75% 100%, 50% 92%, 25% 100%, 18% 76%, 5% 80%, 12% 60%, 0% 62%, 6% 52%, 0% 40%, 16% 36%, 14% 19%, 26% 24%, 24% 9%, 36% 14%, 34% 1%, 44% 6%);
            box-shadow: 
                inset -5px -5px 0 rgba(0,0,0,0.2), 
                inset 3px 3px 0 rgba(255,255,255,0.08),
                0 0 20px rgba(255,255,255,0.15);
        }
        
        /* Big buds with crystals */
        .plant-6 .buds {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 60px;
        }
        .plant-6 .buds::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 50px;
            background: 
                radial-gradient(ellipse 16px 14px at 25% 30%, rgba(255,90,120,0.95) 0%, rgba(220,60,100,0.7) 100%),
                radial-gradient(ellipse 18px 15px at 75% 28%, rgba(255,85,115,0.95) 0%, rgba(215,55,95,0.7) 100%),
                radial-gradient(ellipse 20px 17px at 50% 50%, rgba(255,75,105,0.98) 0%, rgba(200,45,85,0.75) 100%),
                radial-gradient(ellipse 14px 12px at 20% 70%, rgba(255,100,125,0.9) 0%, rgba(210,65,105,0.65) 100%),
                radial-gradient(ellipse 15px 13px at 80% 72%, rgba(255,95,120,0.9) 0%, rgba(205,60,100,0.65) 100%);
            border-radius: 42%;
            box-shadow: 0 0 25px rgba(255,80,100,0.5);
        }
        
        /* Crystals */
        .plant-6 .crystals {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 55px;
            pointer-events: none;
        }
        .plant-6 .crystals::before,
        .plant-6 .crystals::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            box-shadow: 
                8px 4px 0 rgba(255,255,255,0.9),
                16px 2px 0 rgba(255,255,255,0.95),
                24px 6px 0 rgba(255,255,255,0.85),
                32px 3px 0 rgba(255,255,255,0.9),
                40px 8px 0 rgba(255,255,255,0.85),
                48px 5px 0 rgba(255,255,255,0.9),
                4px 12px 0 rgba(255,255,255,0.8),
                12px 16px 0 rgba(255,255,255,0.9),
                20px 14px 0 rgba(255,255,255,0.85),
                28px 18px 0 rgba(255,255,255,0.9),
                36px 15px 0 rgba(255,255,255,0.8),
                44px 20px 0 rgba(255,255,255,0.9),
                52px 12px 0 rgba(255,255,255,0.85),
                6px 24px 0 rgba(255,255,255,0.9),
                14px 28px 0 rgba(255,255,255,0.85),
                22px 26px 0 rgba(255,255,255,0.9),
                30px 30px 0 rgba(255,255,255,0.85),
                38px 28px 0 rgba(255,255,255,0.9),
                46px 32px 0 rgba(255,255,255,0.8),
                2px 36px 0 rgba(255,255,255,0.85),
                10px 40px 0 rgba(255,255,255,0.9),
                18px 38px 0 rgba(255,255,255,0.85),
                26px 42px 0 rgba(255,255,255,0.9),
                34px 40px 0 rgba(255,255,255,0.8),
                42px 44px 0 rgba(255,255,255,0.85),
                50px 38px 0 rgba(255,255,255,0.9);
            animation: crystal-sparkle 1.5s ease-in-out infinite;
        }
        .plant-6 .crystals::after {
            animation-delay: 0.75s;
        }
        @keyframes crystal-sparkle { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        /* Water droplets animation */
        .water-drops {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .water-drops::before,
        .water-drops::after {
            content: '💧';
            position: absolute;
            font-size: 10px;
            opacity: 0;
            animation: drop-fall 2s ease-in infinite;
        }
        .water-drops::before { left: -15px; animation-delay: 0s; }
        .water-drops::after { left: 15px; animation-delay: 1s; }
        @keyframes drop-fall { 0% { top: -20px; opacity: 0; } 10% { opacity: 1; } 100% { top: 40px; opacity: 0; } }
        
        /* Plant sway animation */
        @keyframes sway { 0%, 100% { transform: translate(-50%, -50%) rotate(-1.5deg); } 50% { transform: translate(-50%, -50%) rotate(1.5deg); } }
        
        .pot-name { position: absolute; bottom: 3px; left: 0; right: 0; text-align: center; font-size: 6px; color: #fff; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.5); padding: 2px; }
        .pot-progress { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-size: 8px; color: #7fff7f; text-shadow: 1px 1px 0 #000; }
        .pot-water { position: absolute; top: 3px; right: 3px; font-size: 7px; }
        
        /* Bottom nav */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border-top: 3px solid #2d5a2d; display: flex; justify-content: space-around; padding: 8px 0; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 6px; color: #8f8; background: none; border: none; cursor: pointer; }
        .nav-btn.on { color: #7fff7f; }
        .nav-btn span { font-size: 18px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 10px; z-index: 1000; }
        .modal.open { display: flex; }
        .box { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 3px solid #2d5a2d; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .mhead { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 2px solid #2d5a2d; }
        .mtit { font-size: 12px; color: #7fff7f; }
        .mclose { background: #8b0000; border: 2px solid #5a0000; color: #fff; font-size: 14px; width: 28px; height: 28px; cursor: pointer; }
        .mbody { padding: 12px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .item { background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%); border: 2px solid #3d5a3d; padding: 10px; text-align: center; cursor: pointer; }
        .item:hover { border-color: #6aba6a; }
        .item.off { opacity: 0.5; }
        .item .ii { font-size: 22px; }
        .item .in { font-size: 8px; margin: 4px 0 2px; color: var(--text-bright); }
        .item .id { font-size: 7px; color: var(--muted); }
        .item .ip { font-size: 8px; color: var(--gold); margin-top: 4px; }
        
        /* Card */
        .card { background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; padding: 12px; margin-bottom: 10px; }
        .card-t { font-size: 11px; color: #7fff7f; margin-bottom: 8px; }
        .card-r { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2d5a2d; font-size: 9px; }
        .card-p { font-size: 9px; color: #8f8; line-height: 1.6; margin-top: 8px; }
        
        /* Section */
        .section { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; padding: 10px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1f0d 100%); border: 2px solid #2d5a2d; }
        .section-icon { font-size: 20px; }
        .section-title { font-size: 11px; color: #7fff7f; }
        .section-desc { font-size: 7px; color: #8f8; margin-top: 2px; }
        
        /* Progress */
        .prog { height: 8px; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
        .prog-f { height: 100%; background: linear-gradient(90deg, #238636, #f0883e); transition: width 0.3s; }
        
        /* Lesson */
        .lesson { background: linear-gradient(180deg, #1a2d1a 0%, #0d1a0d 100%); border: 2px solid #2d5a2d; padding: 12px; margin-bottom: 8px; cursor: pointer; }
        .lesson:hover { border-color: #4a8a4a; }
        .lesson h3 { font-size: 10px; color: #7fff7f; margin-bottom: 6px; }
        .lesson p { font-size: 8px; color: #c9d1d9; line-height: 1.5; }
        .lesson .data { background: #0a150a; border: 1px solid #2d5a2d; padding: 8px; margin-top: 8px; }
        .lesson .data-row { display: flex; justify-content: space-between; font-size: 7px; padding: 3px 0; border-bottom: 1px solid #1a2a1a; }
        .lesson .data-key { color: #8f8; }

        function tick() {
            S.time += 0.5 * S.speed;

            const labBonus = S.lab.length > 0 ? 1.1 : 1;
            
            S.plants.forEach(p => {
                if (p.stage < 6) {
                    p.progress += (1.5 * S.speed * 0.05) * equipBonus * labBonus * p.strain.speed;

                    if (p.water < 30) p.health -= 0.15 * S.speed;
                    if (p.water > 85) p.health -= 0.1 * S.speed;
                    p.health = Math.max(0, Math.min(100, p.health));
                    p.stage = p.progress < 5 ? 0 : p.progress < 12 ? 1 : p.progress < 25 ? 2 : p.progress < 45 ? 3 : p.progress < 70 ? 4 : p.progress < 95 ? 5 : 6;

            });
            
            const need = S.level * 100;
            if (S.xp >= need) { S.xp -= need; S.level++; toast('🎉', 'Уровень ' + S.level); }

            save();
        }

                ).join('');
                
                document.getElementById('nutrGrid').innerHTML = nutrients.map(n => 
                    `<div class="item ${S.money < n.price ? 'off' : ''}" data-nut="${n.id}"><div class="ii">${n.icon}</div><div class="in">${n.name}</div><div class="id">${n.desc}</div><div class="ip">💰${n.price} | x${S.inv[n.id] || 0}</div></div>`
                ).join('');
            }
            else if (tab === 'equip') {
                c.innerHTML = '<div class="section"><span class="section-icon">💡</span><div><div class="section-title">Освещение</div><div class="section-desc">PPFD и спектр</div></div></div>';
                c.innerHTML += '<div class="equip-grid">' + equipment.filter(e => e.id.includes('lamp')).map(e => 
                    `<div class="equip-item ${S.equipment.includes(e.id) ? 'owned' : ''}" data-equip="${e.id}">
                        <div class="ei">${e.icon}</div>
                        <div class="en">${e.name}</div>
                        <div class="ed">${e.desc} | +${Math.round((e.bonus - 1) * 100)}%</div>
                        <div class="ec">${S.equipment.includes(e.id) ? '✅ Установлено' : '💰 ' + e.price}</div>
                    </div>`
                ).join('') + '</div>';
                
                c.innerHTML += '<div class="section"><span class="section-icon">🌀</span><div><div class="section-title">Климат</div><div class="section-desc">Вентиляция и контроль</div></div></div>';
                c.innerHTML += '<div class="equip-grid">' + equipment.filter(e => ['fan', 'filter', 'hygro', 'timer', 'ph'].includes(e.id)).map(e => 
                    `<div class="equip-item ${S.equipment.includes(e.id) ? 'owned' : ''}" data-equip="${e.id}">
                        <div class="ei">${e.icon}</div>
                        <div class="en">${e.name}</div>
                        <div class="ed">${e.desc} ${e.bonus > 1 ? '| +' + Math.round((e.bonus - 1) * 100) + '%' : ''}</div>
                        <div class="ec">${S.equipment.includes(e.id) ? '✅ Установлено' : '💰 ' + e.price}</div>
                    </div>`
                ).join('') + '</div>';
                
                c.innerHTML += '<div class="section"><span class="section-icon">🏠</span><div><div class="section-title">Гроубоксы</div><div class="section-desc">Больше слотов</div></div></div>';
                c.innerHTML += '<div class="equip-grid">' + equipment.filter(e => ['pot5', 'pot10', 'tent', 'tent2'].includes(e.id)).map(e => 
                    `<div class="equip-item ${S.equipment.includes(e.id) ? 'owned' : ''}" data-equip="${e.id}">
                        <div class="ei">${e.icon}</div>
                        <div class="en">${e.name}</div>
                        <div class="ed">${e.desc}</div>
                        <div class="ec">${S.equipment.includes(e.id) ? '✅ Куплено' : '💰 ' + e.price}</div>
                    </div>`
                ).join('') + '</div>';
            }
            else if (tab === 'lab') {
                c.innerHTML = '<div class="section"><span class="section-icon">🔬</span><div><div class="section-title">Лаборатория</div><div class="section-desc">Продвинутое оборудование</div></div></div>';
                c.innerHTML += '<div class="equip-grid">' + labItems.map(l => 
                    `<div class="equip-item ${S.lab.includes(l.id) ? 'owned' : ''}" data-lab="${l.id}">
                        <div class="ei">${l.icon}</div>
                        <div class="en">${l.name}</div>
                        <div class="ed">${l.desc}</div>
                        <div class="ec">${S.lab.includes(l.id) ? '✅ Куплено' : '💰 ' + l.price}</div>
                    </div>`
                ).join('') + '</div>';
                
                c.innerHTML += '<div class="card" style="margin-top:12px"><div class="card-t">🧬 Генетика</div><div class="card-p">5 генов: T (THC), C (CBD), Y (урожай), S (скорость), R (устойчивость). Менделевское наследование при скрещивании.</div></div>';
            }
            else if (tab === 'learn') {
                c.innerHTML = '<div class="section"><span class="section-icon">📚</span><div><div class="section-title">Академия Гровинга</div><div class="section-desc">Научные данные</div></div></div>';
                lessons.forEach((l, i) => {
                    const unlocked = l.unlocked || (l.id === 'training' && S.stats.harvests >= 1) || 
                                     (l.id === 'flower' && S.stats.harvests >= 2) || 
                                     (l.id === 'harvest' && S.stats.harvests >= 5) ||
                                     (l.id === 'genetics' && S.stats.planted >= 10) ||
                                     (l.id === 'pests' && S.stats.planted >= 15);
                    c.innerHTML += `<div class="lesson" style="opacity:${unlocked ? 1 : 0.5}" data-lesson="${l.id}">
                        <h3>${l.title} ${unlocked ? '▶' : '🔒'}</h3>
                    </div>`;
                });
                c.innerHTML += '<div class="card" id="lessonContent" style="display:none;margin-top:10px"></div>';
            }
            else if (tab === 'stats') {
                const need = S.level * 100;
                c.innerHTML = `<div class="card"><div class="card-t">📊 Прогресс</div><div style="margin-bottom:10px;font-size:9px">Уровень ${S.level} • ${S.xp}/${need} XP</div><div class="prog"><div class="prog-f" style="width:${(S.xp/need)*100}%"></div></div></div>
                <div class="card"><div class="card-t">📈 Статистика</div>
                    <div class="card-r"><span>🌱 Посажено</span><span>${S.stats.planted}</span></div>
                    <div class="card-r"><span>✂️ Урожаев</span><span>${S.stats.harvests}</span></div>
                    <div class="card-r"><span>🧬 Скрещиваний</span><span>${S.stats.bred}</span></div>
                    <div class="card-r"><span>🔧 Оборудования</span><span>${S.equipment.length}</span></div>
                    <div class="card-r"><span>🔬 Лаборатория</span><span>${S.lab.length}</span></div>
                    <div class="card-r"><span>💰 Баланс</span><span>$${S.money}</span></div>
                </div>`;
            }
        }
        
        function showLesson(id) {
            const l = lessons.find(x => x.id === id);
            if (!l) return;
            const unlocked = l.unlocked || (l.id === 'training' && S.stats.harvests >= 1) || 
                             (l.id === 'flower' && S.stats.harvests >= 2) || 
                             (l.id === 'harvest' && S.stats.harvests >= 5) ||
                             (l.id === 'genetics' && S.stats.planted >= 10) ||
                             (l.id === 'pests' && S.stats.planted >= 15);
            if (!unlocked) { toast('🔒', 'Разблокируется позже'); return; }
            
            let html = `<h3 style="font-size:11px;color:#7fff7f;margin-bottom:10px">${l.title}</h3>`;
            l.content.forEach(c => {
                html += `<div style="margin-bottom:12px">
                    <div style="font-size:10px;color:#f0883e;margin-bottom:5px">${c.title}</div>
                    <div style="font-size:9px;color:#c9d1d9;line-height:1.6">${c.text}</div>
                </div>`;
            });
            document.getElementById('lessonContent').innerHTML = html;
            document.getElementById('lessonContent').style.display = 'block';
            S.xp += 15;
            toast('📚', '+15 XP');
            save();
        }
        
        function plantSeed(id) {
            if (S.selected === null) { toast('❌', 'Выбери слот'); return; }
            if (S.plants.find(p => p.slot === S.selected)) { toast('❌', 'Слот занят'); return; }
            const strain = strains.find(s => s.id === id);
            if (S.money < strain.price) { toast('❌', 'Не хватает денег'); return; }
            S.money -= strain.price;
            S.plants.push({
                slot: S.selected, strain: strain,
                genes: { t: (Math.random() > 0.5 ? 'T' : 't') + (Math.random() > 0.5 ? 'T' : 't'), c: (Math.random() > 0.7 ? 'C' : 'c') + (Math.random() > 0.7 ? 'C' : 'c'), y: (Math.random() > 0.5 ? 'Y' : 'y') + (Math.random() > 0.5 ? 'Y' : 'y'), s: (Math.random() > 0.5 ? 'S' : 's') + (Math.random() > 0.5 ? 'S' : 's'), r: (Math.random() > 0.5 ? 'R' : 'r') + (Math.random() > 0.5 ? 'R' : 'r') },
                progress: 0, stage: 0, health: 100, water: 70
            });
            S.stats.planted++;
            S.xp += 5;
            document.getElementById('seedModal').classList.remove('open');
            render('grow');
            toast('🌱', strain.name);
            save();
        }
        
        function buyNutrient(id) {
            const n = nutrients.find(x => x.id === id);
            if (S.money < n.price) { toast('❌', 'Не хватает денег'); return; }
            S.money -= n.price;
            S.inv[id] = (S.inv[id] || 0) + 1;
            toast('🧪', n.name + ' куплено');
            save();
            render('shop');
        }
        
        function buyEquipment(id) {
            if (S.equipment.includes(id)) { toast('❌', 'Уже есть'); return; }
            const e = equipment.find(x => x.id === id);
            if (S.money < e.price) { toast('❌', 'Не хватает денег'); return; }
            
            if (id === 'pot5') { S.slots += 1; }
            else if (id === 'pot10') { S.slots += 2; }
            else if (id === 'tent') { S.slots += 4; }
            else if (id === 'tent2') { S.slots += 8; }
            
            S.money -= e.price;
            S.equipment.push(id);
            toast('🔧', e.name);
            save();
            render('equip');
        }
        
        function buyLab(id) {
            if (S.lab.includes(id)) { toast('❌', 'Уже есть'); return; }
            const l = labItems.find(x => x.id === id);
            if (S.money < l.price) { toast('❌', 'Не хватает денег'); return; }
            S.money -= l.price;
            S.lab.push(id);
            toast('🔬', l.name);
            save();
            render('lab');
        }
        
        function harvest(p) {
            const yld = Math.floor(p.strain.yld * (p.genes.y.includes('Y') ? 1.3 : 0.85) * (p.health / 100));
            const bonus = S.equipment.reduce((sum, id) => { const e = equipment.find(x => x.id === id); return sum + (e?.bonus || 0); }, 0) || 1;
            const money = Math.floor(yld * 2 * bonus);
            S.money += money;
            S.stats.harvests++;
            S.xp += 50;
            S.plants = S.plants.filter(x => x.slot !== p.slot);
            toast('✂️', `+${yld}г = $${money}`);
            save();
            render('grow');
        }
        
        function waterPlant() {
            const p = S.plants.find(x => x.slot === S.selected);
            if (!p) { toast('❌', 'Выбери растение'); return; }
            p.water = Math.min(100, p.water + 30);
            toast('💧', 'Полито');
            render('grow');
            save();
        }
        
        function useNutrient(id) {
            const p = S.plants.find(x => x.slot === S.selected);
            if (!p) { toast('❌', 'Выбери растение'); return; }
            if (!S.inv[id] || S.inv[id] <= 0) { toast('❌', 'Нет удобрения'); return; }
            S.inv[id]--;
            p.health = Math.min(100, p.health + 20);
            p.progress += 3;
            toast('🧪', 'Удобрено');
            render('grow');
            save();
        }
        
        // Event listeners
        document.getElementById('startBtn').onclick = () => { S.tutorial = false; document.getElementById('tut').classList.add('h'); save(); };
        
        document.querySelectorAll('.speed button').forEach(b => b.onclick = () => {
            document.querySelectorAll('.speed button').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            S.speed = parseInt(b.dataset.s);
        });
        
        document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
            t.classList.add('on');
            render(t.dataset.t);
        });
        
        document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            const n = b.dataset.n;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.t === n));
            render(n);
        });
        
        document.getElementById('content').onclick = (e) => {
            const pot = e.target.closest('.pot');
            if (pot) {
                const slot = parseInt(pot.dataset.slot);
                S.selected = slot;
                const p = S.plants.find(x => x.slot === slot);
                if (p && p.stage >= 6) harvest(p);
                render('grow');
            }
            const item = e.target.closest('.item');
            if (item) {
                if (item.dataset.seed) plantSeed(item.dataset.seed);
                if (item.dataset.nut) buyNutrient(item.dataset.nut);
            }
            const equip = e.target.closest('.equip-item');
            if (equip) {
                if (equip.dataset.equip) buyEquipment(equip.dataset.equip);
                if (equip.dataset.lab) buyLab(equip.dataset.lab);
            }
            const lesson = e.target.closest('.lesson');
            if (lesson) showLesson(lesson.dataset.lesson);
        };
        
        document.querySelectorAll('.mclose').forEach(b => b.onclick = () => document.getElementById(b.dataset.c).classList.remove('open'));
        
        // Init
        load();
        if (!S.tutorial) document.getElementById('tut').classList.add('h');
        update();
        render('grow');
        setInterval(tick, 1000);
    </script>
</body>
</html>
