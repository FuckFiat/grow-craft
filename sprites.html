<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Cannabis Growth Stages - 50 Sprites</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; padding: 20px; }
        h1 { text-align: center; color: #7fff7f; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; max-width: 1200px; margin: 0 auto; }
        
        .stage { 
            background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 50%, #5d3a1a 100%);
            border: 3px solid #3d2914;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 0;
        }
        
        .pot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: linear-gradient(135deg, #3d2914 0%, #5d3a1a 50%, #4a3520 100%);
            border-radius: 4px;
            border: 2px solid #2d1f0f;
        }
        
        .plant { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .label { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 8px; color: #fff; text-shadow: 1px 1px 0 #000; }
        
        /* Stage 1-5: Seed to Sprout */
        .s1 { width: 8px; height: 10px; background: radial-gradient(ellipse 4px 5px at center, #8b6914 0%, #5d4a0f 100%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
        
        .s2 { width: 10px; height: 12px; background: radial-gradient(ellipse 5px 6px at center, #9b7924 0%, #6d5a1f 100%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.3); }
        
        .s3 { width: 12px; height: 6px; background: linear-gradient(90deg, #4a8 0%, #3a7a3a 100%); border-radius: 2px; position: relative; }
        
        .s4 { width: 16px; height: 8px; background: linear-gradient(90deg, #4a8 0%, #3a7a3a 100%); border-radius: 3px; position: relative; }
        .s4::before { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 2px; height: 8px; background: #3a7a3a; }
        
        .s5 { width: 20px; height: 20px; position: relative; }
        .s5::before, .s5::after { content: ''; position: absolute; width: 10px; height: 14px; background: linear-gradient(135deg, #5aaa5a 0%, #3a8a3a 100%); clip-path: polygon(50% 0%, 60% 30%, 90% 20%, 70% 50%, 100% 50%, 70% 80%, 80% 100%, 50% 70%, 20% 100%, 30% 80%, 0% 50%, 30% 50%, 10% 20%, 40% 30%); }
        .s5::before { left: 0; transform: rotate(-10deg); }
        .s5::after { right: 0; transform: rotate(10deg); }
        
        /* Stage 6-10: Seedling */
        .s6 { width: 24px; height: 24px; position: relative; }
        .s6::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 22px; height: 22px; background: radial-gradient(ellipse 11px 11px at center, #5a9a5a 0%, #3a8a3a 100%); clip-path: polygon(50% 0%, 55% 20%, 75% 15%, 65% 35%, 90% 30%, 80% 55%, 100% 50%, 85% 70%, 95% 90%, 70% 80%, 65% 100%, 50% 85%, 35% 100%, 30% 80%, 5% 90%, 15% 70%, 0% 50%, 20% 55%, 10% 30%, 35% 35%, 25% 15%, 45% 20%); }
        
        .s7 { width: 28px; height: 28px; background: radial-gradient(ellipse 14px 14px at center, #6aba6a 0%, #4a9a4a 60%, #3a8a3a 100%); border-radius: 6px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2); }
        
        .s8 { width: 32px; height: 32px; background: radial-gradient(ellipse 16px 16px at center, #6aba6a 0%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 8px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.05); }
        
        .s9 { width: 36px; height: 36px; background: radial-gradient(ellipse 18px 18px at center, #7aca7a 0%, #5aaa5a 50%, #4a9a4a 100%); border-radius: 10px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); }
        
        .s10 { width: 40px; height: 40px; background: radial-gradient(ellipse 20px 20px at center, #7aca7a 0%, #5aaa5a 40%, #4a9a4a 80%, #3a8a3a 100%); border-radius: 12px; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); }
        
        /* Stage 11-20: Vegetative */
        .s11 { width: 44px; height: 44px; background: radial-gradient(ellipse 22px 22px at center, #6aba6a 0%, #4a9a4a 35%, #3a8a3a 70%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); }
        
        .s12 { width: 48px; height: 48px; background: radial-gradient(ellipse 24px 24px at center, #7aca7a 0%, #5aaa5a 40%, #4a9a4a 80%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); position: relative; }
        .s12::before { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 36px; height: 36px; background: radial-gradient(ellipse 18px 18px at center, #8ada8a 0%, #6aba6a 60%, #5aaa5a 100%); border-radius: 45%; }
        
        .s13 { width: 52px; height: 52px; background: radial-gradient(ellipse 26px 26px at center, #6aba6a 0%, #4a9a4a 30%, #3a8a3a 60%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); position: relative; }
        .s13::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: radial-gradient(ellipse 20px 20px at center, #8ada8a 0%, #6aba6a 50%, #5aaa5a 100%); border-radius: 45%; }
        
        .s14 { width: 56px; height: 56px; background: radial-gradient(ellipse 28px 28px at center, #7aca7a 0%, #5aaa5a 35%, #4a9a4a 70%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); position: relative; }
        .s14::before { content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 44px; height: 44px; background: radial-gradient(ellipse 22px 22px at center, #9aeba9a 0%, #7aca7a 50%, #6aba6a 100%); border-radius: 45%; }
        
        .s15 { width: 60px; height: 60px; background: radial-gradient(ellipse 30px 30px at center, #6aba6a 0%, #4a9a4a 25%, #3a8a3a 50%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.08); position: relative; }
        .s15::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 48px; height: 48px; background: radial-gradient(ellipse 24px 24px at center, #9aea9a 0%, #7aca7a 40%, #6aba6a 80%, #5aaa5a 100%); border-radius: 45%; }
        
        .s16 { width: 64px; height: 64px; background: radial-gradient(ellipse 32px 32px at center, #7aca7a 0%, #5aaa5a 30%, #4a9a4a 60%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s16::before { content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 52px; height: 52px; background: radial-gradient(ellipse 26px 26px at center, #aaeaaa 0%, #8ada8a 50%, #7aca7a 100%); border-radius: 45%; }
        
        .s17 { width: 68px; height: 68px; background: radial-gradient(ellipse 34px 34px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s17::before { content: ''; position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 56px; height: 56px; background: radial-gradient(ellipse 28px 28px at center, #bafaba 0%, #9aeba9a 50%, #8ada8a 100%); border-radius: 45%; }
        
        .s18 { width: 72px; height: 72px; background: radial-gradient(ellipse 36px 36px at center, #7aca7a 0%, #5aaa5a 25%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s18::before { content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: radial-gradient(ellipse 30px 30px at center, #cafbca 0%, #aafaaa 50%, #9aea9a 100%); border-radius: 45%; }
        
        .s19 { width: 76px; height: 76px; background: radial-gradient(ellipse 38px 38px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s19::before { content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; background: radial-gradient(ellipse 32px 32px at center, #dafcda 0%, #bafaba 50%, #aafaaa 100%); border-radius: 45%; }
        
        .s20 { width: 80px; height: 80px; background: radial-gradient(ellipse 40px 40px at center, #7aca7a 0%, #5aaa5a 20%, #4a9a4a 40%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s20::before { content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 68px; height: 68px; background: radial-gradient(ellipse 34px 34px at center, #eafdea 0%, #cafbca 50%, #bafaba 100%); border-radius: 45%; }
        
        /* Stage 21-30: Pre-flowering with pistils */
        .s21 { width: 82px; height: 82px; background: radial-gradient(ellipse 41px 41px at center, #6aba6a 0%, #4a9a4a 25%, #3a8a3a 50%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s21::before { content: ''; position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: radial-gradient(ellipse 35px 35px at center, #8ada8a 0%, #6aba6a 50%, #5aaa5a 100%); border-radius: 45%; }
        .s21::after { content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: radial-gradient(ellipse 10px 10px at center, rgba(255,182,193,0.8) 0%, rgba(255,150,170,0.5) 100%); border-radius: 50%; box-shadow: 0 0 5px rgba(255,150,170,0.4); }
        
        .s22 { width: 84px; height: 84px; background: radial-gradient(ellipse 42px 42px at center, #7aca7a 0%, #5aaa5a 30%, #4a9a4a 60%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -6px -6px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s22::before { content: ''; position: absolute; top: 17px; left: 50%; transform: translateX(-50%); width: 72px; height: 72px; background: radial-gradient(ellipse 36px 36px at center, #9aeba9a 0%, #7aca7a 50%, #6aba6a 100%); border-radius: 45%; }
        .s22::after { content: ''; position: absolute; top: 19px; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; background: radial-gradient(ellipse 12px 12px at center, rgba(255,182,193,0.85) 0%, rgba(255,150,170,0.6) 100%); border-radius: 50%; box-shadow: 0 0 8px rgba(255,150,170,0.5); }
        
        .s23 { width: 86px; height: 86px; background: radial-gradient(ellipse 43px 43px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -7px -7px 0 rgba(0,0,0,0.2), inset 3px 3px 0 rgba(255,255,255,0.08); position: relative; }
        .s23::before { content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 74px; height: 74px; background: radial-gradient(ellipse 37px 37px at center, #aafaaa 0%, #8ada8a 50%, #7aca7a 100%); border-radius: 45%; }
        .s23::after { content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 28px; height: 28px; background: radial-gradient(ellipse 14px 14px at center, rgba(255,182,193,0.9) 0%, rgba(255,130,150,0.6) 100%); border-radius: 50%; box-shadow: 0 0 10px rgba(255,130,150,0.6); }
        
        .s24 { width: 88px; height: 88px; background: radial-gradient(ellipse 44px 44px at center, #7aca7a 0%, #5aaa5a 25%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -7px -7px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s24::before { content: ''; position: absolute; top: 19px; left: 50%; transform: translateX(-50%); width: 76px; height: 76px; background: radial-gradient(ellipse 38px 38px at center, #bafaba 0%, #9aeba9a 50%, #8ada8a 100%); border-radius: 45%; }
        .s24::after { content: ''; position: absolute; top: 21px; left: 50%; transform: translateX(-50%); width: 32px; height: 32px; background: radial-gradient(ellipse 16px 16px at center, rgba(255,160,180,0.9) 0%, rgba(255,120,140,0.6) 100%); border-radius: 50%; box-shadow: 0 0 12px rgba(255,120,140,0.6); }
        
        .s25 { width: 90px; height: 90px; background: radial-gradient(ellipse 45px 45px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -7px -7px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s25::before { content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 78px; height: 78px; background: radial-gradient(ellipse 39px 39px at center, #cafbca 0%, #aafaaa 50%, #9aeba9a 100%); border-radius: 45%; }
        .s25::after { content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 36px; height: 36px; background: radial-gradient(ellipse 18px 18px at center, rgba(255,170,190,0.95) 0%, rgba(255,110,130,0.7) 100%); border-radius: 50%; box-shadow: 0 0 15px rgba(255,110,130,0.7); }
        
        .s26 { width: 92px; height: 92px; background: radial-gradient(ellipse 46px 46px at center, #7aca7a 0%, #5aaa5a 25%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -7px -7px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s26::before { content: ''; position: absolute; top: 21px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: radial-gradient(ellipse 40px 40px at center, #dafcda 0%, #bafaba 50%, #aafaaa 100%); border-radius: 45%; }
        .s26::after { content: ''; position: absolute; top: 23px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: radial-gradient(ellipse 20px 20px at center, rgba(255,180,200,0.95) 0%, rgba(255,100,120,0.7) 100%); border-radius: 50%; box-shadow: 0 0 18px rgba(255,100,120,0.7); }
        
        .s27 { width: 94px; height: 94px; background: radial-gradient(ellipse 47px 47px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s27::before { content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 82px; height: 82px; background: radial-gradient(ellipse 41px 41px at center, #eafdea 0%, #cafbca 50%, #bafaba 100%); border-radius: 45%; }
        .s27::after { content: ''; position: absolute; top: 24px; left: 50%; transform: translateX(-50%); width: 44px; height: 44px; background: radial-gradient(ellipse 22px 22px at center, rgba(255,190,210,0.95) 0%, rgba(255,90,110,0.7) 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(255,90,110,0.7); }
        
        .s28 { width: 96px; height: 96px; background: radial-gradient(ellipse 48px 48px at center, #7aca7a 0%, #5aaa5a 25%, #4a9a4a 50%, #3a8a3a 100%); border-radius: 45%; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s28::before { content: ''; position: absolute; top: 23px; left: 50%; transform: translateX(-50%); width: 84px; height: 84px; background: radial-gradient(ellipse 42px 42px at center, #f0fff0 0%, #dafcda 50%, #cafbca 100%); border-radius: 45%; }
        .s28::after { content: ''; position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 48px; height: 48px; background: radial-gradient(ellipse 24px 24px at center, rgba(255,200,220,0.95) 0%, rgba(255,80,100,0.7) 100%); border-radius: 50%; box-shadow: 0 0 22px rgba(255,80,100,0.7); }
        
        .s29 { width: 98px; height: 98px; background: radial-gradient(ellipse 49px 49px at center, #6aba6a 0%, #4a9a4a 20%, #3a8a3a 40%, #2d7a2d 100%); border-radius: 45%; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.08); position: relative; }
        .s29::before { content: ''; position: absolute; top: 24px; left: 50%; transform: translateX(-50%); width: 86px; height: 86px; background: radial-gradient(ellipse 43px 43px at center, #fff 0%, #eafdea 50%, #dafcda 100%); border-radius: 45%; }
        .s29::after { content: ''; position: absolute; top: 26px; left: 50%; transform: translateX(-50%); width: 52px; height: 52px; background: radial-gradient(ellipse 26px 26px at center, rgba(255,210,230,0.95) 0%, rgba(255,70,90,0.7) 100%); border-radius: 50%; box-shadow: 0 0 25px rgba(255,70,90,0.7); }

        .s30::before { content: ''; position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 88px; height: 88px; background: radial-gradient(ellipse 44px 44px at center, #fff 0%, #f0fff0 50%, #eafdea 100%); border-radius: 45%; }

        /* Stage 31-40: Flowering - large buds */
        .s31 { width: 102px; height: 102px; background: radial-gradient(ellipse 51px 51px at center, #5aba5a 0%, #3a8a3a 30%, #2a7a2a 60%, #1d6a1d 100%); border-radius: 45%; box-shadow: inset -9px -9px 0 rgba(0,0,0,0.25), inset 4px 4px 0 rgba(255,255,255,0.06), 0 0 8px rgba(255,255,255,0.1); position: relative; }

        .s32::after { content: ''; position: absolute; top: 29px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; background: radial-gradient(ellipse 32px 32px at center, rgba(255,140,160,0.95) 0%, rgba(240,90,130,0.8) 70%); border-radius: 50%; box-shadow: 0 0 25px rgba(255,90,120,0.6); }
