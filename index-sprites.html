<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌿 Grow Craft - AI Sprites</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0d1117;
            --dark: #161b22;
            --stone: #21262d;
            --border: #30363d;
            --green: #238636;
            --gold: #f0883e;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --muted: #8b949e;
            --dirt: #5d3a1a;
            --dirt-dark: #3d2914;
        }
        
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Press Start 2P', monospace; font-size: 10px; background: var(--bg); color: var(--text); }
        
        .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        
        /* Header */
        .head { background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); border-bottom: 3px solid #5d3a1a; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 22px; }
        .logo-text { font-size: 14px; color: #7fff7f; text-shadow: 2px 2px 0 #000; }
        .stats { display: flex; gap: 10px; align-items: center; }
        .stat { text-align: center; }
        .stat-v { font-size: 13px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
        .stat-l { font-size: 7px; color: #8f8; }
        .speed { display: flex; gap: 4px; }
        .speed button { 
            width: 32px; height: 28px; font-size: 9px; 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 2px solid #8b5a2b; border-top-color: #a0522d; border-bottom-color: #3d2914;
            color: #fff; text-shadow: 1px 1px 0 #000;
        }
        .speed button.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; }
        
        /* Minecraft Tabs */
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%); padding: 10px; gap: 8px; border-bottom: 3px solid #5d3a1a; }
        .tab { 
            padding: 12px 20px; font-size: 11px; 
            background: linear-gradient(180deg, #6b4423 0%, #5d3a1a 50%, #4a3520 100%);
            border: 3px solid #8b5a2b;
            border-top-color: #a0522d;
            border-left-color: #8b4513;
            border-right-color: #5d3a1a;
            border-bottom-color: #3d2914;
            color: #fff; text-shadow: 1px 1px 0 #000;
            min-width: 70px;
            text-align: center;
        }
        .tab.on { background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%); border-color: #5aaa5a; border-top-color: #6aba6a; border-bottom-color: #2d5a2d; color: #000; text-shadow: none; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 70px; background: linear-gradient(180deg, #1a3d1a 0%, #0d1117 100%); }
        
        /* Grow Room */
        .room { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (max-width: 320px) { .room { grid-template-columns: repeat(2, 1fr); } }
        
        /* Square Pot with AI Sprite */
        .pot { 
            background: linear-gradient(135deg, #5d3a1a 0%, #8b4513 50%, #5d3a1a 100%);
            border: 3px solid #3d2914;
            border-top-color: #8b5a2b;
            border-left-color: #a0522d;
            border-right-color: #3d2914;
            border-bottom-color: #2d1f0f;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border-radius: 0;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .pot:active { transform: translateY(2px); box-shadow: inset 2px 2px 0 rgba(0,0,0,0.3); }
        .pot.sel { border-color: var(--gold); box-shadow: 0 0 10px var(--gold), inset 0 0 4px rgba(240,136,62,0.3); }
        .pot.ready { border-color: var(--green); animation: pot-ready 1.5s infinite; }
        @keyframes pot-ready { 0%, 100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 15px var(--green); } }
        
        /* AI Sprite Image */
        .plant-sprite {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        .pot-empty::after { content: '+'; font-size: 24px; color: rgba(255,255,255,0.3); }
        
        .pot-info {
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            font-size: 6px;
            padding: 2px;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 16px;
            left: 4px;
            right: 4px;
            height: 4px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a8a4a, #6aba6a);
            transition: width 0.3s;
        }
        
        /* Shop */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .item {
            background: var(--dark);
            border: 2px solid var(--border);
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .item:hover { border-color: var(--green); }
        .item-icon { font-size: 28px; margin-bottom: 4px; }
        .item-name { font-size: 8px; margin-bottom: 4px; }
        .item-price { font-size: 9px; color: var(--gold); }
        .item-desc { font-size: 6px; color: var(--muted); margin-top: 4px; }
        
        /* Info Panel */
        .panel {
            background: var(--dark);
            border: 2px solid var(--border);
            padding: 12px;
            margin-top: 10px;
        }
        .panel-title { font-size: 11px; color: var(--green); margin-bottom: 8px; text-align: center; }
        .panel-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 8px; }
        
        /* Academy */
        .lesson {
            background: var(--dark);
            border: 2px solid var(--border);
            padding: 12px;
            margin-bottom: 8px;
        }
        .lesson-title { font-size: 10px; color: var(--green); margin-bottom: 6px; }
        .lesson-text { font-size: 7px; line-height: 1.6; color: var(--text); }
        
        /* Bottom Nav */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #3d2914 0%, #2d1f0f 100%);
            border-top: 3px solid #5d3a1a;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 7px;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 12px;
        }
        .nav-btn.on { color: #7fff7f; }
        .nav-btn span { font-size: 20px; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.on { display: flex; }
        .modal-box {
            background: var(--dark);
            border: 3px solid var(--border);
            padding: 16px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .modal-title { font-size: 12px; color: var(--green); margin-bottom: 12px; }
        .modal-body { font-size: 8px; line-height: 1.6; margin-bottom: 12px; }
        .modal-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 16px;
            font-size: 9px;
            font-family: inherit;
            background: linear-gradient(180deg, #4a8a4a 0%, #3a7a3a 50%, #2d5a2d 100%);
            border: 2px solid #5aaa5a;
            border-top-color: #6aba6a;
            border-bottom-color: #2d5a2d;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            cursor: pointer;
        }
        .btn:active { transform: translateY(1px); }
        .btn.red { background: linear-gradient(180deg, #8a4a4a 0%, #7a3a3a 50%, #5a2d2d 100%); border-color: #aa5a5a; }
        
        /* Animation */
        @keyframes sway { 0%, 100% { transform: translate(-50%, -50%) rotate(-1deg); } 50% { transform: translate(-50%, -50%) rotate(1deg); } }
        .plant-sprite.stage-5, .plant-sprite.stage-6 { animation: sway 3s ease-in-out infinite; }
        
        /* Crystals glow for harvest */
        .plant-sprite.stage-6 { filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }
        
        /* Hide content sections */
        .page { display: none; }
        .page.on { display: block; }
        
        /* Stage indicator */
        .stage-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: #7fff7f;
            font-size: 7px;
            padding: 2px 4px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="head">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">GROW CRAFT</span>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-v" id="coins">0</div>
                    <div class="stat-l">💎</div>
                </div>
                <div class="speed">
                    <button id="x1" class="on">1x</button>
                    <button id="x2">2x</button>
                    <button id="x5">5x</button>
                </div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs" id="mainTabs">
            <button class="tab on" data-tab="grow">🌱 Гроу</button>
            <button class="tab" data-tab="shop">🛒 Магаз</button>
            <button class="tab" data-tab="learn">📚 Академ</button>
            <button class="tab" data-tab="lab">🔬 Лаба</button>
        </div>
        
        <!-- Content -->
        <div class="content">
            <!-- Grow Room -->
            <div class="page on" id="growPage">
                <div class="room" id="room"></div>
                <div class="panel" id="plantInfo" style="display:none;">
                    <div class="panel-title" id="plantName">-</div>
                    <div class="panel-row"><span>Стадия:</span><span id="plantStage">-</span></div>
                    <div class="panel-row"><span>Прогресс:</span><span id="plantProgress">-</span></div>
                    <div class="panel-row"><span>Урожай:</span><span id="plantYield">-</span></div>
                </div>
            </div>
            
            <!-- Shop -->
            <div class="page" id="shopPage">
                <div class="shop-grid" id="shop"></div>
            </div>
            
            <!-- Academy -->
            <div class="page" id="learnPage">
                <div id="lessons"></div>
            </div>
            
            <!-- Lab -->
            <div class="page" id="labPage">
                <div class="panel">
                    <div class="panel-title">🔬 Генетическая Лаборатория</div>
                    <div class="panel-row"><span>Изучено генов:</span><span id="genesStudied">0/5</span></div>
                    <div class="panel-row"><span>Мутации:</span><span id="mutations">0</span></div>
                </div>
                <div class="shop-grid" id="labItems"></div>
            </div>
        </div>
        
        <!-- Bottom Nav -->
        <div class="nav">
            <button class="nav-btn on" data-nav="grow"><span>🌱</span>Рост</button>
            <button class="nav-btn" data-nav="shop"><span>🛒</span>Магаз</button>
            <button class="nav-btn" data-nav="learn"><span>📚</span>Учёба</button>
            <button class="nav-btn" data-nav="lab"><span>🔬</span>Лаба</button>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">-</div>
            <div class="modal-body" id="modalBody">-</div>
            <div class="modal-btns" id="modalBtns"></div>
        </div>
    </div>

    <script>
        // Game State
        const S = { pots: [], coins: 100, speed: 1, sel: null };
        const K = 'gc7';
        
        // Seeds
        const SEEDS = [
            { id: 'nl', name: 'Northern Lights', type: 'Indica', thc: 18, yield: 400, price: 50, time: 60 },
            { id: 'ww', name: 'White Widow', type: 'Hybrid', thc: 20, yield: 450, price: 60, time: 70 },
            { id: 'bd', name: 'Blue Dream', type: 'Sativa', thc: 21, yield: 500, price: 70, time: 80 },
            { id: 'og', name: 'OG Kush', type: 'Hybrid', thc: 23, yield: 480, price: 80, time: 75 },
            { id: 'gl', name: 'Gelato', type: 'Hybrid', thc: 27, yield: 400, price: 90, time: 85 },
            { id: 'gg', name: 'Gorilla Glue', type: 'Hybrid', thc: 30, yield: 550, price: 100, time: 90 },
            { id: 'sk', name: 'Skunk #1', type: 'Hybrid', thc: 19, yield: 420, price: 55, time: 65 },
            { id: 'cm', name: 'Critical Mass', type: 'Indica', thc: 20, yield: 600, price: 65, time: 55 },
            { id: 'ak', name: 'AK-47', type: 'Hybrid', thc: 22, yield: 450, price: 75, time: 70 },
            { id: 'ah', name: 'Amnesia Haze', type: 'Sativa', thc: 25, yield: 480, price: 85, time: 95 },
            { id: 'pk', name: 'Purple Kush', type: 'Indica', thc: 22, yield: 400, price: 70, time: 60 },
            { id: 'sd', name: 'Sour Diesel', type: 'Sativa', thc: 26, yield: 520, price: 95, time: 90 }
        ];
        
        // Nutrients
        const NUTRIENTS = [
            { id: 'n', name: 'Азот (N)', desc: 'Рост листьев', price: 20, boost: 1.2 },
            { id: 'p', name: 'Фосфор (P)', desc: 'Цветение', price: 25, boost: 1.3 },
            { id: 'k', name: 'Калий (K)', desc: 'Урожайность', price: 30, boost: 1.4 },
            { id: 'cal', name: 'Кальций', desc: 'Стебли', price: 15, boost: 1.1 },
            { id: 'mag', name: 'Магний', desc: 'Хлорофилл', price: 18, boost: 1.15 },
            { id: 'all', name: 'Комплекс', desc: 'Всё сразу', price: 80, boost: 2.0 }
        ];
        
        // Lessons
        const LESSONS = [
            { title: '🌱 Germination', text: 'Прорастание 3-7 дней. Темнота, влажность 70-90%, 22-25°C. Не закапывай глубоко 3-5мм.' },
            { title: '🌿 Seedling', text: '2-3 недели. Свет 18/6. Полив когда почва сухая на 2см. Не перелей!' },
            { title: '🌳 Vegetative', text: '4-8 недель. Свет 18-24ч. Азот N для листьев. LST/HST тренировки.' },
            { title: '🌸 Pre-flower', text: '1-2 недели. Переключи на 12/12. Пистили появляются. Фосфор P.' },
            { title: '💎 Flowering', text: '6-10 недель. PK 13-14. Калий K для смолы. Trichome watch.' },
            { title: '✂️ Harvest', text: 'Trichomes milky/amber. Темнота 48ч перед срезкой. Dry 7-14 дней.' },
            { title: '🌡️ Climate', text: 'Temp 20-28°C. RH 40-60% veg, 40-50% flower. VPD 0.8-1.2 kPa.' },
            { title: '💡 Lighting', text: 'PPFD 400-600 veg, 600-900 flower. DLI 35-50 mol/m²/d.' },
            { title: '💧 Nutrients', text: 'NPK ratio: veg 3-1-2, flower 1-3-4. pH 6.0-6.8 soil, 5.5-6.5 hydro.' },
            { title: '🧬 Genetics', text: '5 генов: размер, THC, урожай, вкус, цветение. Mendel inheritance.' }
        ];
        
        // Lab items
        const LAB_ITEMS = [
            { id: 'dnatest', name: 'DNA тест', desc: 'Раскрой гены', price: 200 },
            { id: 'mutate', name: 'Мутаген', desc: 'Случайная мутация', price: 500 },
            { id: 'breed', name: 'Скрещивание', desc: '2 растения → новый сорт', price: 300 }
        ];
        
        // Stages (50 stages mapped to 7 display stages)
        function getStage(p) {
            if (!p || !p.seed) return 0;
            const progress = p.progress / 100;
            if (progress < 0.14) return Math.floor(progress * 50) + 1; // 1-7
            if (progress < 0.28) return Math.floor(progress * 50); // 8-14
            if (progress < 0.42) return Math.floor(progress * 50); // 15-21
            if (progress < 0.56) return Math.floor(progress * 50); // 22-28
            if (progress < 0.70) return Math.floor(progress * 50); // 29-35
            if (progress < 0.84) return Math.floor(progress * 50); // 36-42
            return Math.min(50, Math.floor(progress * 50)); // 43-50
        }
        
        // Get sprite filename
        function getSprite(stage) {
            const s = Math.max(1, Math.min(50, stage));
            return `sprites/stage_${String(s).padStart(2, '0')}.png`;
        }
        
        // Render pots
        function renderRoom() {
            const room = document.getElementById('room');
            room.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const p = S.pots[i];
                const stage = getStage(p);
                
                const div = document.createElement('div');
                div.className = 'pot' + (!p ? ' pot-empty' : '') + (i === S.sel ? ' sel' : '');
                if (p && p.progress >= 100) div.classList.add('ready');
                
                if (p) {
                    // AI Sprite
                    const img = document.createElement('img');
                    img.src = getSprite(stage);
                    img.className = 'plant-sprite';
                    img.alt = `Stage ${stage}`;
                    img.loading = 'lazy';
                    div.appendChild(img);
                    
                    // Stage badge
                    const badge = document.createElement('div');
                    badge.className = 'stage-badge';
                    badge.textContent = `${stage}/50`;
                    div.appendChild(badge);
                    
                    // Progress bar
                    if (p.progress < 100) {
                        const bar = document.createElement('div');
                        bar.className = 'progress-bar';
                        const fill = document.createElement('div');
                        fill.className = 'progress-fill';
                        fill.style.width = `${p.progress}%`;
                        bar.appendChild(fill);
                        div.appendChild(bar);
                    }
                    
                    // Info
                    const info = document.createElement('div');
                    info.className = 'pot-info';
                    info.textContent = p.progress >= 100 ? '✅ HARVEST!' : p.seed.name.slice(0, 10);
                    div.appendChild(info);
                }
                
                div.onclick = () => potClick(i);
                room.appendChild(div);
            }
        }
        
        // Pot click
        function potClick(i) {
            const p = S.pots[i];
            
            if (!p) {
                showModal('Выбери семя', 'Какой сорт посадить?', () => {
                    const seeds = SEEDS.filter(s => S.coins >= s.price);
                    if (seeds.length === 0) {
                        alert('Нет денег! Продай урожай.');
                        return;
                    }
                    
                    const idx = Math.floor(Math.random() * seeds.length);
                    const seed = seeds[idx];
                    S.coins -= seed.price;
                    S.pots[i] = { 
                        seed, 
                        progress: 0, 
                        start: Date.now(),
                        nutrients: []
                    };
                    S.sel = i;
                    hideModal();
                    save();
                    renderRoom();
                    updateUI();
                });
            } else if (p.progress >= 100) {
                // Harvest
                const y = Math.floor(p.seed.yield * (1 + Math.random() * 0.3));
                const coins = y * 2;
                S.coins += coins;
                S.pots[i] = null;
                hideModal();
                save();
                renderRoom();
                updateUI();
                alert(`🌿 Собрано ${y}г! 💎 +${coins}`);
            } else {
                S.sel = i;
                renderRoom();
                showPlantInfo(p);
            }
        }
        
        // Show plant info
        function showPlantInfo(p) {
            const panel = document.getElementById('plantInfo');
            if (!p) { panel.style.display = 'none'; return; }
            
            panel.style.display = 'block';
            document.getElementById('plantName').textContent = p.seed.name;
            document.getElementById('plantStage').textContent = `${getStage(p)}/50`;
            document.getElementById('plantProgress').textContent = `${Math.floor(p.progress)}%`;
            document.getElementById('plantYield').textContent = `~${p.seed.yield}г`;
        }
        
        // Render shop
        function renderShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            
            SEEDS.forEach(s => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-icon">🌱</div>
                    <div class="item-name">${s.name}</div>
                    <div class="item-price">💎 ${s.price}</div>
                    <div class="item-desc">${s.type} | THC ${s.thc}% | ${s.yield}г</div>
                `;
                div.onclick = () => buySeed(s);
                shop.appendChild(div);
            });
            
            NUTRIENTS.forEach(n => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-icon">💧</div>
                    <div class="item-name">${n.name}</div>
                    <div class="item-price">💎 ${n.price}</div>
                    <div class="item-desc">${n.desc}</div>
                `;
                div.onclick = () => buyNutrient(n);
                shop.appendChild(div);
            });
        }
        
        function buySeed(s) {
            if (S.coins < s.price) return alert('Нет денег!');
            
            const empty = S.pots.findIndex(p => !p);
            if (empty === -1) return alert('Нет места!');
            
            S.coins -= s.price;
            S.pots[empty] = { seed: s, progress: 0, start: Date.now(), nutrients: [] };
            save();
            renderRoom();
            updateUI();
        }
        
        function buyNutrient(n) {
            if (S.coins < n.price) return alert('Нет денег!');
            if (S.sel === null || !S.pots[S.sel]) return alert('Выбери растение!');
            
            S.coins -= n.price;
            S.pots[S.sel].nutrients.push(n);
            save();
            updateUI();
        }
        
        // Render lessons
        function renderLessons() {
            const div = document.getElementById('lessons');
            div.innerHTML = '';
            
            LESSONS.forEach(l => {
                const el = document.createElement('div');
                el.className = 'lesson';
                el.innerHTML = `
                    <div class="lesson-title">${l.title}</div>
                    <div class="lesson-text">${l.text}</div>
                `;
                div.appendChild(el);
            });
        }
        
        // Render lab
        function renderLab() {
            const div = document.getElementById('labItems');
            div.innerHTML = '';
            
            LAB_ITEMS.forEach(l => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = `
                    <div class="item-icon">🔬</div>
                    <div class="item-name">${l.name}</div>
                    <div class="item-price">💎 ${l.price}</div>
                    <div class="item-desc">${l.desc}</div>
                `;
                div.appendChild(el);
            });
        }
        
        // Modal
        function showModal(title, body, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = body;
            const btns = document.getElementById('modalBtns');
            btns.innerHTML = `
                <button class="btn" id="modalConfirm">OK</button>
                <button class="btn red" onclick="hideModal()">Отмена</button>
            `;
            document.getElementById('modalConfirm').onclick = onConfirm;
            document.getElementById('modal').classList.add('on');
        }
        
        function hideModal() {
            document.getElementById('modal').classList.remove('on');
        }
        
        // Speed
        function setSpeed(x) {
            S.speed = x;
            document.querySelectorAll('.speed button').forEach(b => b.classList.remove('on'));
            document.getElementById('x' + x).classList.add('on');
        }
        
        // Tabs
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
                t.classList.add('on');
                const tab = t.dataset.tab;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
                document.getElementById(tab + 'Page').classList.add('on');
            };
        });
        
        // Nav
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
                b.classList.add('on');
                const nav = b.dataset.nav;
                document.querySelectorAll('.tab').forEach(t => {
                    t.classList.toggle('on', t.dataset.tab === nav);
                });
                document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
                document.getElementById(nav + 'Page').classList.add('on');
            };
        });
        
        // Speed buttons
        document.getElementById('x1').onclick = () => setSpeed(1);
        document.getElementById('x2').onclick = () => setSpeed(2);
        document.getElementById('x5').onclick = () => setSpeed(5);
        
        // Update UI
        function updateUI() {
            document.getElementById('coins').textContent = S.coins;
        }
        
        // Game loop
        function tick() {
            let changed = false;
            
            S.pots.forEach((p, i) => {
                if (p && p.progress < 100) {
                    const elapsed = (Date.now() - p.start) / 1000;
                    const total = p.seed.time * 60;
                    const boost = p.nutrients.reduce((acc, n) => acc * n.boost, 1);
                    
                    p.progress = Math.min(100, (elapsed / total) * 100 * boost * S.speed);
                    changed = true;
                }
            });
            
            if (changed) {
                renderRoom();
                if (S.sel !== null) showPlantInfo(S.pots[S.sel]);
            }
        }
        
        // Save/Load
        function save() {
            localStorage.setItem(K, JSON.stringify(S));
        }
        
        function load() {
            const data = localStorage.getItem(K);
            if (data) {
                const loaded = JSON.parse(data);
                Object.assign(S, loaded);
            }
        }
        
        // Init
        load();
        renderRoom();
        renderShop();
        renderLessons();
        renderLab();
        updateUI();
        setInterval(tick, 1000);
        setInterval(save, 5000);
        
        // Telegram
        if (window.Telegram?.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
